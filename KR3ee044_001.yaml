body:
  text: 身經通考卷一答問身經答問一部人長春子與尊生子遊於泲水之濱據莎茵而坐長春子興問於尊生子曰一身之義可得聞與尊生子對曰身以外不可盡知而可以弗知也身以內不可盡知而不可弗知也身者性之宅也命之宗也焉有身而可以弗知者乎長春子曰吾今而知身之為重也子其為我言之曰坐為汝詳言何謂人人任也能任世事也父精母血合而成人左陽右陰男女分形象其形而命名焉何謂身身猶伸也包三才而為身上象首下象足前象腹後象背引而伸之能參天地立人極而作聖也形者全於毛影則隨之體者豐於骨態則從之軀者眾竅之總名州有九區人有九竅也肢者一身之枝幹木有枝而葉附之人有肢而毛附之也膚布也皮被也布被周身也膜募也募絡全體也筋伸也謂筋和易於屈伸也從力又從竹者蓋物之多筋者莫如竹故象之肉柔膩也皮肉之有文理者也骨孤也謂腎氣孤行偕皮肉筋血主持軀竅也髓水也隨也謂骨之精水灌注孔竅隨腦循脊下輸兩腎也首守也先眾體而為言所以守五官之靈護衛泥丸也頭獨也高而獨也前口須而後腦項也頰夾也相輔夾也頤養也下動上靜咀嚼以養人也頷含也含物之頰車也顴權也骨生面而有權也面現也驗也謂藏府之精華皆著於面或榮或悴可占驗也發發也血脈所發也毛貌也在表別形貌也髭姿也姿容美也鬢峻也生高處也須秀也苗成而秀人成而須也髯隨口動搖冉冉然也睫接也凡物色於眼眶相接也眼驗也五藏精華皆聚於目人之邪正病否於是乎驗之也目默也默而識也瞳童也內照小人也眸侔也兩目相侔大小似也淚戾也凡人戾心拗意則目津出也眉媚也覆目而媚人也鼻裨也裨益肺氣使得呼吸也涕卑也涕流而下也泣立也兩行齊下也哭苦也笑肖也張大口也額鼻根也口象形也如口袋盛物可出納也唇緣也胃脈左右交口而經起於辰時也吻免也入則碎出則免也咽因也飲食必因於口也喉候也候氣之粗細長短也牙芽也如草芽之銳也齒止也所以遏止眾物不得粗而下咽也斷牙根也舌舍也舌為心苗乃心之舍別味出聲心干於舌故從於口嗌要也氣所流通之要路也耳邇也聽遠自邇也項確也堅確受枕也頸經也挺而長也肩任也天下之物於是乎任之臂俾也在旁可俾使也肘注也寸脈所流注也腕宛也可以宛轉屈伸也手授也持物相授受也掌常也常主手心也指枝也相排不亂長短參差也胸空也空空然盛腑臟也膺壅也氣所壅也臆意也意所生也膈隔也在心脾之間有脂膜以隔邪氣不使上蒸也腹復也富也里盛多品如富翁也臍劑也腸端所限劑也始生必齊之也胞包也胎胞也肋勒也檢勒五臟不散墜也脅挾也兩臂所挾也腋繹也血脈所絡繹也爪紹也紹續指端也腰要也當身之中屈身之關要也髓髀緩而卑也膝息也屈伸之機可坐而休息也股役也分剎而奔走服役也腿退也環跳之主前固可進後亦可退也尻尾蔽心骨也臀殿也大肉殿其後也腳卻也又蹻也謂坐時卻後又捷而能步也脛徑也直長似莖也足續也續乎脛用以走也踝角足兩旁如角也跟根也如樹有根也踵鍾也承諸體之重鍾聚於此也趾止也進止自由也脈派也又永也氣血分派而流可以永年也血也分界血流也汗沂也出於表涆涆然也津進也汁進出也膿醲也氣白血赤其汁厚也長春子仰天而嘆曰甚哉吾之愚也吾有身而不自知吾何人乎吾聞子信樂而忘倦也敢問其序為何如尊生子曰悉乎哉問也自其首而言之腦後為風府項兩旁為頸頸上為腦腦上為巔巔前為頂𩕳頂𩕳前為囟囪前為額顱兩旁為額角額角前為眉骨眉骨前為顏顏下為鼻鼻根為頞頞旁為目內眥為睛明外眥為銳眥耳下為頰車耳前目下為䪼䪼下為腮腮下為頷頷中為頤唇上為人中地閣為承漿肩下為膊膊下為臑臑盡為肘肘下為臂臂盡為腕下踝為銳骨上踝為高骨骨下動脈為關關前為寸關後為尺寸口骨為束骨束骨前為掌骨肥肉際為魚際兩筋前為歧骨歧骨前為虎口由下而上言之二陰之中為屏翳兩筋間為纂纂內深處為下極下極之前男為陰廷女為窈漏陰器上為聚陰聚陰上為毛際毛際兩旁動脈為氣衝氣衝上中為小腹小腹內為中極中極上為關元關元上為臍臍上至鳩尾為腹腹上為臆臆上為胸兩乳間為膻中兩旁高處為膺膺上為巨骨巨骨上為缺盆缺盆骨為連舌本為結喉結喉兩旁大脈應手可喉五臟者為人迎人迎上曲頷前動脈為大迎大迎內為喉嚨喉嚨上為頏顙內為咽門脅上為腋脅下為肋肋八骨間為季脅脅下空軟處為䏚䏚外為骼脊骨節為椎其盡處為椎尾一名骶骨兩旁為扁骨扁骨之內陽曰十二髎陰曰八髎盡分各處為尻尻上橫者為腰藍骨藍骨上為腰骨一名䯠䯠上為䯊䯊上為脊骨凡二十一節通項骨三節共二十四節以象天之二十四氣也脊內為𦟘𦟘兩旁為膂膂內為胛一名脢脢上兩角為肩解肩解下成片者為肩胛一名膊肩兩端為䯠骨肩胛際會處為三柱三柱之上兩旁之前為䯋又自下言之足根為踹踹上為踵踵上為腨一名腓腸腓腸之上膝後曲處為膕膝上至腰髖骨下通為捷捷上挾髓骨兩旁為機機後為臀臀肉為脽機前為髀厭一名髀樞樞下為股一名胯胯骨為䯑䯖股下為魚腹腹外為髀股髀之前膝上起肉為伏兔伏兔後交叉中為髀關關上橫骨為枕骨關下膝解為骸關挾膝解中為臏臏下通為䯣䯣外為後輔骨䯣兩旁為骹骹前為骭一名䯒亦名脛脛下盡處為曲節一名腕大指爪甲脾經發源之後為三毛三毛後橫紋為聚毛聚毛後為本節本節後為岐骨岐骨上為附肝胃之會跗下為核骨大指下為蹠蹠下為跽跽後為極極後為足心督經足心後為足掌足掌後為跟膽經又陰陽二蹻發源兩踝相對為腕內踝之前大骨下陷中為然骨外踝上為絕骨足外側大骨下赤白肉際為京骨此則一身之次序也薛云足跟乃督脈發源之所腎經所過之地身經答問二長春子曰敢問五臟六腑之義何謂也曰臟者藏也如寶藏然藏物而不泄也臟陰而根於陽故其數奇府者聚也如府庫然聚物轉輸其用不窮也府陽而根於陰故其數偶肺沛也中有二十四孔分布清濁之氣沛然莫御也市者人氣之所聚膻中為氣海故從市心新也神明之官變化日新也大火心星之形象天之夏也去腎八寸四分位離生陰故能生血脾裨也掩乎太倉裨助胃氣也居心肺之下故從卑太陰濕土與血類故裹血肝干也將軍之官謀慮出焉足以幹事也居震而為龍雷故多驚多怒木生火赤血之母故藏血腎慎也慎守精室不可妄泄也又引也引水下行其精管自兩腎脊骨間發源繞大腸之右從溺管之下出前陰而泄精是為五臟胃衛也水穀之精氣布周身足以衛外而為固也上為賁門下為幽門倉廩之官五穀之府故從田膽擔也十一經皆取決於膽足以擔天下之事也腸有大小腸暢也暢達胃氣令穢濁下降也上為闌門下為魄門又曰肛門三焦統領周身元氣上焦不治則水泛高原中焦不治則水留中脘下焦不治則水亂二便故名決瀆之官上焦治膻中直兩乳間中焦治臍旁上四寸下焦治臍下一寸當膀胱膀滂也胱光也氣海足則運化有常滂沛光滑水道利也是謂六府敢問魂魄何謂也曰魂者隨神往來之謂魄者並精出入之謂魂神而魄靈魂動而魄靜肝藏魂肺藏魄身經答問三長春子曰一身之義既聞其概矣愚不敏欲知經絡終始之序其配注於十二時者何如也請進而教之尊生子曰吾嘗間於內經矣第一經手太陰肺經左右二十二穴自寅時從中府起下絡大腸循胃口上膈屬肺橫出腋下循臑內下肘中循臂下行入寸口循魚際出大指端至少商穴止其支者從腕後直出次指內廉出其端第二經手陽明大腸經左右四十穴自卯時從少商穴交與商陽起大指次指端出合谷兩骨之間上入兩筋中凡經脈之道陰脈行手足之裡陽脈行手足之外此經多血多氣循臂上入肘外循臑外上肩出髃骨之前下入缺盆絡肺下膈屬大腸其支者別從缺盆上頸貫頰入下齒縫中還出扶口交人中左之右右之左上挾鼻孔至鼻旁迎香穴止第三經足陽明胃經左右九十穴自辰時從迎香穴交與承泣起鼻交頞中旁行太陽之脈下循鼻外入上齒縫中環唇交承漿出大迎循頰車上耳前循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆中下膈屬胃絡脾其直者從缺盆下乳內挾臍入氣衝中其別者起胃上口循腹裡下至氣衝而合下髀關抵伏兔下入膝臏中循胻外下足跗入中指內間又支者下膝三寸而別以下入中指外間又支者別跗上入大指間出其端至厲兌穴止第四經足太陰脾經左右四十二穴自已時從衝陽過交與足大指隱白循䯒上膝入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃上膈注心中至腋下大包穴止大包布胸脅中出九肋間脾之大絡總繞陰陽諸絡由脾灌溉五臟第五經手少陰心經左右一十八穴自午時從大包交與腋下極泉起心中出屬心系下膈絡小腸其支者從心系上挾咽系目其直者復從心系上肺出腋下下循臑內下肘循臂抵掌後銳骨之端入掌內循小指之內出其端至少衝穴止第六經手太陽小腸經左右三十八穴自未時從少衝交與小指少澤上腕循臂繞肩胛入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆上頰至目銳眥卻入耳中至聽宮止其支者別循頰上䪼抵鼻至目內眥胃之下口小腸之上口也在臍上二寸水穀於是分為大腸上口小腸之下口也至是而泌別清濁水液滲膀胱滓穢入大腸焉第七經足太陽膀胱經左右一百三十四穴自申時從聽宮交與睛明穴起目內眥上額交巔又從巔至耳上角其宜行者從巔入絡腦別下項循肩內挾脊抵腰中循膂絡腎屬膀胱又從腰貫臀入膕中其別者從膊內左右貫胛挾脊內過髀樞下合膕中出外踝後循京骨至小指外側至陰穴止第八經足少陰腎經左右五十四穴至酉時從至陰交與足心湧泉穴從小指下斜趨足心出然谷下循內踝後別入跟中上臑出膕內上股貫脊屬腎絡膀胱又從腎上貫肝膈入肺中循喉嚨系舌本其支者從肺出絡心注胸中至俞府穴止第九經手厥陰心包經左右一十八穴自戌時從俞府交與乳旁天池起胸中出屬心包絡下膈歷絡三焦其支者循胸脅下腋三寸上抵腋下下循臑內入肘中下循兩筋之間入掌中循中指出其端至中衝穴止又別者從掌中循小指次指出其端第十經手少陽三焦經左右四十六穴自亥時從中衝交與手四指關衝循手表腕出臂外兩骨之間上貫肘循臑外上肩入缺盆交膻中絡心包下膈循屬三焦其支者從膻中上缺盆上項系耳後出耳上以屈下頰至䪼其支者從耳後入耳中出至目銳眥耳門穴止耳前起肉當耳缺中第十一經足少陽膽經左右八十六穴自子時從耳門交與目眥瞳子窌上抵角下耳後循頸至肩入缺盆其支者從耳後入耳中走耳前至銳眥後又別銳眥下大迎合於手少陽抵䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣沖繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外下外輔骨之前直下抵絕骨之端下出外踝前循足跗上入小指次指之間竅陰穴止其支者別跗上入大指間循大指岐骨內出其端還貫入爪甲出三毛第十二經足厥陰肝經左右二十六穴自丑時從竅陰交與足大指端大敦起於大指聚毛之際上循足跗去內踝一寸足大指甲後為三毛後橫紋為聚毛上踝八寸交出太陰之後上膕內循股入陰中環陰器抵小腹夾胃屬肝絡膽上貫膈布脅肋循喉嚨後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺至腹期門穴止長春子曰子言經絡終始之序可謂詳矣善哉子之以身為身而我之不以身為身也吾滋愧矣願得其要者而聞之尊生子曰腹之中行系任脈一經開兩旁系足少陰腎經又開兩旁系足陽明胃經又開兩旁系足太陰脾經此皆在腹中者也其乳之在上在旁系手太陰肺少陰心厥陰心包又開兩旁則在兩肋系足厥陰肝經又肋之後背之旁系足少陽膽經其脊之兩旁兩行系足太陽膀胱經若脊之中行系督脈一經手之外廉系手三陽經手之內廉系手三陰經足之外廉系足三陽經足之內廉系足三陰經頭乃手足六陽經所會如耳前後系手足少陽經顴上下系手是陽明經兩眥旁系手足太陽經其鼻之上行仍系督脈一經凡各經支別交會與夫足之三陰皆循喉嚨挾舌本又足厥陰隨督脈會於巔此又經絡之大概也長春子曰吾聞子言乃今而曉然於身之為身也人之求諸內者莫切於此矣身經答問四尊生子曰人患不知身之為身耳知身之所以為身而不知所以治之與不知也何擇知所以治身矣而不知諸經之嚮導品藥之所主名與不治也又何擇子欲聞之否乎長春子再拜曰請遂言之尊生子曰言之不詳其害小聽之或誤其害大汝靜聽之吾將與子為性命之交長春子曰嘻春固以性命質於子者也人之教我也外子之教我也內愛我哉敢不蕺浮心以從事尊生子曰人之有身也則必有病矣有病則必有經矣有經則必有脈矣有脈則必有方矣所謂經三陰三陽是也所謂脈浮沉遲數滑澀是也世之用藥者眾矣孰為知脈者乎即或有知脈者矣孰為知經者乎夫醫之用藥猶大將之用兵也不知脈不知經而用藥猶之不知虛實不知六花八陣而用兵其不陷人於死也幾希知脈矣知經矣而方則與之變化於無窮焉此非至明者不能悉也非至斷者不能決也可不謂難乎長春子曰自治者智之事也治人者仁之事也吾欲觀其外而知其內因其病而考其方自治治人無疑於心其道可得聞與尊生子曰能自治而不能治人者有之矣未有不能自治而能治人者也吾為子悉言之面者諸陽之會也十二經脈三百六十五絡其血氣皆上行於面而走空竅其精氣上走於目而為睛其彆氣走於耳而為聽其宗氣上走於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面故大熱甚寒不能勝之也陽明胃脈起鼻交頞中故胃中有熱則面熱胃中有寒則面寒凡面白者肺症也善嚏悲愁不樂欲哭面赤者心症也口乾善笑面黃者脾症也善噫善思善味面青者肝症也善潔善怒面黑者腎症也善恐善欠凡面塵屬運氣者有二焉一曰燥金制肝經云陽明司天燥淫所勝民病嗌乾面塵陽明在泉亦如之又云金鬱之發嗌乾面塵治以濕劑是也二曰火經云少陽之復厥氣上行面如浮塵目乃瞤瘛治以寒劑是也又肝足厥陰之脈是動病甚則嗌乾面塵脫色膽足少陽之脈是動病甚則面塵故善觀人之病者觀其面而可知也長春子曰人用之廣者莫如目病之多者亦莫如目非余體可得侔也故目之蔽於翳也猶日月之蔽於云也瞑行而已矣如之何則可尊生子曰五臟六腑之精氣皆上注於目而為睛睛之窠為眼骨之精為瞳子筋之精為黑眼窠之精為白眼血之精為絡肌肉之精為約束裹擷筋骨氣血之精而與脈併為系上屬於腦後出於項中此則眼具五臟六腑也後世五輪八廓之說蓋本諸此凡臟腑主目有二一曰肝經東方青色入通於肝開竅於目藏精於肝又人臥則血歸於肝肝受血而能視又云肝氣通於目肝和則目能辨五色矣二曰心經心合脈諸脈皆屬於目至東垣又推之而及於脾引針經大惑論云心事煩冗飲食失節勞役過度故脾胃虛弱心火熾盛則百脈沸騰血脈逆行邪害孔竅天明則日月不明也夫五臟六腑之精氣皆稟受於脾土而上貫於目脾者諸陰之首也目者血氣之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火代行其令相少者包絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所並而損其血脈故諸病生焉如不理脾胃及養血安神是治標不治本也非正理矣目之內眥太陽經之所起血多氣少目之銳眥少陽經也血少氣多目之上網太陽經也亦血多氣少目之下網陽明經也血氣俱多然陽明經起於目兩旁交頞之中與太陽少陽俱會於目惟足厥陰經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明蓋此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏要之無令太過以養血脈而已白輪變赤火乘肺也肉輪赤腫火乘脾也黑睛被翳火乘肝腎也赤脈貫目火自甚也治火之法在藥則鹹寒止之下之在針則神廷上星囪會前頂百會血之翳者可使立退痛者可使立已眛者可使立明腫者可使立消惟小兒不可刺囪會以肉分淺薄恐傷其骨也陽主散陽虛則眼楞急而為倒睫捲毛陰主斂陰虛不斂則瞳子散大而為目昏眼花目之為病在府則為表當除風散熱在臟則為里當養血安神除風散熱瀉青丸主之養血安神定志丸主之婦人熟地黃丸主之風氣與陽明入胃循脈而上至目內眥則寒中而泣出河間當歸湯主之或有體肥氣盛風熱上行兩目昏澀槐子散主之此由胸中濁氣上行也重則為痰厥亦能損目常使胸中清則無此患矣目見黑花者腎氣弱也當補腎水駐景丸主之或有暴失明者眼居諸陽之會而陰反閉之此風邪內滿恐有不測之病心君主也通於大眥故大眥赤者實火也心包絡為小心小心相火也通於小眥故小眥赤者虛火也若君主拱默則相火自然清靜矣白眼痛多有赤脈視其從上而下者太陽病也羌活為使從下而上者陽明病也升麻為使從外走內者少陽病也柴胡為使太陽病宜溫之散之陽明病宜下之少陽病宜和之有不腫不紅但沙澀昏痛者乃氣分隱伏之火脾肺絡有濕熱秋天多有此患通用桑白皮散玄參丸瀉肝湯天行赤目七日自愈火數七也至二七則再傳矣二七不退必其犯觸及本虛之故當防他變症矣有陰病目赤有陽病目赤治各不同世人目多黃濁者乃濕熱之害惟小兒之色甚正夏枯草治目珠疼至夜更甚者神效蓋目珠連目本屬厥陰經夏枯草有補養厥陰血脈之功其草三四月開花遇夏至陰生則枯蓋稟純陽之氣也故治厥陰目痛如神者以陽治陰也瘀血灌睛為病最毒凡見白珠紫脹傅點不退必有瘀滯在內可翻睥內視之若睥內色暈泛浮椒瘡或粟瘡者皆用導之一法則吉不然將有變症生焉血灌瞳人視瞳子不見黑瑩但見一點鮮紅甚則其色紫濁病至此危且急矣初起一二日尚可救遲則救亦不愈恐其人亦不久於人世也風時冷淚此為竅虛因虛引邪之患無時冷淚則內虛膽腎自傷之患直視為腎絕直視搖頭為心絕戴眼者太陽已絕目之病多矣其治之亦多術大約分經絡氣血度人性天時寒熱虛實之不等老幼男女之各異法不出於三因藥惟通乎表裡世有專科巧由心出非語言之所能盡其蘊也易曰神而明之存乎其人曰敢問耳部為何如曰耳屬足少陰腎經又屬手少陰心經又屬手太陰肺經又屬足厥陰肝經又屬手足少陽三焦膽手太陽小腸經之會又屬手足陽明大腸胃經又屬足太陽膀胱經又屬手足少陰心腎太陰肺脾足陽明胃經之絡耳前屬手足少陽三焦膽足陽明胃經之會耳後屬手足少陽三焦膽經之會耳下曲頰屬足少陽膽手陽明大腸經之會又屬手太陽小腸經曲頰前屬足少陽膽手陽明大腸經之會前寸許屬手陽明大腸經曲頰後屬足少陽膽之經蓋腎氣通於耳所主者精精氣充周則耳聞而聰若勞傷氣血風邪襲虛使精脫腎憊則耳為之病矣有氣厥而聾者有挾風而聾者有勞傷而聾有因十二經脈上絡於耳其陰陽諸經適有交井則藏氣逆而為厥搏入於耳是為厥聾必有時乎眩暈之症耳者宗脈之所附脈虛而風邪乘之使經氣否而不宣是為風聾必有時乎頭痛之症勞役傷乎氣血淫欲耗其精元疲悴昏聵是為勞聾有能將息得所血氣和平則其聾漸輕其或日就勞傷風邪停滯則成久聾之症矣外此又有耳觸風邪與氣相擊其聲嘈嘈目或見火謂之虛嗚熱氣乘虛隨脈入耳聚熱不散大汁出焉謂之膿耳若風熱搏之津液結𩊅成核塞耳亦令暴聾謂之聤耳凡此數者腎脈可推風則浮而盛熱則洪而實虛則澀而濡風則疏散之熱則清利之虛則調養之邪氣並退然後以通耳調氣安腎之藥主之上氣不足耳為之苦鳴髓海不足則腦轉耳鳴附子醋浸插耳治卒聾燒灰同石菖蒲塞耳止鳴草烏頭塞癢耳蔥莖插耳鳴同蜜水滴聾鳴皆老者所當知也蔥韭薑汁人乳人尿杏仁油並滴治蟲入耳鼻部為何如曰鼻屬足陽明胃經督脈之會又屬手太陰肺經又屬手少陰心經又屬手足陽明大腸胃經督脈之交會屬足太陰脾經俠鼻孔兩旁五分屬手足陽明大腸胃經之會直兩目瞳子屬足陽明胃經陰蹻脈之會病人鼻下平者胃病也余處無恙獨鼻尖色青黃者其人必為淋也鼻尖微白者亡色也赤者血熱也黃者小便難也鼻塞者衛氣失守邪客頭面而鼻亦受之不聞香臭矣故經曰心肺有病則鼻為之不利鼻鼽者謂鼻流清涕也有腦冷有外感有飲食痰積有運氣少陰少陽之勝復有歲金之不及鼻淵者謂鼻出濁涕也經云膽移熱於腦則辛頞鼻淵故肝熱甚則出泣心熱甚則出汗脾熱甚則出涎腎熱甚則出唾肺熱甚則出涕鼻瘜肉者厚味擁濕熱蒸於肺門如雨霽之地突生芝菌也但以白礬末加滷砂少許吹之即化為水卻與勝濕湯加瀉白散鼻痛氣道塞也內服人參順氣散外傅白芷散鼻赤乃血熱入肺也肺中風熱或好飲者多有之鼻黑熱血得冷滯而不行故先紫而後黑必先去滯血生新血病乃可痊也口部為何如曰口者脾之所主經云中央黃色入通於脾開竅於口又云足陽明胃脈挾口下交承漿又云手陽明大腸脈挾口交人中脾熱則口甘肝熱則口酸心熱則口苦肺熱則口辛腎熱則口咸胃熱則口淡經云膀胱移熱於小腸膈腸不便上為口糜又云少陰之復火氣內發上為口糜治以苦寒心脈在舌上若心火炎上熏蒸於口則口舌生瘡脾脈布舌下若脾熱生痰相火上炎熱痰相搏亦生口瘡二者皆用涼劑但有涎者兼取其涎耳夫火有虛實因熱而動者曰實無熱而動者曰虛實則正治寒涼之劑是也虛則從治溫熱之劑是也有用生附塗足心者有用吳茱萸末醋熬膏入生地龍末塗足心者若此者皆治龍火也由寒水上迫心肺之陽不得下降故用溫熱之劑或散於上或散於下也口臭明礬入麝擦牙齒部為何如曰齒統屬足少陰腎經分上下齗上齗屬胃下斷屬大腸男子八歲腎氣實而齒生更二八真牙生五八則牙槁八八而齒去矣女子亦然以七為數蓋齒乃骨之餘髓之所養也故隨天癸之盛衰也若骨髓不足陽明脈虛則齒之諸病生矣何則陽明金也齒腎水也此乃母氣榮衛其子也故陽明實則齒堅牢虛則齒浮動凡頭面外冒風寒口吸寒冷致牙疼者皆外因也實熱陰虛火動骨蒸所致氣鬱血熱蟲蛀皆內因也硬物所支打擊等致皆不內外因如生齒用雄鼠脊骨研揩即生牛屎中黑豆燒存性人麝摻之勿見風治大人小兒牙齒不生唇部為何如曰唇屬足太陰脾經又屬足陽明胃經又屬手少陰心經又屬手太陰肺經唇瘡連年不瘥以八月藍葉一斤搗汁洗之三日瘥又用白荷花瓣貼之效俠口統屬沖任二脈上唇俠口屬手陽明大腸經脈入下齒交人中上鼻孔下唇俠口屬足陽明胃經脈入上齒挾口環唇下上耳至腮燥則干熱則裂風則瞤寒則揭若唇腫起白皮皺裂如蠶繭名曰繭唇宜補脾氣生脾血為主唇黃泡腫烏頭炒灰研香油調敷之又以甑上汗滴下傅之效又訶子肉五倍子等分為末干貼上效舌部為何如曰舌屬手少陰心經又屬足太陰脾經又兼屬足陽明胃經又屬足少陰腎經又屬足厥陰肝經舌主嘗五味以榮養於身資於脾以分布津液於五藏故心之本脈繫於舌根脾之絡脈連舌本散舌下系干舌旁肝脈循陰器絡於舌本心脾虛風熱乘之則為病風寒濕所中則舌捲縮而不能言七情所郁則舌腫滿心熱則裂而生木舌重舌脾熱則滑而胎脾閉則白胎如雪若咽痛口乾舌瘡日晡益甚為腎經虛火若思慮過度口舌生瘡咽喉不利為脾經血傷火動若恚怒過度寒熱口苦而舌腫痛為肝經血傷火動凡舌腫下必有噤蟲狀如螻蛄臥蠶有頭毛其頭小白可燒鐵烙頭上即消不急治能殺人心主血血出則瘡愈宜䤵針不宜燔針惟舌下廉泉穴屬腎經雖宜出血亦當禁針邪客手少陽之絡令人喉痹舌卷手陽明之筋其病人支痛轉筋舌卷肝脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死心血不足則舌常痹不可作風治理中加當歸服之舌出不收傷寒後不能調揖者往往有之珍珠末冰片等分傅之即收或用巴豆一枚去油取霜用紙捻卷之內入鼻中舌自收舌縱涎下多唾蓋胃中熱則蟲動蟲動則胃緩胃緩則廉泉開廉泉開故涎下補足少陰大病瘥喜出唾久不了了者胃上有寒宜理中丸溫之或加益智仁凡胃上停寒唾白沫皆宜此少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇凡舌苦膽熱也舌甘脾熱也舌酸濕熱也舌澀風熱也舌辛燥熱也舌咸脾濕也舌淡胃虛也麻乃血虛也生胎脾熱閉也出血心火鬱也腫脹心脾火毒也瘡裂上焦熱也木強風痰濕熱也短縮風熱也舌出數寸有傷寒產後中毒大驚數種䪼部為何如曰䪼顴骨也屬手足少陽三焦膽手太陽小腸經之會又屬手少陰心經心病者顴赤心絕則虛陽上發面赤如赭白者肺之候丹者心之候火剋金為賊邪不治又屬足少陰腎經腎病者顏黑頰部為何如曰頰面旁也屬手足少陽三焦膽手太陽小腸足陽明胃經之會少陽之厥則暴聾頰腫而熱又屬足厥陰肝經肝熱左頰先赤又屬手太陰肺經肺熱右頰先赤頤部為何如曰頤屬足陽明胃經陽明虛則寒慄鼓頷又屬足少陰腎經腎熱頤先赤凡伸欠頰車蹉但開不能合以酒飲之令大醉睡中吹皂角末搐其鼻嚏透則止癢腮用柏葉車前草柏子仁杵碎熱傅患處或用雞清調赤小豆末咽喉之部為何如曰咽在喉後所以咽物屬手太陽小腸少陰心足太陰脾厥陰肝經之會咽主地氣地氣通於嗌足太陰脈布胃中絡於嗌故病腹滿嗌乾又屬足少陰腎經病口熱舌乾咽腫上氣嗌乾及痛又屬足陽明胃經上通於心循咽出於口又屬足厥陰肝少陽膽經咽喉病雖在脾土實由肝膽之所為喉在咽前所以出氣屬手太陰肺足陽明胃少陰腎厥陰肝經任脈之會喉主天氣天氣通於肺謂之肺系又屬手少陰心少陽三焦經心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹邪客手少陽之絡令人喉痹舌卷口乾心煩運氣少陽所至為喉痹耳鳴嘔湧心與三焦並絡於喉氣熱內結故為喉痹又屬手足陽明大腸胃手少陽三焦經之合又屬足太陰脾經喉嚨後屬手厥陰心包經結喉兩旁應手人迎動脈屬足陽明胃經其脈之動常左小而右大左小以候藏右小以候腑人迎後屬手陽明大腸經會厭者音聲之戶懸壅者音聲之關十二經脈皆上循咽喉盡得以病之然統其所屬乃在君相二火何也經云喉主天氣咽主地氣又曰諸逆衝上皆屬於火蓋肺主氣天也脾主食地也於是喉納氣咽納食納氣者從金化納食者從土化金性燥土性濕至於病也金化變動為燥燥則澀澀則閉塞而不仁故在喉為之痹土化變動為濕濕則泥泥則壅脹而不通故在咽為之腫痹腫之病雖少異然皆一時火鬱上焦致痰涎氣血聚結咽喉其咽腫之形狀分之則有纏喉風乳蛾之名喉痹之暴發暴死者名走馬喉痹中間雖有經氣之寒熱不等其為火症一也大抵治法視火微甚微則正治甚則反治撩痰出血隨宜而施或於手大指少商穴出血行氣若腫達於外者又必外敷以藥又宜先以鵝翎蘸米醋繳喉中摘出其痰蓋酸味能收痰隨翎而出又能消積血若乳蛾甚而不散以小刀就蛾上刺血用牙硝吹點以退火邪服射干青黛甘桔梔芩礬石枳實大黃之類以散上焦之熱外所敷藥如生地龍韭根伏龍肝之類若夫生瘡或白或赤其白多涎而赤多血大抵與口瘡同例喉痹惡寒者乃寒閉於外熱鬱於內以薑汁散其外寒則內熱得伸而愈矣切忌膽礬酸寒之劑點喉反致陽氣不伸又忌硝黃寒劑下之反致陽氣下陷則禍不旋踵兩寸脈不足乃陽虛也必用表藥升提之或三部俱弱亦用此法三部俱實宜消陽助陰苟天行運氣之邪城市皆同其治必先表散亦大忌酸藥點之下之其症一屬火宜仲景桔梗湯或面赤斑者屬陽毒宜陽毒諸方汗之一屬濕宜活人半夏桂枝甘草湯或面青黑者屬陰毒宜陰毒諸方汗之臟寒咽閉吞吐不利用製附子以蜜塗炙含之勿咽急喉痹有聲如鼾此為肺絕之候速宜參膏捄之下以薑汁竹瀝咽痛用諸藥不效者此非咽痛也乃鼻中生一條紅線如發懸一黑泡大如櫻珠垂掛到咽門而止妨礙飲食須用探取用牛膝直而獨條者洗淨用好醋三五滴同研細就鼻孔滴二三點入去則絲斷珠破其病立安冬月臨臥時食生萊菔三五片無咽喉之疾凡治鯁之法皆以類推如顱𡵚治魚鯁輔磁石治針鯁發灰治發鯁貍虎治骨鯁亦各以其類也
