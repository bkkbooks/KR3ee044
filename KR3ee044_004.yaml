而能食者大承氣微下之痰而不能食者厚朴湯主之治嗽而失聲潤肺散或青音丸戴云有熱嗽失聲咽疼多進冷劑而聲愈不出者宜以生薑汁調消風散少少進之或只一味薑汁宜得嗽而失聲者非獨熱嗽有之宜審其症用藥聲啞者寒包熱也宜細辛半夏生薑辛以散之亦有痰熱壅於肺者金空則鳴必清金中邪滯用清咽寧嗽湯有因久嗽成勞者有因病勞乃嗽者其症寒熱往來或獨熱無寒咽乾嗌痛精神疲極所嗽之痰或濃或淡或時有血腥臭異常語聲不出者薏苡仁五錢桑白皮麥冬各三錢白石英二錢人參五味子款冬花紫菀杏仁貝母阿膠百合桔梗秦艽枇杷葉各一錢薑棗粳米同煎去渣調鍾乳粉亦宜蛤蚧散或保合湯知母茯苓湯紫菀散寧嗽湯經年纍月久嗽不已服藥不瘥余無飽症卻與勞嗽不同戴用三拗湯青金丸豫謂其不妥獨宜保肺而已一味百部膏可也素問云咳嗽煩冤者是腎氣之逆也八味丸安腎丸主之有暴嗽服諸藥不效或教之進生料鹿茸丸大兔絲子丸方愈有本有標卻不可以其暴嗽而疑遽補之非所以易愈者亦覺之早故也治時行嗽發熱惡寒頭痛鼻塞氣急狀如冷熱傷連嗽不已初得病即伏枕一兩日即輕俗呼為蝦蟆瘟用參蘇飲加細辛半錢治咳而無痰者以辛甘潤其肺蜜煎生薑湯蜜煎橘皮湯燒生薑胡桃又本事方補肺法生地黃二斤淨洗杏仁二兩生薑蜜各四兩搗如泥人瓦盆中置飯上蒸五七度每五更挑三匙咽下丹溪治飲酒傷肺痰嗽以竹瀝煎入韭汁就吞瓜蔞杏仁青黛黃連丸按此恐太寒閉遏熱氣不得發舒不若先以辛散之而後以酸收之甚者吐之後與五苓甘露勝濕去痰之劑吃醋嗆喉咳嗽不已用甘草二兩又赤皮作二寸段中半劈開用豬膽汁五枚浸三日取出火上炙乾為細末煉蜜丸每服四十丸茶清下臨臥服咸物所傷哮嗽不止用白麵二錢砂糖二錢通搜和用糖餅灰汁捻作餅子放在爐內炸熱劃出加礬粉四錢另炒略熟將餅切作四牙摻輕粉在內令患人吃盡吐出病根即愈脾胃門人參啓脾湯治脾胃虛弱不進飲食此藥最效藿香半夏茯苓砂仁各五分甘草黃連神麯麥芽各四分陳皮七分人參二錢白朮一錢木香三分不見火上水二鍾煎八分空心服沖和養胃湯治內脹黃耆一錢五分人參一錢甘草一錢五分當歸一錢白朮一錢白芍炒八分白茯苓三分柴胡七分乾薑一分升麻一錢葛根一錢羌活一錢五分防風五分黃連七分黃芩七分五味子二分水煎稍熱服食鹽治法凡胸胃酒食停積心下脹滿只用鹽花擦牙溫水嗽下不過三次如湯潑雪四君子湯一切脾胃虛弱飲食減少諸虛不足無問內傷外感病之新久不論諸病服藥無效宜用此劑以補之脾胃漸充諸病皆愈人參二錢白朮二錢白茯苓一錢甘草炙五分上水一鍾半薑五片棗一枚煎七分食遠服血虛加當歸川芎氣虛表不固加黃耆桂枝嘔吐加砂仁蓿香心虛加茯神酸棗仁益智仁有痰加陳皮半夏泄瀉加山藥白扁豆虛寒久瀉者加肉蔻乾薑咳嗽加麥門冬五味子心煩不寐加麥門冬酸棗仁口渴加乾葛五味子胸腹脹滿加枳實白豆寇有潮熱加軟柴胡遍身疼痛加羌活紫蘇走注氣痛加延胡索木香身體腫滿加大腹皮厚朴腹脅疼加吳茱萸廣木香小兒痘疹不出加升麻葛根女人腹痛加香附延胡索大便祕結加枳殼桃仁檳榔小便不利加澤瀉木通平胃散健脾進食和胃卻痰自然榮衛調暢及療四時感冒手足腰疼五勞七傷外感風寒內傷生冷不問三焦痞滿並有平效陳皮蒼朮厚朴甘草各一錢上水二鍾薑三片棗一枚煎七分食遠服五勞七傷有熱加黃芩柴胡手足痠疼加烏藥桂枝痰嗽發瘧加草果烏梅冷熱氣疼加小茴香木香水氣脹滿加桑白皮木通有氣加茴香酒傷脾胃加丁香砂仁葛根傷食加白豆蔻草果四時瀉泄加豆蔻訶子風痰加半夏皂角腿膝冷痛加牛膝肉桂腿痹加菟絲子漢防己渾身拘急有熱加柴胡黃芩痢疾加黃連頭風加藳本白芷氣塊加三稜莪朮冷淚加夏枯草有瘟疫時氣二毒寒熱頭痛加撫芎蔥白眼熱加大黃荊芥婦人赤白帶下加當歸茯苓腰痛加杜仲八角茴香婦人腹疼加香附子烏藥參苓白朮散治久瀉脾胃大虛必用此久服方可以復元氣再無脾胃之患時常漸瀉漸已者尤宜多服人參二兩白朮五兩蒸蓮肉四兩去心白桔梗一兩乾山藥四兩炒黃色薏苡仁四兩炒芡實粉四兩白茯苓四兩蒸炙甘草二兩去皮砂仁一兩炒白扁豆四兩上為末欲留久滴水為丸緑豆大方能久貯每服二錢米湯或棗湯調亦可人參利膈丸治胸中不利痰咳喘滿和脾開滯推陳致新治噎膈之聖藥木香一兩檳榔一兩人參一兩當歸一兩藿香一兩甘草一兩枳實一兩大黃一兩酒浸厚朴薑製一兩為細末水丸桐子大下五十丸仍用豬膽導之得通便佳三因沖和丸開胃順氣不拘內外諸證能宣行諸藥祕妙之方人參末一兩石斛末一兩白豆仁末一兩山楂肉末一兩擇有味有肉者陳皮末一兩合研勻碗盛碟蓋飯上蒸一餐取起待冷方開乃調胃補心接丹田之氣也遠志甘草湯泡去骨取末一兩山梔炒焦色取末二兩香附童便浸半日溫水洗淨米醋炒細末二兩此三味再共研勻如法蒸一餐毋令泄氣乃透暢心包達膈間之滯氣也海石末二兩蒼朮米泔水浸去粗浮皮炒黃取末二兩此二味同蒸乃消痰飲而通內外之用也川芎末一兩北柴胡末一兩青黛一兩此三味和勻蒸如上法乃疏肝鬱調達者也夫心為脾母補心則土有力肝為脾賊平賊則國乃昌故曰安穀則昌用穀芽取粉打糊為丸如梧桐子大曬乾用益元散五錢水飛過神砂五錢共研勻為衣食後少頃白湯下量人大小輕重數服之異功散治中氣不足純陰無陽諸證在小兒痘瘡癢塌為回生要藥非虛寒不用木香當歸各三錢官桂茯苓白朮各二錢人參厚朴肉豆蔻丁香陳皮各二錢半半夏附子各一錢半又每服二錢薑三片棗二枚同煎空心溫服噎膈翻胃門治膈噎效方白槿十朵夏秋用鮮花春冬用乾花用日曬乾連青蒂煎下杵頭粳五分或稻米穀米只用杵頭上黏的掃下二味水二鍾早午晚一日三服即愈回生丹烏梅十二個水浸去核硼砂二錢緑豆黑痘各四十九粒百草霜五錢硃砂二錢雄黃一錢乳香一錢上將砂豆黃香五味為細末入烏梅肉並百草霜搗勻為丸如彈子大就濕以乳香硃砂為衣陰乾每服一丸空心噙化待藥盡烙熱餅一個茶半碗將餅扯碎茶泡食之無礙為驗過三五日再依法服一丸即愈治胃氣冷吃食後即欲得吐以白豆蔻子三枚搗篩更研細好酒一盞微溫調之並飲三兩杯治翻胃用豆腐鍋巴黃色者佳炒研末每服三錢用砂糖水調服白湯下以好為度療噎膈反胃威靈仙一把醋蜜各半鍾煎五分吐出宿痰愈去貓胞衣鶴糞家喂者等分為末每服二分黃酒下忌燒酒還元散病人自己糞不拘多少竹刀削起土白蘿蔔一枚竹刀削去頂蓋剜孔入糞蓋以原頂竹籤簽住炭火煨至粉紅色研末不拘茶酒飯食以少許拌入頻服即愈勿令本人知令噁心也翻胃祕方取一狗餓數日香油拌糯米晚米與食過三升將糞盛麻布袋水中漂淨炒成粉加木香少許蔥白做粥食之即愈甘露飲治翻胃吐食寬利胸膈養脾胃進飲食當州一富人病反胃往甘露寺設水陸夢僧與湯一杯飲罷少快及入寺供湯即夢中所飲求其方服數十劑遂瘥方開後干餳𩞄頭醋者六分生薑四分洗淨和皮相拌搗爛捏作餅曬乾每十兩炙草二兩同碾蘿為末每服二錢入火鹽沸湯點不拘時服人參利膈丸方見脾胃白果散治翻胃白果取汁半斤蜂蜜半斤半夏末五錢三味調勻重湯頓滾半炷香取起服後服火酒一鍾七日如神五膈寬中散治七情四氣傷於脾胃胸膈痞滿氣逆痰停遂成五膈白豆蔻二兩甘草炙五兩木香三兩另研厚朴薑汁炙熟一斤砂仁丁香青皮陳皮各四兩香附子炒六兩上為細末每服二錢鹽少許煎沸湯不拘時煎服霍亂門治中湯治脾胃不和嘔逆霍亂或中滿虛痞泄瀉等症人參甘草炙乾薑泡白朮青皮陳皮各一兩上每服五錢水煎服嘔吐不已加半夏等分丁香減半名丁香溫中湯藿香正氣散治感冒頭疼憎寒壯熱或感濕氣霍亂吐瀉伏暑吐瀉轉筋前胡大腹皮白茯苓白芷各一兩白朮厚朴桔梗甘草紫蘇各二兩藿香陳皮各三兩半夏薑汁炒二兩上每服一兩水一鍾半薑三片棗一枚煎八分熱服如欲汗加蔥白三莖以衣蓋渣再煎服冷嗽喘滿加人參杏仁五味子心腹疼加延胡索木香嘔甚加生薑五片名順氣木香散華他救急方治上吐不止又復下瀉頭旋眼暈手足轉筋四肢逆冷用藥遲緩難救吳茱萸木瓜食鹽各五錢上三味同炒焦用磁罐盛水二升煮令百沸卻入前藥同煎至一二升已下傾盞內隨病人意冷熱服之入腹即醒如蒼卒無藥以枯白礬末每服一錢百沸湯點服如無礬以鹽一撮醋一盞同煎八分溫服鹹酸皆可服痧症門干霍刮上下不得吐利出冷汗氣將絶用鹽一大匙炒紅用童便一碗二味溫和服之少傾吐下即愈俗名攪腸砂腹痛結腸沙陽沙腸痛手足暖陰沙腹痛手足冷身有紅點好明礬三錢滾水調服陽沙以針刺其手指近爪甲處分半許出血即愈乃先自兩肩將其惡血令聚指頭陰沙以燈草油點火燒其身火龍丹治心痛腹痛絞腸沙雄黃稻硝等分研為極細末每用些少點小眼角立效心腹門附嘈雜等症治心痛奇方大人二錢小兒一錢立效木香沉香大黃甘草官桂各一錢共為細末黃酒調下心痛效方香附生八分鬱金真者一錢甘草五分煎服又方五靈脂廣木香等分研末黃酒調下即止治心氣痛陳香圓一兩細辛一兩水一碗煎五分服治心疼良薑一兩浸一宿香附一兩醋浸一宿次日取土焙乾各磨成末各用小磁罐收貯紙封固該用各取五分滾水調服即愈心痛即胃脘痛雖日數多不食不死若痛方止使進食還痛必須三五服藥方少進食痛甚者脈必伏用溫藥附子之類不可用參術諸痛不可補氣用山梔子炒去皮每服十五枚濃煎湯一呷入生薑汁令辣再煎小沸吞九枚又入川芎一錢極妙痛發者用二陳湯加川芎蒼朮倍加炒梔痛甚者加炒乾薑從反治之法也藥味等分為末薑汁和蒸餅丸桐子大每服五十丸熱薑湯下輕者川芎蒼朮各一兩山梔子炒去皮二兩薑汁蒸餅糊丸每服七八十丸熱薑湯下重者桂枝麻黃石鹼等分同前丸法每服十五丸辣湯下凡治此病必先問平日起居何如有因平日喜食熱物以致死血留於胃口作痛用桃仁承氣湯下之若夫輕者用韭汁桔梗能開提其氣血藥中兼用之心痛用山梔並劫藥止之若又復發前藥必不效可用玄明粉一服立止治熱心痛或發或止久不愈金鈴子延胡索各一兩細末量服一二錢溫酒調白湯下愈後服枳朮丸去其餘邪枳術各二兩燒飯為丸服治實心痛心胸高起按之更甚雄黃一兩巴豆五錢去皮油研入白麵二兩研勻水丸梧子大漿水煮十二丸熟漉入冷漿水內令沉每一時用浸藥令漿水下一丸日盡十二丸利不可再服宜服藳本湯去餘邪藳本五錢蒼朮米泔浸炒一兩分二貼水煎服治寒心痛與中寒門同用理中等湯治氣心痛半夏炮七錢半延胡索炒桂心各二錢半乳香七分半人參一錢半甘草炙一錢分二貼每貼十二盞薑棗煎食遠溫服婦人加川芎當歸各一錢治心脾積痛婦人血刺氣痛及中酒惡心腸滑泄瀉良薑炒二兩茴香炒七錢甘草蒼朮制各二兩八錢細末每服二錢鹽湯或酒調服煎服皆可治中惡心痛用車脂以溫水調急攪服之吐即愈治急心痛牙關緊欲死用老蔥白三五根去須皮葉搗爛如膏斡開口以銀匙將蔥送入喉中用麻油四兩灌之送下即蘇治九