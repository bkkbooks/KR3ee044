蓯蓉浸一宿石菖蒲褚石杜仲薑汁酒拌同炒斷絲舶茴香各一兩枸杞熟地各二兩上為細末煉蜜同棗肉如桐子大每服三十丸溫酒或食鹽湯下日三服食後五日覺有為十日精神爽半月氣壯二十日目明一月夜思飲食冬月手足常暖久服令人身體輕健筋骨壯盛悅澤難老更看體候加減如熱加山梔子心氣不寧加麥冬少精神加五味子陽弱加續斷常服茴香無瘴瘧婦人服之容顏悅澤暖子宮去一切病補中益氣湯方見氣分資生丸方見泄瀉八味地黃丸方見血分參苓白朮散方見脾胃種子門萬靈至寶仙酒治男子精清精滑白濁遺溺諸虛百損五勞七傷諸風雜症生精益腎助陽補陰身體強健陽痿舉發又治婦人赤白帶下月水不調肚冷臍痛未孕者即孕淫羊藿酒洗淨十兩剪碎仙茅糯米泔浸一宿竹刀削去粗皮黑頂四兩雄黃二兩碎當歸酒浸洗淨八兩黃柏去粗皮二兩列當四兩如無以肉蓯蓉代之知母去尾二兩上切碎用無灰酒十五斤裝入瓶內封固桑柴文武火懸煮三個時埋地內三晝夜去火毒抱出待七日將藥撈出曬乾為細末稻米麵打糊丸桐子大酒藥同服仍以乾物壓之此酒用銀壺或磁壺重湯煮熱服酒後不可妄泄待時而動少則三月多則半年精泄胞成屢試屢驗王完虛公服藥兩月隨獲三胎三僕服之皆孕內一人六十婦五十二矣已絶産念二年亦孕則尤異也鄒平縣一人精清無子服之生一男忌牛肉鐵器宜陰臟人黑鬚育子青娥丸川杜仲去粗皮淨一斤切片用鹽四兩煎湯浸主治腎疼骨痿川故紙淨一斤分二分酒薑汁各浸八兩主治勞損腎冷陽衰萆薢去節刺淨一斤分四分處人乳童便薑汁酒各浸主導膀胱宿水關節者上藥浸三日取出去汁不用共一處陰三日曬三日星月全夜露天之下炒乾為末用糯米一官升煮爛飯先用核桃肉一斤去細皮將飯與核桃肉合一處搗千槌不見核桃肉白星為度即於月下丸起不得次日失太陰之精丸桐子大早晚二服每服一錢五分宜陰臟人種子烏須五加皮方南五加皮不拘多少銅刀刮去粗皮無灰酒浸一宿取出微炒為細末不炒則瀉空腹無灰酒下三五茶匙或用麵糊丸緑豆大每服七八十丸空心酒鹽湯白水任下化積氣去垢滯固腎健陽聰耳明目服未十餘日小便出汗稠黏此疾去也勿懼服丸月餘方見效魯定公母單服此酒不死張子聲等服之生二十餘子壽三百南者微白而軟大類桑白皮北者微黑而硬此其辨也五葉者良三葉四葉者次之煨蛇脫人參宜遠志葉散痹疹根莖煎酒活四肢風痹鹿杞膏枸杞一斤入水鍋內桑柴煮以杞無味為度去滓存汁再熬如麵糊入鹿膠一斤磁孟內重湯煮候筋挑一二尺高成線不斷取起俟稍凝切成片服時先用水頓化臨服酒調空心服初一錢漸加至二錢大能益壽助陽種子妙難盡述三才丸方見補益久服體健無疾陰不足者服者更效又方陽不足者服此藥兼服前藥妙難盡述沙苑白蒺藜淨八兩微炒甘州枸杞子淨八兩微炒南魚鰾細長白淨者八兩切豆大塊蛤粉炒成珠為細末煉蜜丸梧子大空心好酒下二錢半地黃丸生精養血補腎益肝退翳膜遮睛除羞澀多淚並治暴亦熱服祛風明目久服能黑鬚發多子是治陽臟人懷生地熟地俱酒洗各兩四沙苑蒺藜炒川牛膝酒洗甘州枸杞獨活兔絲子酒浸曬知母鹽水炒黃柏酒炒各二兩共九品上為細末煉蜜丸桐子大每服八十丸夏月淡鹽湯下余月酒下忌燒酒白蘿蔔鴿子種子方淨魚膠一斤白者佳麵炒成珠研用知母二兩去尾酒炒破故紙二兩酒浸炒生熟地各三兩韭子二兩鹿角霜二兩酥炙用沙苑蒺藜三兩酒煮曬乾為末山萸肉三兩大當歸四兩去尾核桃肉四兩搗用青鹽一兩枸杞三兩煉蜜丸如梧子每服五十丸酒或鹽湯又五子衍宗丸枸杞子八兩兔絲子八兩覆盆子五兩去目遼五味一兩車前子二兩加仙茅八兩春用丙丁巳午日夏用戊己庚戌丑未秋壬癸亥子日冬甲乙寅卯日合日忌鰥寡婦人雞犬見之蜜丸酒下種子方蒺藜四兩同州者佳再用重籮籮二兩粗末二兩用水煎膏加蓮鬚四兩黃色者佳山萸肉三兩研極細末覆盆子三兩南者佳雞頭肉四兩龍骨五色者佳入鍋火煉上共為末蒺藜膏肉加蜜為丸清晨臨臥俱服又黑豆神方何首烏八錢用黑豆酒製骨碎補五錢銅刮舌毛蜜水拌蒸當歸五錢酒洗枸杞一兩五加皮五錢蒺藜四錢樁去刺酒拌蒸牛膝七錢酒浸蒸槐角一兩生地五錢青皮五錢去穰金櫻子六錢去毛淨棗仁五錢杜仲五錢薑汁炒斷絲肉蓯蓉四錢酒洗去鱗膜遠志五錢甘草水浸蛇床子四錢酒拌蒸青鹽二兩破故紙六錢微炒巴戟五錢酒洗去骨附子五錢童便甘草薑三制鎖陽五錢以酥油塗炙紫梢花五錢去骨上藥入水二十碗煎十碗渣再煎十碗共三十碗藥用小黑豆十五碗拌浸蒸曬以藥完為干年少之人後四味不必用眩暈門治眩暈清暈化痰湯治眩暈之總司陳皮半夏白茯苓各一錢五分枳實一錢川芎黃芩酒炒各八分白芷細辛南星薑汁炒防風羌活各七分甘草三分生薑三片水煎服作丸亦可氣虛加人參七分白朮一錢血虛加芎歸有熱加黃連薑炒七分一人不慎酒色因勞怒頭暈仆地痰涎上湧手足麻痹口乾引飲六脈洪數而虛乃腎經虧損不能納氣歸元而頭暈不能攝水歸源而為痰陽氣虛熱而脈麻痹虛火上炎而作渴補中益氣合六味丸料治之而愈一人症如上或熱從腹起左三脈洪而有力右三脈洪而無力乃足三陰虧損用補中益氣加麥冬五味加減八味丸而愈一方治頭眩吐逆不思飲食炮薑二錢半甘草炙二分水鍾半煎七分食後溫服癲癇門養心丹治虛風頭旋吐涎不已此藥能升陰降陽接補真氣非止頭眩而已黑鉛水銀硫黃研硃砂研各一兩上用建盞一雙火上溶鉛成汁次下水銀用柳杖打停取下