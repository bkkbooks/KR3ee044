body:
  text: 身經通考卷四方選中風門攝生散治一切卒中不論中風中寒中暑中濕及痰飲痰厥氣厥之類初作即用此劑南星半夏薑汁泡木香各一錢五分蒼朮細辛石菖蒲生甘草各一錢上水一鍾半生薑七片煎至八分溫服痰盛加全蠍炙二枚仍先用通關散搐鼻若牙噤者用烏梅肉擦牙和南星細辛末以中指蘸藥擦自開通關散治卒中風邪昏悶不醒牙關緊急湯藥不下牙皂生半夏南星細辛上共為末每用少許吹入鼻內候有嚏可治八味順氣散凡中風人先服此藥順氣次可進治風藥兼理七氣拂鬱令人手足厥冷白朮茯苓青皮白芷陳皮烏藥人參各一兩甘草炙五錢上共為細末每服三錢水一盞煎七分溫服大秦艽湯治中鳳手足不能運動舌強不能言語外無六經形證內無便溺阻隔且血弱不能養筋秦艽石膏各三兩甘草川芎當歸羌活獨活防風黃芩白芍藥白朮白芷生地熟地各二兩白茯苓二兩細辛五錢上㕮咀每服一兩水二鍾煎至一鍾通口服天陰雨加生薑七八片如心下痞加枳實一錢搜風順氣丸治三十六種風七十二般氣上熱下冷腰腳疼痛四肢無力百節痠軟便溺閉澀車前子一兩半白檳榔防風各一兩火麻子微炒去殼另研一兩菟絲子牛膝各二兩乾山藥二兩枳殼獨活各一兩大黃五錢半生半熟郁李仁湯泡去皮另研五錢上為細末煉蜜丸梧桐子大每服二十丸茯酒米飲任下早晨臨臥各一服三化湯治中風二便數日不通邪氣內實厚朴大黃枳實羌活各等分上每服三兩水三碗煎至一碗半終日服之以微利則已轉舌膏治中風舌蹇不語涼膈散加菖蒲遠志各少許煉蜜為丸如櫻桃大硃砂為衣每服三五丸用蒲荷湯化開或食後或臨臥或食遠服加青黛藍根各一分為活命金丹治中風神不清救急稀涎散治卒中風昏昏若睡形體昏悶四肢不收豬牙皂角四挺肥實不蛀削去粗皮晉礬一兩光明通瑩者二味同搗為細末如患輕者可服半錢重者三字匕溫水調灌下神驗烏龍丹治手足嚲曳口眼喎斜言語蹇澀履步不正者烏頭去皮尖五靈脂各五兩上為末入龍腦麝香令研細滴水丸如彈子大每服一丸先用生薑汁研次後調服之一日兩服空心晚食前服治中風口噤服淡竹瀝一升瓜蒂散方見痰門凡病在胸膈者宜吐之涼膈散方見感冒傷寒門汗法桂枝湯凡邪在表者宜汗之桂枝三錢赤芍二錢甘草二錢生薑五片大棗三枚上蒸盞半煎八分溫服取微汗麻黃湯麻黃三錢桂枝一錢甘草五分杏仁八枚水盞半先煎麻黃數沸後加生薑三片棗一枚同煎至八分溫服覆取汗蓋麻黃性熱惟冬時正傷寒無汗者用之春夏不可輕用服之恐發斑發黃如用加石膏知母黃芩又參蘇軟方見感冒小柴胡湯方見感冒門下法小承氣湯凡邪在中下部者宜下之方見感冒大承氣湯三焦俱有邪盛用之大黃錢酒洗芒硝一合厚朴二錢枳實一錢水二鍾煎一鍾溫服十神湯治時行不正之氣冬寒春溫不問陰陽二證及內外兩感風寒腰膝痛濕痹頭痛咳嗽陳皮麻黃去皮川芎蘇葉香附子白芷升麻乾葛赤芍各一錢甘草五分上水二鍾薑五片棗一枚煎至八分不拘時服潮熱加黃芩柴胡心胸脹滿加枳實半夏頭痛加細辛石膏咳嗽加五味子桔梗飲食不進加砂仁白朮鼻衄不止加烏梅山梔仁嘔吐加丁香半夏腹脹加白朮炮薑冷氣痛加良薑延胡索大便祕澀加大黃朴硝有痢加枳殼當歸黃連瀉泄加藿香澤瀉疹毒加人參茯苓去麻黃香附呂真人達玄散專治傷寒瘟疾痘疹初覺無名腫毒卒感心疼冷氣喉閉乳哦瘧疾時行赤眼內外吹乳用銀簪蘸香油黏藥點大眼角男先左女先右合目踡腿蓋被側臥出汗後吃清米湯稀粥如瘟疾久不汗此藥先吹鼻次點眼蓋被覆臥半灶香即汗陳米湯調養一日後方服稀粥白犀角通梢白者佳鎊屑一兩山慈菰一兩銼碎麻黃一兩去根節切細朴硝一兩淨牙血竭一兩碎共合一處生薑汁自然拌濕分十八劑各用烏金紙包裹外用熟棗二斤去核搗如泥各包彈子大擺沙盆內以沙盆蓋上下加火煙盡為度候冷取出其藥如黑炭者佳紙去淨和勻每一錢加冰片二分研極細收磁瓶內蠟封口勿泄氣此藥治傷寒愈人甚衆有立見出汗者神效救苦散治傷寒不服藥川芎藿香藜蘆各三錢延胡索牡丹皮硃砂各一錢白芷皂角各四錢共為細末每用些須以竹筒吹入兩鼻卻飲熱蔥茶一碗蓋覆出汗即愈發汗散此在途急救之藥緑豆粉麻黃甘草各一兩末之每服一錢涼水調下即汗又方胡椒三錢整蔥七錢搗爛手握之夾兩腿中即汗四時傷寒點眼方冰片一分粉草自然面枯礬極淨面各一錢共為末研勻銀簪蘸無根水點先服白滾湯二三碗點後兩手緊抱兩膀屈膝片時汗出點一二次汗即遍手至足傷寒初得不問陰陽肥皂角二挺燒紅為末熱水五合燉服之陰症更效神效沃雪湯治傷寒二症未辨時行惡氣相傳蒼朮堅者泡刮去皮乾薑炮甘草炙各六兩厚朴去皮薑製防風嫩者白芍去皮葛根各四兩每服四錢水二鍾煎八分不拘時熱服少頃取生薑蔥作羹或粥服之坐臥避風身體微潤即愈如疫氣正相傳染清晨進一服為佳陷胸湯治結胸方見諸書綿花子酒治初感寒屢驗綿花子一撮炒黃搗破黃酒煮滾去子飲一大鐘即時汗出治傷寒七日內皆可服不問有汗無汗食前食後防風一錢五分枳實白芷各一錢五分紫蘇川芎各一錢二分陳皮甘草各五分薑三片棗二枚水煎五仙湯治時氣之日前者半酒半水煎服即汗茶葉核桃仁艾葉緑豆各一撮蔥根三莖傷寒厄逆諸藥不效雄黃二錢酒一盞煎七分乘熱嗅之即止抵當湯治血結胸譫語瘀血狂言小腹滿漱水不欲咽水蛭十枚虻蟲十枚桃仁十枚大黃八錢水二鍾煎一鍾溫服血未下再服抵當丸當汗失汗熱毒深入吐血身黃水蛭虹蟲各五枚桃仁六個大黃二錢為細末作一丸水二盞十棗湯治心下痞硬脅痛乾嘔短氣汗出不惡寒芫花甘遂大戟各等分水鍾半先煎大肥棗十枚取八分內藥末弱人五分強人一錢平旦溫服若上病不除明旦再服加半錢利後粥調養破棺丹大黃二兩半生半熟芒硝一兩上為末煉蜜丸彈子大每服半丸或一丸二丸食後童便入酒各半化服或白湯合酒化服感冒門兩解神效方內外兩感腑臟俱病欲表則有里欲下則有表表裡不能一致故云兩感者不治然稟有虛實感有深淺未有不治而獲安者也立此酌用焉羌活獨活防己防風黃芩黃連蒼朮米泔浸白朮甘草炙川芎細辛各三錢生地知母各一兩每服五錢水煎熱服不解連服三四劑雙解散通聖天水各一半水二鍾生薑三片蔥白三根同煎七分熱服取汗參蘇飲紫蘇一錢前胡二錢桔梗一錢枳殼一錢乾葛二錢陳皮一錢半夏一錢茯苓一錢甘草七分人參七分木香五分氣盛者去之生薑棗子煎食後溫服小柴胡湯柴胡一錢黃芩一錢人參一錢半夏一錢甘草五分水二盞薑三片棗一枚煎服葛根柴胡湯柴胡一錢半蒼朮一錢荊芥一錢麻黃一錢甘草當歸五分葛根五分水二鍾生薑三片棗一枚煎服葛根蔥白湯葛根一錢芍藥一錢知母一錢川芎一錢生薑三錢蔥白五寸水二鍾煎一鍾服九味羌活湯方見瘟疫小承氣湯去上焦之痞熱大黃四錢厚朴二錢枳實一錢水二鍾煎一鍾溫服生料五積散治身體拘急四肢浮腫腰膝疼痛胸膈停寒臍腹脹滿脾胃宿食不消痰飲不行嘔逆噁心內傷生冷外感風寒婦人經事不通飲聚膈上可以探吐陳皮乾薑半夏茯苓枳殼麻黃桔梗官桂厚朴蒼朮白芷川芎當歸芍藥各八分甘草炙五分上水二鍾薑三五片棗一枚煎八分食遠服咳嗽加杏仁桑白皮身體痛加羌活柴胡手足風緩加烏藥防風腰痛加杜仲小茴香手足拘攣加秦艽牛膝大便祕甚者加大黃小便不利加木通滑石兩脅肋痛脹加青皮柴胡嘔逆作酸加黃連吳茱萸表虛自汗去麻黃加桂枝口燥渴去乾薑半夏加葛根天花粉瘟疫門太一救苦散治疫氣時行道途寒熱神驗奇驗煉過芒硝三錢雄精三錢硃砂三錢麝香五個上藥研極細貯小磁罐遇患人先將溫水擦眼後用骨簪蘸藥點兩大眼角臥暖處出汗即愈不可坐臥風處如復發仍照前法點之無不效者藿香正氣散方見霍亂門凡瘟疾初起之時於未病之先服之則邪自不犯瘟疫發斑淡豆鼓一兩六錢生地二兩六錢水三碗煎至一碗去渣雄黃豆大一塊麝少許為末調服身腫蒸馬糞敷之即愈食後即用所食之物燒研末米飲服二三錢勞復因交內腹痛卵腫蔥白搗爛醋一盞和服效陰陽易拘急拳攣小腹急痛頭不能舉速汗之過四日不治用藍葉一把雄鼠屎二十一枚水二鍾煎一鍾服之即汗避時疫神效方治一切不正之氣卻瘟疫除寒濕疫盛行時車前子隔紙焙為末服一鍾即不染防瘟疫傳染將初病人衣服於甑上蒸過則一家不染若向人問病先以清油抹鼻孔又拈紙於鼻內取嚏三五聲又用雄黃研細塗鼻孔中與病人同床亦不傳染初洗臉後及臥時點五瘟丹甘草甲己年為君黃芩乙庚年為君黃柏丙辛年為君梔子丁壬年為君黃連戊癸年為君香附減半紫蘇減半生用冬至日大黃二兩熬膏為丸硃砂雄黃為衣貼金箔每服一丸冷水敗毒散治四時瘟疫羌活獨活前胡柴胡川芎枳殼桔梗白茯苓人參各等分甘草減半每服五錢水鍾半薑三片煎一盞溫服日三服以效為度又活人心統方蒼朮米泔浸一宿麻黃黃芩乾葛川芎升麻甘草等分蔥白水二鍾薑三片煎八分食前服春加柴胡防風薄荷夏加石膏滑石黃連秋加羌活前胡枳殼冬加薑桂白芷細辛又方疫氣行時祭張元伯神即愈用棗一枚咒華表柱念七遍望天取氣一口吹棗上令病人嚼吃湯水任下此三字鬼之祖名也九味羌活湯治觸冒四時不正之氣憎寒壯熱頭疼身痛口渴水病腰以上腫微汗則愈服尤妙羌活防風蒼朮各一錢甘草四分細辛八分川芎八分白芷一錢生地一錢黃芩一錢上水二鍾煎至一鍾溫服陰症門回生膏治陰症如神飛礬黃丹乾薑等分為末連須蔥數莖搗爛敷臍熱磚烙之又鵓鴿糞一碗炒焦好酒衝入蓋一刻候清熱飲即行至下部臍間即好有冷汗為驗椒薑散用椒四十九粒黃丹飛礬各三錢乾薑丁香各一錢上為細末酒調勻男放左手心覆龜頭女放右手心覆陰戶炒黑蔥頭煎滾酒飲一茶鍾蓋被曲腿臥汗出即愈又飛白礬百草霜等分為末苦酒服蓋被汗出即愈又炙中指頂男左女右五十七炷即愈又白芥子槌爛作餅絹包臍上加紙一層包貼紙上尉斗尉之再吃薑酒內外交攻陽氣即回少遲不救暑治門治暑熱中心苦參為末每服二錢溫水調服並治發狂天水散治中暑身熱小便不利燥濕分水道實大腑化食毒行積滯逐瘀血解煩渴補脾胃降妄行之火也滑石水飛六兩甘草另研一兩上合勻每服三四錢新水調服為咀煎服每劑滑石六錢甘草一錢水一鍾半煎七分涼服痰多加半夏陳皮心煩神擾加辰砂五分調用血虛驚悸加當歸生地黃夜不寐加麥冬酸棗仁小草有汗加五味子黃耆膈脹食少加白朮枳實茯苓口渴加麥冬乾葛鼻衄加山梔仁牡丹皮茅根淋如沙加海金沙車前子小便血加小薊牡丹皮生地涼膈散治大人小兒臟腑積熱口臭生瘡痰實不利煩躁多渴腸胃祕澀便溺不利一切風熱並皆治之大黃連翹黃芩薄荷梔子朴硝甘草各一錢上水二鍾入蜜一匙竹葉十個煎八分不拘時服或為細末每服二錢蜜湯調服小便不利加車前子滑石心煩血少加當歸生地黃頭痛加川芎蔓荊子耳鳴加木通石菖蒲齒痛加升麻牡丹皮石膏脅痛加柴胡青皮目痛加黃連目脹加龍膽草咽痛喉痹加玄參射干桔梗口渴加天花粉有