作腹痛後重推陳致新平和不伐有積去積無積即安大有奇效川黃連一斤蒸吳茱萸合炒廣木香四兩檳榔四兩壯大黃四兩酒蒸吳茱萸二兩湯泡炒蓮右為末醋糊為丸梧子大空腹米湯下八十丸不效再服百丸真人養臟湯治大人小兒冷熱不調下痢赤白或如膿血魚腦裡急後重臍腹㽱痛肛脫墜下酒毒便血人參白朮當歸各六錢白芍藥一兩六錢木香一兩六錢甘草炙肉桂各八錢訶子肉一兩二錢肉豆蔻包麵煨半兩御米殼蜜炙三兩六錢上每服四錢水煎食前服忌一切酒面腥膩如臟腑滑泄不瘥加附子四片煎服愈如金丸此方屢效即乘危者皆合治諸兒泄瀉亦應驗黃連去須蘆切作片以生薑汁拌之用黃土鋪鍋底上隔紙炒乾如是七次為極細末水滴為丸黃連一斤約薑三斤取汁必水發一日曬乾為好凡痢重者三錢輕者二錢空心白湯下餓半日瀉泄門四神丸治脾腎俱虛子夜作瀉不思食不化食肉豆蔻二兩破故紙四兩茴香炒一兩木香半兩上為末生薑煮棗肉泥為丸梧桐子大鹽湯下一方去木香茴香入神麯麥芽一方泄瀉砂仁五錢懷山藥白朮蓮子去心各一兩為末白糖二兩滾水調服參苓白朮散方見脾胃止虛瀉祕方山藥二兩將一兩炒黃一兩生江西黑沙糖半碗拌勻生薑汁少許攪勻蒸熟空心調服治小兒泄瀉不止木鱉子一個面制燒熟去殼小丁香三粒共末唾為丸入兒臍膏藥封之小兒水瀉方牆上青苔一錢燒灰蜜水送下資生丸消食止泄調和臟腑飢者服之飽飽者服之飢平和穩當不犯寒熱無逾此方人參人乳浸透飯鍋上蒸熟三兩白朮米泔水洗用山黃土拌蒸丸次曬九次去土切片焙乾三兩白茯苓去皮水飛去筋膜人乳拌飯鍋上蒸熟曬乾一兩五錢橘紅山楂肉神麯炒各二兩黃連薑汁炒白蔻仁炒澤瀉炒各三錢半桔梗米泔浸炒藿香洗甘草炙各五錢白扁豆炒蓮肉去心皮各一兩薏仁炒三兩山藥炒麥芽曲炒芡肉炒各兩半蜜丸二錢重每服一丸薑湯下鬱症門越鞠丸越發散也鞠養也發散滯氣而調養之蒼朮香附撫芎神麯梔子各等分炒上末水丸緑豆大溫水下每服五錢子和越鞠丸桃仁去皮尖紅花香附醋製撫芎青黛各等分細末之水丸桐子大每五十丸白湯下或以生薑汁點大眥男左女右余以為此方最宜婦人以其悶氣多也調氣湯快氣釋思大利胸膈蘇葉一錢半蒼朮米泔浸香附醋浸炒川芎芍藥各一錢青皮枳殼各五分柴胡八分甘草三分水二鍾煎服若甚者加炒蘿蔔子吃蘿蔔湯交感丹治一切名利失意抑鬱煩惱七情所傷不思飲食面黃肌瘦胸膈痞滿香附二斤炒黃淨末一斤茯神為末四兩飛之更妙煉蜜丸彈子大每服一丸空心細嚼白滾湯磨沉香少許蘇子一撮炒熬湯下更速治食鬱胃脘有瘀血作痛上中部脈芤而澀胸中隱隱不快或痛生韭搗汁一盞加酒一二杯同服先嚼連皮桃仁數十枚韭汁送下痞積門二聖膏點痞塊化為膿血用末化石灰半斤為末瓦上微炒紅提出候熱稍減入大黃末一兩炒熱仍提出入桂心末五錢略炒以醋熬成膏厚攤烘熱點上即愈一方灸臍去積健脾槐樹白皮如錢厚照臍大小剪如錢蓋臍上蕎麥麵作圈指半高上孔小下孔大坐塊皮上食鹽填實再加蒜一片用艾灸之以臍熱為度多多益善面圈作二個好替用臍內先以椒水洗生薑擦以便通氣痞癖方核桃仁六十個火煨去皮海納子杏仁去皮尖桃仁去皮檳榔炒各一兩硃砂一錢上為細末煉蜜四兩丸指頭頂大不拘時服三稜丸治一切積滯不拘年遠日近京三稜四兩醋煮軟竹刀切片曬乾川芎二兩醋煮軟切片大黃半兩酷浸濕紙裹煨過切醋糊丸桐子大每服三十丸溫水下神功助化散治男子婦人腹中痞塊不拘氣血所成此方之妙不可盡述扁蓄五錢瞿麥穗二錢大麥芽五錢神麯五錢木香一錢半甘草五錢川大黃三兩上為細末男為燈心淡竹葉等分煎湯及無灰酒一同調服一錢酒多於湯婦人用紅花當歸燈心等分及無灰酒一同調服亦酒多於湯忌油膩動氣之物及房事一月須黃昏時服次早二便見惡物為度二仙膏明礬雄黃各二兩研細先將二兩水糊和成膏紙攤貼患處即效不效再以後二兩攤貼須看貼藥之後大便如膿下即愈八仙丹治諸般積聚痞塊蟲積食疾酒疾驗過大效大黃五兩檳榔三兩黑牽牛六兩頭末雷丸一兩錫灰八錢使君子六錢木香六錢蕪荑六錢共為細末用連須蔥一把煎三四沸露一宿用汁為丸梧桐子大每服三錢蔥湯送下蟲脹門消腫方用蝦蟆每十歲一隻糊椒一歲一粒將蝦蟆去皮頭足取淨用豬肚一個將椒蟆打碎人豬肚內以線縫固水煮爛空心吃如不愈再吃加味至寶丹此藥通之甚妙芫花甘遂大戟牽牛大黃青木香各為末七錢木通陳皮青皮桑白皮連翹葶藶砂仁椒目益智胡椒澤瀉檳榔豬苓車前蘿蔔子各五錢木香三錢麝香一錢上十七味共前六味為末醋煮麵糊為丸如桐子大量人虛實用之第一服消上部至胸更初用蔥酒送下一錢六分或一錢七分至巳時水瀉腫消不補自止第二服消中部至腹至腿五更陳皮湯一錢八九分或二錢水瀉腫消不補自止第三服消下部自腿至腳五更桑皮湯下二錢或加三四分至巳午時水瀉腫消不補自止服三日遍身消矣若有不消看在何部依前湯使再令患人吞下無不消矣前賢云蟲有五不治一曰面如青藜二曰肚大青筋三曰臍出如李四曰掌內無紋五曰腳腫無坑以為難治此藥善治五症取下黑尿者真不治也陽事不舉不治也服藥消腫之後切忌鹽醋魚腥鵝羊雞豬犬等物酒色生冷百日為效金不換木香丸大戟五錢芫花五錢甘遂五錢黑醜頭末二錢巴豆去殼五錢生熟各半大黃生五錢青皮五錢陳皮五錢木香五錢青木香五錢胡椒一錢川椒去目五錢益智仁五錢檳榔五錢大腹皮五錢苦