body:
  text: 身經通考卷三脈説古部李潦禹門父編述男皋漠昆令皋原秋臺同校桐溪仲弘道含齋父參訂何謂脈脈以瓜從永氣血各循其派經流而不已也經曰濁氣歸心淫精於脈是故心主脈脈者先天之神也故其晝夜出入莫不與天地等神寤則出於心而見於眼故脈晝行陽二十五度寐則棲於腎而息於精故脈夜行陰二十五度天之陽在南而陰在北故男子寸盛而尺弱地之陽在北而陰在南故女子尺盛而寸弱天之陽在南而陰在北故清陽之七竅皆見於面濁陰之二竅皆出於下地之陽在北而陰在南故三陽之脈皆聚於背三陰之脈聚於胸腹脈神也陽也陽行速猶太陽之一日一周天息氣也陰也陰行遲猶太陰之一月一周天然分而言之曰神曰氣曰血總而言之唯脈運行於氣血而已是以氣血盛則脈盛氣血衰則脈衰氣血和則脈平氣血風則脈病氣血壯則脈大氣血微則脈小氣血熱則脈數氣血寒則脈遲長人則脈長短人則脈短性緊則脈緊性緩則脈緩室女尼冠則脈濡嬰兒稚子則脈急脈為氣血之體氣血乃脈之用也然則氣血能使脈之盛衰又何以致之蓋因谷入於胃脈道乃行穀氣多則氣血榮昌脈亦盛也穀氣少則氣血微弱脈亦衰矣故經曰四時以胃氣為本脈無胃氣則死論脈而至此脈之為脈豈非太乙天真之元氣乎何謂寸關尺三部凡診脈先以中指揣掌後有小高骨便是關脈然後下前後二指關前至魚際得同身之一寸故名為寸口為陽關後至尺澤穴得同身之一尺故名為尺部為陰又寸脈六分關脈六分其上三分入於寸內是陽得寸內九分陽數九也尺內七分關下三分入於尺內是陰得尺內一寸陰數十也終始一寸九分天和六脈六甲王脈四時平脈合而用之則三才之道備矣然寸部以應上焦心肺居上也關部以應中焦肝脾居中也尺部以應下焦腎命居下也左寸心與小腸動脈之位君火也右寸肺與大腸動脈之位燥金也左關肝與膽動脈之位風木也右關脾與胃動脈之位濕土也左尺腎與膀胱動脈之位寒水也右尺命門與三焦動脈之位相火也故以循環之序言之則左尺水生左關木左關木生左寸火左寸火接右尺火右尺火生右關土右關土生右寸金右寸金生左尺水生生之意不絶有子母之親也然以對待之位言之則左寸火克右寸金左關木克右關土右尺水克右尺火左剛右柔有夫婦之別也然左手屬陽右手屬陰左寸君火以尊而在上右尺相火以卑而在下有君臣之道也三部之中有此自然之理學醫者不可不盡心也何謂反關脈脈不在前三部或在手腕之後名曰反關自列缺至陰溪脈見者曰反關此經脈虛而絡脈滿也何謂看脈之時平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故可觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶死是以人醉莫與診視自醉莫診視他人或乘車走馬必待寧息方與診視終不及平旦為佳也何謂四時之脈附圖説人稟天地之氣由四時而生與溫暑涼寒相為推遷故必先明四時之脈然後可診有病之脈內經云冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期春弦夏鉤秋毛冬石此之謂也春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善怒忽忽眩冒而顛疾不及則令人胸痛引背下則兩胠滿春以胃氣為本春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病夏脈者心也南方火也萬物之所以盛長也故其氣來盛氣衰曰鉤反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱膚痛為浸淫不及則令人煩心上見咳唾下為氣泄夏以胃氣為本夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病秋脈者肺也西方金也萬物之所以收藏也故其氣來輕虛以浮來急去散曰毛反此者病其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛不及則令人喘呼吸少氣而咳上氣出血下聞病音秋以胃氣為本秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死胃而有弦曰春病弦甚曰今病冬脈者腎也北方水也萬物之所以合藏也故其氣來沉而搏曰石反此者病其氣來如彈石此謂太過病在外其去如數此謂不及病在中太過則令人解㑊脊痛而少氣不欲言不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變冬以胃氣為本冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病脾脈者土也孤臟以灌四旁者也平脾脈來如雞踐地其來如水之流此謂太過病在外如鳥之喙此謂不及病在中太過則令人四肢不舉不及則令人九竅不通長夏以胃氣為本胃惟軟弱曰平弱多胃少曰脾病但代無胃曰死軟弱有石曰冬病石甚曰今病春得肺脈夏得腎脈秋得心脈冬得脾脈名曰逆四時春夏脈沉澀秋冬脈洪大亦曰逆四時附圖説以平治之紀為例若太過之紀其氣未至而至從節前十三日為度不及之紀其氣至而未至從節後十三日為度太過之歲從左尺浮分起立春不及之歲從左關中分起立春依次而推之此六氣至理如左關脈獨弦大已知雨水後驚蟄邊有風熱之症蓋弦主風大主熱也如右尺沉分脈獨緩滯而實大已知芒種後夏至邊有濕熱之病蓋緩滯主濕實大主熱也若緩滯虛大乃濕熱相火為患蓋緩滯為濕而虛大為相火也何謂流轉晝夜之脈附圖周天三百六十五度太陽一日行一度從房至胃十四宿為陽主晝正人身血氣行陽二十五度也從昴至氏十四宿為陰主夜正人身氣血行陰二十五度也蓋人身經絡共長一十六丈二尺手三陽之脈從手至頭長五尺五六合三丈手三陰之脈從手至胸中長三尺五寸三六一丈八尺五六三尺合二丈一尺足三陽之脈從足至頭長八尺六八四丈八尺足三陰之脈從足至胸中長六尺五寸六六三丈六尺五六三尺合三丈九尺人兩足蹻脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各長四尺五寸二四八尺二五一尺合九尺凡脈長一十六丈二尺也一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸十息脈行六尺百息脈行六丈二百七十息脈行一十六丈二尺氣血周身一度也漏水下二刻焉至明日寅時周身五十度脈行八百一十丈該一萬三千五百息漏水下百刻焉日行二十八舍也其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手厥陰少陽少陽注足少陽厥陰厥陰復還注手太陰周而復始循環無端氣主熙之血主濡之脈在其中為之樞紐也春秋分晝夜兩停脈行五十度臺乎正數也若冬至之後晝四十刻夜六十刻陰多陽少氣血凝澀而脈道遲止行四十度也夏至之後晝六十刻夜四十刻陽多陰少氣血滑利而脈道疾反行六十度也若天氣暴熱脈行亦疾天氣暴寒脈行亦遲故人不能調養以順造化之氣則生病而脈變矣何謂無病之脈一呼心與肺一吸腎與肝呼吸定息為脾位其相輪而迭至也肺主一六心主二七脾主三八肝主四九腎主五十自寅至申行陽二十五度自申至寅行陰二十五度通計十六丈二尺一萬三千五百息春肝脈弦細而長夏心脈浮大而洪長夏脾脈軟大而緩秋肺脈浮澀而短冬腎脈沉濡而滑小腸洪大而緊膽弦大而浮膀胱洪滑而長心包沉弦而敦大腸浮短而滑胃浮長而滑三焦洪散而急參以四時王相休作無過不及之患命曰無病之脈何謂有病之脈以脈之大綱言之初持脈輕手候之見於皮膚之間者陽也腑也心肺之應也蓋心肺在上故其脈皆浮若浮大而散者心也浮澀而短者肺也重手按之附於肌肉之下者陰也臟也肝腎之應也蓋肝腎在下故其脈皆沉若弦而長者肝也沉而軟滑者腎也不輕不重中手取之脈應於肌肉之間陰陽相適中和之應脾胃之候也蓋脾居中州故脈緩而大此為五臟之平脈診視者必審知平脈然後乃可以辨有病之脈若短小而見於皮膚之間者陰乘陽也洪大而見於肌肉之下者陽乘陰也寸尺皆然上逆寸為溢為外關內格此陰乘陽之脈也下入尺為覆為內關外格此陽乘陰之脈也又以脈之十二經細分之脈有浮沉診有輕重左寸先以輕手得之是小腸屬表後以重手如六菽之重得之是心屬裡心在肺下主乎血脈心脈循血脈而行按至血脈而得為浮稍加力脈粗而大又稍加力脈道軟潤而散此乃浮大而散不病之脈也若出於血脈之上見於皮膚之間是其浮也入於血脈之下見於筋骨之分是其沉也左關先以輕手得之是膽屬表後以重手如十二菽之重取之是肝屬裡肝在脾下主乎筋肝脈循筋而行按至筋平脈如箏弦為痃次少加力脈道迢迢為長此弦長不病之脈也若出於筋上見於皮膚血脈之間是其浮也入於筋下見於骨上是其沉也左尺先以輕手得之是膀胱屬表後以重手取之如十五菽之重得之是腎屬裡腎在肝下主乎骨腎脈循骨而行按至骨上得之為沉又重手按之脈道無力為濡舉指來疾流利者為滑此乃沉涯而滑不病之脈也若出於骨上見於皮膚血脈筋骨之間是其浮也人而至骨是其沉也右寸先以輕手得之是大腸屬表後以重手取之如三菽之重得之是肺屬裡肺居最上主乎皮毛肺脈循皮毛而行按至皮毛而得者為浮稍加力脈道不利為澀又稍加力脈道縮入關中上半指不動下半指微動者為短此浮澀而短不病之脈也若出於皮毛之上見於皮膚之表是其浮也人於血脈筋肉之分是其沉也右關先以輕手得之是胃屬表後以重手取之如九菽之重得之是脾屬裡脾在心下主乎肌肉脾脈循肌肉而行按至肌肉如微風颭柳之狀為緩又稍加力脈道敦實為大此為緩大不病之脈也若出於肌肉之上見於皮毛之間者是其浮也入於肌肉之下見於筋骨之分者是其沉也右尺先以輕手得之是三焦為表後以重手得之是命門屬裡為相火氣與腎通也復以脈之三部九候細分之三部者寸關尺也九候者浮中沉也凡三部每部各有浮中沉三候三而三之為九候也浮主皮膚候表及腑中主肌肉以候胃氣沉主筋骨候里及臟寸為陽為上部法天為心肺以應上焦主心胸以上至頭之有疾也關為陰陽之中為中部法人為肝脾以應中焦主膈以下至臍之有疾也尺為陰為下部法地為腎命以應下焦主臍以下至足之有疾也再以五行生剋之理詳推之相生者謂金生水水生木木生火火生土土生金是也相剋者謂金剋木木剋土土剋水水剋火火剋金是也凡脈遇相生則吉遇相剋則凶何也蓋心若見沉細肝見短澀腎見遲緩肺見洪大脾見弦長皆遇克也為鬼賊相侵危症也又心若見緩肝見洪肺見沉之類是子扶養於母遇我之所生也雖病易瘥若夫腎病傳肝肝病傳心之類此母來抑子病雖不死亦綿延日久矣又我克者為妻假如春屬木脈見脾土是夫得妻脈也妻來乘夫雖非正克然春中獨見脾脈土乘木衰土乘之則生金來剋木矣若肝脈弦緩而本體尚存脾土雖乘之為微邪不足慮也若本脈全無而獨見脾緩之脈其為害也必矣脈賦云假令春得肺脈為鬼得心脈則為肝兒腎為其母脾則為妻故春得脾土生金剋木而莫療冬見心火生土剋水而不治夏得肺金生水剋火而難瘥秋得肝水生火剋金亦可疑此即四時休王以倒生克之義也然脈之息數以四至五至為平和不大不小和緩舒暢為無病至於三遲二敗冷而危也六數七極熱生多也八脫九死極於十一二至與夫奄奄兩息一至則又散而變矣如六數七極為熱脈若有力謂之有神當泄其熱三遲二敗為寒脈若有力謂之有神當去其寒若脈無神而無胃氣豈可輕泄而輕去之哉元朝名醫謂脈之大要不外乎浮沉遲數滑澀六者而已浮脈輕手取之沉脈重手取之而遲數之脈以己之呼吸取之滑澀之脈又察乎往來之形狀也浮者陽也脈在肉上行也輕手乃得而芤洪散大長濡弦皆輕手而得之類也沉者陰也脈在肉下行也重手乃得而伏石短細牢實皆重手而得之類也遲者脈不急也一息二三至而濡緩皆遲之類也數者脈來速也一息六七至而疾促皆數之類也至於滑澀之脈則於往來之形狀察之浮而陽在表為風為虛沉而陰在裡為濕為實數在腑為熱為陽為燥遲在臟為寒為冷為陰滑而血多氣少澀而氣多血少滑為血有餘澀為氣獨滯是六脈之大要也至於疾病為症又有陰陽表裡之辨蓋六淫之邪襲於經絡而未入於臟胃如左手人迎脈緊盛大於氣口一倍為外感風與寒也皆屬於表為陽也腑也七情之氣鬱於心腹之內不能越散飲食五味之傷留於腸胃之間不能通泄如右手氣口脈大人迎一倍脈緊盛為傷食為勞倦皆屬於里為寒也臟也若人迎氣口俱緊盛此為夾食傷寒為內傷外感也又陽經取決於人迎陰經取決於氣口左脈不和為病在表為陽主四肢右脈不和為病在裡為陰屬五臟何謂病根之脈凡病之大小輕重必有其根惟審其根之所起然後可以施治而不感知標知本萬舉萬當病之既愈而不犯職此故也以身論之外為標內為本陽為標陰為本六腑為標五臟為本臟腑在內為本十二經絡在外為標以病論之先受為本後傳為標故凡病必先治其本後治其標縱先生輕病後生重病亦先治其輕後治其重惟中滿及兩便不利急則治標耳然而脹滿便閉亦有標本之分故先喘後脹病在肺喘為本而腫為標治宜清金降氣先脹後喘病在脾脹為本而喘為標治宜實脾利水血分之症先經水斷而後浮腫腫為標而血為本先治血水分之症先浮腫而後經絶腫為本而血為標先治水可因此而例推之脈經云何以知春得病蓋以無肝脈也無心脈夏得病無肺脈秋得病無腎脈冬得病無脾脈四季之月得病假令肝病者西行或食雞肉得之當以秋時發得病以庚辛日也否則或感金銀物得之假令脾病者東行或食雉兔肉及諸水果實得之當以春時發得病以甲乙日也假令心病者北行或食豚魚肉得之當以冬時發得病以壬癸日也假令肺病者南行或食馬及獐鹿肉得之當以夏時發得病以丙丁日也假令腎病者中央或食牛肉及諸土中物得之當以長夏時發得病以戊己日也何以知人露臥得病陽中有陰也何以知人夏月得病諸陽入陰也何以知人食肉中毒浮之無陽但有陰脈來疾去疾此為水氣之毒也脈遲者食乾物得之善太息得之憂思病有休作心腹熱日若渴涎出者有蛔也小腸有宿食嘗暮發熱明日復止大腸有宿食寒栗發熱有時如瘧狀腰中冷如冰不渴小便利飲食如故病屬下焦從身勞汗出衣里冷濕久久得之熱在上焦咳為肺痿熱在中焦因堅熱在下焦因血脈病人鼻下平者胃病也微赤者發痛微黑者有熱微青者有寒白者不治唇黑者胃先病渴者可治不渴不可治臍反出者此為脾先終疲極筋力其脈弦數而實筋痛則動皆傷肝也凝思則滑神耗則散皆傷心也吟誦耗氣氣濡而弱叫呼走氣脈散而急皆傷肺也房勞失精兩尺脈浮散男子遺精女子半産弦大而革皆傷腎也胃虛不食其脈必緩亦有微濡五飲停伏浮細而滑久畜沉積沉細而軟形虛自汗脈皆微濡揮霍變亂脈自沉伏僵仆墜下脈則細滑踒折傷損瘀血在內疝瘕症癖並五內作痛脈皆弦緊中寒症結脈則遲澀五積六聚食飲痰氣伏留不散隧道阻滯脈皆促結三消熱中尺中洪大癲狂神亂關上疾氣實脈浮血實脈滑氣血相搏脈亦沉實婦人妊娠脈則和滑又陰脈搏擊陽脈殊別為有子凡臟病者止而不移其病不離其處腑病者上下行流居處無常七傳者死傳其所勝也間藏者生傳其子也出難經藏病難治府病易治魏相子順曰死病無良醫何謂逆順之脈寸口緊急或短或弦或浮皆頭痛浮滑為風痰易治短澀難治浮緊為太陽弦細少陽浮緩長陽明沉緩太陰沉細少陰浮緩厥陰浮弦為風浮洪為火右滑或大或數而有力皆痰火積熱細或緩急體重者浮右寸緊盛食積右關洪大為胃熱上細為鬲上有風痰冷涎或嘔吐沉細為傷寒但頭痛身不熱左脈不足血虛右脈不足氣虛左右俱不足氣血俱虛故診病若閉目不欲見人者脈當得肝脈弦急而長而反得肺脈浮短而澀者死若開目而渴心下牢者脈當得緊實而數而反得沉濡而微者死病若吐血復鼽衄血者脈當沉細反得浮大而牢者死病若譫言妄語身當有熱脈當洪大而反手足厥冷脈沉細而微者死病若大腹而泄者脈當微細而澀反緊大而滑者死大凡診脈取其人之形神長短肥瘦虛實盛衰性氣高下布衣血食老幼強弱但順形神四時五行氣候無過者生之本其形氣與五行相反者危脈有懸絶者死肥人脈細小如絲者死羸人得躁脈者死人身澀而脈往來滑者死人身滑而脈來往澀者死人身小而脈往來大者死人身大而脈往來小者死人短而脈往來長者死人身長而脈往來短者死左有病而右痛右有病而左痛上有病而下痛下有病而上痛此為逆逆者死不可治腹脹脈浮而大者生沉小者死壯熱脈浮大者生沉微者死癲癇脈亦然中毒脈洪大緊急者生微細而不齊者死頭痛脈浮大者安短澀者危痢疾脈微細者生洪大者死吐血發熱脈洪大者生細微者死不發熱細小者生洪大者危傷寒發熱後脈沉靜者安洪大而躁者危自汗脈虛者安躁盛者危厥逆之脈沉澀者生浮大者危諸失血脈小弱者生洪大者危久病脈細軟者生洪大者危瀉泄脈微細者生浮大者危産後脈微小者生洪大而數者危中風口禁脈浮遲而靜者生洪數而氣粗者死上氣喘急面目俱浮脈浮滑手足溫者生脈澀而四肢厥者死瘡疽脈洪大者生沉細者危既潰脈靜者安潰後洪大者危陽病得陰脈陰病得陽脈皆死消渴脈數大者生虛細者死霍亂之脈浮洪者生虛細者死何謂病在內在外在左在右在上在中在下之脈內經曰尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上即關左外以候肝內以候膈右外以侯胃內以候脾上附上即寸右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足䟰中事也粗大者陰不足陽有餘為熱中也來浮疾去徐沉浮者為來沉者為去上實下虛為厥顛疾陽實陰虛宜厥顛來徐去疾上虛下實為惡風也陽虛陰實不任風寒故中惡風者陽氣受也同氣相求有脈俱沉細數者陰火逆少陰厥也沉細為陰數散者寒熱也浮而散者陰虛陽孤為眴僕諸浮不躁在手人迎者皆在陽重陽則為熱足三陽受病其有躁者手三陽在手諸細而沉者皆在陰重陰則為骨痛手三陰其有靜者足三陰在足數動一代者陰固於外陽戰於內故脈厥厥動搖病在陽之脈也泄及便膿血頭有疾取之足謂陽病在陰也足有疾取之上謂陰病在陽也中有疾傍取之傍者少陽甲膽是也中者脾胃也胃中濕勝而成泄瀉宜助肝膽風勝以木克之諸過者切之澀者陽氣有餘也滑者陰氣有餘也凡陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒推而外之內而不外有心腹疾也推而內之外而不內身有熱也推而上之上而不下陽升不降腰足清也推而下之下而不上陽滯而不利頭項病也按之至骨脈氣少者腰脊痛而身有痹也氣反者病在上取之下病在中旁取之積在心下寸弦緊在胃管關弦緊在臍下尺弦緊左手脈橫症在左右手脈橫症在右三焦病因見答問何謂久病新病之脈久病反候春沉夏微秋洪冬浮過時命終尺脈上不至關為陰絶死於春夏寸脈下不至關為陽絶死於秋冬久病脈弱新病脈強有初病之脈有將愈之脈何謂內因外因不內不外之脈凡欲診脈先調自氣取病人息凡診脈先識人迎氣口以辨內外因其不與人迎氣口相應為不內外因所謂關前一寸人命之主何也喜怒憂思悲恐驚內應氣口為內因也歌曰喜則傷心脈必虛思傷脾脈結中居因憂傷肺脈必澀怒氣傷肝脈定濡恐傷於腎脈沉是緣驚傷膽動相須脈緊因悲傷胞絡七情氣口內因之風寒暑濕燥火外應人迎為外因也歌曰緊則傷寒腎不移虛因傷暑向胞推澀緣傷燥須觀肺細緩傷濕要看脾浮則傷風肝部應弱為傷火察心知六部合脈須當審免使將寒作熱醫又有不內外因焉歌曰勞神役慮定傷心虛澀之中仔細尋勞役陰陽傷腎部忽然緊脈必相侵房帷任意傷心絡微澀之中宜忖度疲極筋力便傷肝指下尋之脈弦虛飲食飢飽井傷脾未可輕將一例推飢則緩弦當別議若然滑實飽無疑叫呼損氣因傷肺燥熱脈中宜熟計能通不內外中因生死吉凶都在是何謂傷風之脈內經云風從南方來命曰太弱風其傷人也內舍於心外在於脈氣主熱風從西南方來命曰謀風其傷人也內舍於脾外在於肌肉其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在於肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛則為淋露寒熱犯雨濕之地則為痿偏中於邪風則為擊僕偏枯故聖人避風如避矢石焉乘年之衰逢月之空失時之和因為賊風所傷是謂三虛逢年之盛遇月之滿得時之和命日三實雖有賊風邪氣不能危正月朔日其日西北風不雨人多死平旦北風春民多死日中北風夏民多死夕時北風秋民多死終日北風大病死者十有六正月朔天和溫不風糴賤民不病天寒而風糴貴民多病二月醜不風民多心腹病三月戍不溫民多寒熱四月巳不暑民多疸病十月申不寒民多暴死常云中風脈浮又云傷風之脈陽浮陰弱風邪中人六脈多沉伏亦有脈隨氣奔指下洪盛者挾寒則脈帶浮遲挾暑則脈虛挾濕則脈浮澀脈經曰脈微而數中風使然寸口沉大而滑沉則為實滑則為氣氣實相搏入於臟則死入於腑則愈此為卒厥不知人唇青身冷為入臟死身溫和汗自出為入腑而復自愈脈陽浮而滑陰濡而弱宜吐或浮而滑或沉而滑或微而虛皆虛與痰捷徑云風疾脾緩空費力癆疾心數命難存大法宜浮遲不宜強大急數若脾脈緩而無力者最為難治蓋風喜歸肝肝木克脾土則大便洞泄故為難活風氣循風府而上則為腦風風入於頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風肺風之狀多汗惡風時咳短氣晝日則差暮則甚診在眉上其色白心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動不嗜食診在鼻上其色黃腎風之狀多汗惡風面痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑胃風之狀頸多汗惡風食飲不上膈塞不通腹善滿失衣則腹脹食寒則泄診形瘦而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可以單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗口中乾不能勞事身體盡痛則寒何謂傷暑之脈中暑者陰症中熱者陽症先夏至日者為病瘟後夏至日者為暑病暑病惡臭以心主臭自入為焦臭也暑者相火行令也夏月人感之自口齒而入傷心包絡之經其脈多虛或浮大而散或弦細芤遲蓋熱傷氣則氣消而脈虛弱其外證頭痛身熱口乾煩渴面垢自汗倦怠少氣背寒惡熱甚者迷悶不省而為霍亂吐利痰涎嘔逆發黃生斑皆其症也又甚者火盛制金不能平木肝邪獨旺以致搐搦不省人事其脈虛浮浮者風也虛者暑也俗曰暑風治宜黃連香茹飲或只雙解散加香茹凡夏月暑症不可服諸熱劑若誤用之乃致斑毒發黃小便不通悶亂而死傷暑與傷寒俱有發熱當細辨之蓋寒傷形暑傷氣傷寒則惡寒而脈浮緊傷暑則惡熱而脈虛微以此為別經云脈盛身寒得之傷寒脈虛身熱得之傷暑治宜小柴胡加石膏知母或人參白虎主之天時淫雨濕令並行蒼朮白虎主之若元氣素弱而傷重者用清暑益氣湯一行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發燥惡熱捫之肌膚大熱大渴引飲汗大泄無氣以動乃因天熱外傷肺氣也或避暑於深堂大廈或寺廟庵觀人迹罕至之處而得病者名曰中熱其病必頭痛惡寒身形拘急肢節痛而煩心肌膚大熱無汗為房室之陰寒所逼致周身陽氣不得伸越宜用辛溫之劑以解表散寒五積散主之若發熱惡寒身體疼痛小便澀灑然毛聳手足逆冷小有勞身即熱口開前板齒燥脈弦細虛遲表裡中暍也用補中益氣湯加香茹白扁豆熱加黃芩若暑風卒倒冒觸心經一時昏迷切不可飲冷水並臥濕地其法先以熱湯灌或童便灌及用青布蘸熱湯尉臍中氣海令暖氣透徹臍腹候其蘇醒然後進藥若旅途卒然暈倒急扶陰涼處掬路中熱土作窩於臍上令人溺其內即蘇灌以人尿或攪地漿水飲半碗或車輪土五錢冷水調澄清服何謂傷濕之脈濕者火土相蒸之氣也在天為濕在地為土在人為脾體虛之人或為風雨所襲或臥卑濕之地或涉大水深澤或汗出沾衣浸淫脾腎皆能成濕此為外感又或恣食酒漿多食柑桔瓜果生冷之類濕又以內傷矣夫濕能傷脾脾土一虛諸症生焉人皮膚為頑麻入氣血為倦怠入肺為喘滿咳嗽入脾為濕痰黃腫瀉泄入肝為脅滿而肢節不利入腎則腰疼胯痛入關節則一身盡痛入腑則麻木不仁入臟則舒伸不能夾風則頭目昏眩嘔噦心煩兼寒則拳攣掣痛無汗惡寒帶熱則煩渴引飲心腹疼痛多汗脈經曰脈浮而緩濕在表也脈沉而緩濕在裡也或弦而緩或緩而浮皆風濕相搏也又曰或細或澀或緩或濡是皆中濕治法當利小便或輕汗以散之或溫燥以除之上下分消其濕是其治也火熱能生濕土故夏熱則萬物濕潤秋涼則萬物乾燥濕病本不自生因熱而怫鬱不能先行水道故停滯而生濕何謂傷寒之脈脈訣舉要曰傷寒太陽浮緊而澀及傳而變名狀難悉陽明則長少陽則弦太陰入里遲沉必兼及人少陰其脈遂緊厥陰熱深脈狀厥冷在陽當汗或利小便表解里痛其脈實堅此其大略治法之正至於大法自有仲景傷寒有五脈非一端陰陽俱盛緊澀者寒陽浮而滑陰濡而弱此名傷風勿用寒藥陽濡而弱陰小而急此非風寒乃為濕脈陽脈浮滑陰脈濡弱或遇於風變成風濕陽脈洪數陰脈實大更遇濕熱變成溫毒陽脈濡弱陰脈弦緊更遇濕氣變為濕溫陰陽俱盛重感於傷變為溫瘧同病異名同脈異經傷寒傷風何以判寒脈緊澀風浮緩傷寒惡寒風惡風傷風自汗寒無汗陽屬膀胱並胃膽陰居脾腎更連肝浮長弦細沉微緩脈症先將表裡看又曰陰病見陽脈者生陽病見陰脈者死傷寒以浮大動數滑為陽沉澀弱弦緩為陰其弦緊浮滑沉澀六者為殘脈脈能為諸經作病春弦夏洪秋毛冬石土緩為四季之正脈浮沉遲數為客脈左為人迎右為氣口呼出心肺為陽吸人肝腎為陰一呼一吸為一息寸口為陽尺澤為陰中為關界陽主氣陰主血血為榮氣為衛所謂傷寒之病以淺入深先以皮膚肌肉次入腸胃筋骨其陰陽寒熱表裡虛實俱在浮中沉三脈有力無力中分有力者為實為陽為熱無力者為虛為陰為寒若浮中沉之不見則委曲而求之若隱若見則陰陽伏匿之脈也三部皆然雜病以弦為陽傷寒以弦為陰雜病以緩為弱傷寒以緩為和傷寒以本為病進以緩為邪退緩為胃脈有胃氣曰生無胃氣曰死傷寒病中脈貴有神脈中有力即為有神神者氣血之先也兩手無脈曰雙伏一手無脈曰單伏寸口陽脈中或見沉細者但無力者為陽中伏陰尺部陰脈中或見沉數者為陰中伏陽寸口數大有力為重陽尺部沉細無力為重陰寸口細微如絲為脫陽尺部微而無力為脫陰寸脈浮而有力主寒邪表實宜汗浮而無力主風邪表虛宜實尺脈沉而有力主陽邪在裡為實宜下無力主陰邪在裡為虛宜溫寸脈弱而無力切忌汗下初按來疾去徐名曰內虛外實去疾來徐名曰內實外虛尺寸俱同名曰緩緩者和而生也汗下後脈靜者生燥亂身熱者死乃邪氣勝也如寒邪直中陰經溫之而脈來斷續為歇止正氣脫而不復生也純弦之脈名曰負負者死按之如解索者名曰陰陽離離者死浮脈初排指於皮膚之上輕手按之便得曰浮此為寒邪初入足太陽經病在表之標可發而去之雖然其治法則有二焉寒傷榮則無汗惡寒風傷衛則有汗惡風一通一塞不可用也浮緊有力則無汗惡寒頭項痛腰脊強發熱此為傷寒在表宜發散冬時用麻黃湯餘三時用羌活沖和湯有渴加石膏知母浮緩無力則有汗惡風頭項痛腰脊強發熱此為傷風在表宜和衛冬時用桂枝湯餘三時用加減沖和湯腹痛小建中湯痛甚桂枝加大黃湯中脈按至皮膚之下肌肉之間略重按之乃得謂之半表半裡然亦有二焉蓋陽明少陽二經不從標本從乎中也長而有力即微洪脈也此為陽明在經其症微有頭痛眼眶痛鼻乾不得眠發熱無汗用葛根解肌湯若渴而有汗不解或經汗過渴不解者白虎加人參湯無汗不可服此藥為大忌弦而數此為少陽經脈其症胸脅痛而耳聾寒熱嘔而口苦用小柴胡湯或兩經合痛則脈弦而長此湯加葛根芍藥緑膽無出入有三禁止宜和解表裡耳沉脈重手按之至肌膚之下筋骨之間乃得此為沉脈然亦有二陰陽寒熱俱在沉脈中分若沉而有力為陽為熱沉而無力為陰為寒沉數有力則為陽明之本表症罷而熱入於裡惡寒頭痛悉除反覺怕熱欲揭衣被揚手擲足譫語狂妄燥渴或潮熱自汗五六日不大便輕則大柴胡湯下之重則六一順氣湯選用沉遲無力為寒初病起外症無頭痛身熱便惡寒而四肢厥冷或腹痛吐瀉或口吐白沫或流冷涎或戰栗面如刀刮引衣踡臥不渴或手足指甲青此則直中陰經非從陽經傳來急溫之輕則理中湯重則薑附湯四逆湯之類故經云發熱惡寒發於陽無熱惡寒發於陰何謂傷酒之脈怯士之得酒怒不避勇士何藏使然少俞曰酒者水穀之精熟谷之液也其氣慓悍其入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時固比於勇士氣衰則悔與勇士同類不知避之名曰酒悖有病身熱解墮汗出如浴惡風少氣此為何病名曰酒風酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣自衰陽氣獨盛故手足為之熱也其始入於皮膚則色赤深入於肌肉則色黃赤又入於脾胃其色黃酒布於四肢再入於心包絡則多言入於肝則怒入於腎則多溺酒入於胃則絡脈滿而經脈虛傷酒發汗則愈其次莫如利小便上下分消其濕何酒病之有酒疸下之久久為黑疸不可犯此戒其脈洪大而數乾葛一兩薄荷五錢桂花三錢白梅肉五錢共為末蜜丸先放入口飲酒不醉何謂傷色之脈肺脈沉之而數浮之而喘苦洗洗寒熱腹滿腸中熱小便赤肩背痛從腰以上汗出得之房內汗出當風白脈之至也喘而浮大上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之因醉而使內也腎脈沉之大而堅浮之大而緊若手足骨腫厥而陰不興腰脊痛少腹腫心下有水氣時脹閉時泄得之浴水中身未乾而合房內及勞倦發之醉以入房汗出當風傷脾用力過度入房汗出傷腎心傷色則健忘怔松肝傷色則諸筋瘛瘲肺傷色則咳逆吐痰腎傷色則陰器不柔或不舉脾傷色則四肢不用色黃太倉公治一女病腰背疼寒熱諸醫皆以為寒熱也公診之曰內寒月事不下也病得之欲男子不可得也所以知其病者診其脈時切之腎脈也澀而不屬其來難堅故曰月不下肝脈弦出寸口故曰欲男子不可得也肝攝血者也厥陰弦出寸口又上魚際則陰血盛可知矣何謂傷財之脈火形之人輕財少信土形之人好利人金形之人清廉太陰之人貪而不仁少陰之人小貪而賊心貪出於脾則以思慮致之貪出於肝則以忿怒爭之貪出於肺則以悲哀求之貪出於心包則以喜樂獲之貪出於腎則以勉強技巧得之各以其色脈診之何謂傷氣之脈下手脈沉便知是氣沉極則伏濡弱難治其或沉實氣兼痰飲沉弦細動皆氣痛症心痛在寸腹痛在關下部在尺脈象顯然軒岐論諸病皆生於氣有九氣不同之説其言曰怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收暑則氣泄驚則氣亂思則氣結勞則氣耗經曰一息不運則機緘窮一毫不續則穹壤判若內無七情所傷外無六淫所感何氣病之有哉惟不善攝生者五志之火無時不起五味之偏無日不傷是以釀成膠痰留滯於六腑鬱火邪氣充塞乎三焦使氣血失其常候臟腑不能傳導是故外邪得以乘虛而入以至清陽不升濁陰不降而諸氣之症作矣至於為脅病為心腹痛為周身刺痛甚則為翻胃為膈噎等症皆此之由也大抵男子屬陽得氣易散女子屬陰得氣易郁故男子氣病常少女子氣病常多故治婦人宜調其血順其氣男子宜調其氣和其血也氣之為病非止一端有七情氣有鬱氣有逆氣有怒氣有熱氣有冷氣有厥氣有痰氣有虛氣有中滿氣有腹脹氣務宜詳究不可以一例治也諸氣須上下分消不可驟用局方金石烏附燥熱等劑逆氣在上者須用達之在中者須用調順在下者須用消導怒氣須用調肝經如柴胡青皮桔梗枳殼芍藥半夏白芥子竹茹木香萊蔔子之類鬱氣宜開鬱如蒼朮香附川芎青皮黃連半夏竹茹山梔枳殼連翹木香澤瀉之類凡鬱氣難治必自能知戒乃可凡用氣藥枳殼破滯氣然多服損胸中至高之氣青皮瀉肝氣多則損真氣香附快滯氣陳皮泄逆氣紫蘇散表氣厚朴泄胃氣檳榔泄至高之氣藿香行胃氣沉香升降真氣腦麝散真氣木香行中下焦氣若此之類氣實所宜其中有行散者有損泄者用之能治氣之標而不能治氣之本何謂癆瘵之脈男子尺脈數無力發於陰分者陰虛火動也兩尺洪大必遺精陰火盛也又有腎水泛症兩尺亦洪大大抵脈洪大者虛也尺脈虛弱微細者必盜汗出也弦大數按之無力亦陰火也浮而洪數為虛火沉而實數為實火凡勞熱喘嗽脈必數無力按之沉而稍有力者生浮而細數無力不能容指者死脈經曰平人脈大為勞脈虛亦為勞勞之為病其脈浮大手足煩熱春夏劇秋冬瘥陰寒精自出脈虛沉弦無寒熱短氣裡急小便不利面色白時時目瞑鼻衄小腹滿此為勞使之然腎脈微弱而澀為無子精氣清冷也脈極虛芤遲為亡血失精凡脈得諸芤動微緊男子失精女人夜夢鬼交凡脈遲而小弱者名脫氣其人疾行則喘喝手足逆冷腹滿甚則溏泄食不消化脈弦而大按之中空外急此名為革婦人則半産漏下男子則亡血失精寸口脈浮而遲浮則為虛遲則為勞虛則衛氣不足浮則榮氣竭左手脈細右手浮大動急而不退者為正氣虛邪氣盛主必死脈要云勞極諸虛浮軟微弱土敗雙弦火炎急數骨蒸發熱脈數而虛熱而澀小必殞其軀如汗加嗽非藥可除巢氏病原云五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞肺勞者短氣而面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌苦直不得咽唾腎勞者背難以俯仰小便不利色赤黃而有餘瀝莖內痛陰濕囊生瘡小腹滿急以上亦名五勞七傷一曰陰寒二曰陰痿三曰裡急四曰精滑五曰精少六曰精清七曰小便苦數臨事不卒又曰七傷者一曰大飽傷脾脾傷善噫欲臥面黃二曰大怒逆氣傷肝肝傷少氣目開或閉三曰強力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒飲冷傷肺肺傷少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷苦驚善忘善怒七曰大恐懼不節傷志志傷恍惚不樂金匱云五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷肉肓乾血肌膚甲錯兩目黯黑緩中補虛大黃蟅蟲丸主之按虛勞發熱未有不由瘀血者而瘀血未有不由內傷者故以潤劑治乾血以軟動啖血之物行死血死血已去病根已劃而後可從事乎滋補之劑仲景為萬古醫方之祖有以哉玄珠云五行六氣水特五之一耳一水既虧豈能勝五火哉虛勞等症蜂起矣體虛者最易感於邪氣當先和解微利微下之以其緩而治之次則調之醫者不知邪氣加於身而未降便行補劑邪氣得補遂入經絡至死不悟良可悲矣夫涼劑能養水清火熱劑能燥水補火理易明也勞為熱症明矣當可補乎惟無邪無熱無積之人脈舉按無力而弱者方可議補又必察其胃中及右腎二火虧而用之心虛則動怵恍惚憂煩少色舌強宜養榮湯琥珀定神丸之類以益其心血脾虛面黃肌瘦吐利清冷腹脹腸鳴四肢無力飲食不進宜快脾進食丸之類以調其飲食肝虛目昏筋脈拘變面青恐懼如人將捕之狀宜牛膝益中湯虎骨之類以養其筋脈肺虛呼吸少氣喘之咳嗽嗌乾宜枳實湯加人參黃耆阿膠蘇子以調其氣腎虛腰背脊膝厥逆而痛神昏耳鳴小便頻數精漏宜八味九加五味鹿茸去附子用山藥等丸以生其精何謂有痰之脈沉弦細滑大小不勻皆痰為病偏弦為飲雙弦為寒飲左右手關前脈浮弦大而實者膈上有稠痰也宜吐而愈病人百藥不效關上脈浮而大者痰也眼胞及眼下如煙薰者痰也丹溪曰久得澀脈痰飲膠固脈道阻滯也卒難得開必費調理痰屬濕乃津液所化因風寒濕熱之感或七情飲食所傷以至氣逆液濁變為痰飲或吐咯上去或疑滯胸膈或留聚腸胃或留注經絡四肢隨氣升降遍身無處不到其為病也為喘為咳為噁心嘔吐為痞膈壅塞關格異病為泄利為眩暈為嘈雜為怔忡驚悸為癲狂為寒熱為痛為胸膈轆轆有聲或背脊一點常如冰冷或四肢麻痹不仁皆痰所致百病多有兼痰者世所不知也痰有新久輕重之殊新而清者形色清白稀薄氣味亦淡久而重者黃濁稠黏凝結咳咯難出漸成惡味酸辣腥膻鹹苦甚至帶血而出蓋痰生於脾胃宜實脾燥渴又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則清之濕痰則燥之風痰則祛之郁痰則開之頑痰則軟之食積痰則消之在上者吐之在中者下之又中氣虛者宜固中氣以運痰若攻之太重則胃氣虛而痰愈盛矣二陳湯加升提之藥能使大便潤而小便長熱痰用青黛黃連用青礞石丸最捷濕痰身多軟而重用蒼白朮黃芩香附半夏貝母熱痰加瓜蔞青黛酒痰用瓜蔞青黛蜜丸噙化痰在脅下非白芥子不能達痰在四肢非竹瀝不能行痰在皮裡膜外非竹瀝不除氣虛之人有痰非竹瀝不開痰結核在咽喉噪不能出化痰藥加咸能軟堅之味瓜蔞仁杏仁海石桔梗連翹少佐以朴硝以薑汁蜜丸噙之治痰用利藥過多致脾氣下虛則痰反易生而多虛人中焦有痰胃氣亦賴所養卒不可便攻攻盡則愈虛何謂失血之脈諸病失血皆見芤脈隨其上下以驗所出大凡失血脈宜沉細設見浮大後必難治寸芤積血在胸中關內逢芤腸里癰夫矣血之症非止一端有吐血有咳血有唾血有咯血有衄血有尿血雖在其名不一大抵俱是熱症但有新舊虛實之不同耳丹溪曰血以上竅出皆是陽盛陰虛有無升降血隨氣上越出上竅法當補陰抑陽氣降則血歸經吐血者吐出全血是也因血溢妄行流入胃脘令人吐血有因飲食過飽填重傷胃而吐血者有因思慮傷心及積熱而吐血者有傷心肺而吐血者有因思傷脾而吐血者有因肺生癰而吐血者有從高墜下傷損內臟而吐血者有傷寒不解邪熱在經隨氣上湧而吐血者有先失血後見痰嗽者是陰虛火動痰不下降四物為主加清痰降火藥有先見痰嗽後見吐血者是積熱降痰火為急有暴吐紫血成塊者是熱傷血結於中吐出為好用四物加清熱藥調之亦有因怒而吐血者經曰怒則氣逆甚則嘔血故也吐血不止用炮薑為末童便從治法也咳血者嗽出痰內有血是也因肺熱而成久嗽血壅於肺者易治不過涼之而已損於肺者難治以其不足也熱嗽有血者宜金沸草加阿膠勞嗽有血者補肺湯加阿膠白芨嗽血損肺宜薏苡仁炒為末蘸熟豬肺食如熱嗽咽痛痰帶血絲或痰中多血而色鮮者並宜金沸草散如服冷劑不愈此非熱症宜杏子湯主之唾血者鮮血隨唾而出是也此出於腎亦有瘀血內損肺氣壅遏不得下降用天門冬知貝母桔梗黃柏熟地遠志或加乾薑咯血者不嗽而咯出血疙瘩是也用薑汁童便青黛入血藥中用之或加入四物湯地黃膏牛膝膏之類衄血者鼻中出血也此出於肺以犀角升麻梔子黃芩芍藥生地黃紫參之類治之尿血者小便中出血也膀胱所致用炒黑山梔水煎服之或用琥珀小薊治下焦結熱血淋尿血因血虛者四物加牛膝膏下血者大便下血也乃臟腑蘊積濕熱之而成或因氣鬱酒色過度及多食炙煿熱毒之物或風邪所冒或七情六淫所傷使氣血逆亂榮衛失度皆令下血治諸虛吐衄咯血藥中每入童便一合其效甚速凡單用重湯頓服無不效應蓋溲能降火滋陰又能清瘀血止吐衄諸血先賢有言凡諸失血服寒涼十無一生服溲溺百無一死每用童便一鍾少入薑汁二三點攪勻徐徐服之日進二三次如天寒卻以重湯頓溫服但以進飲食相遠為佳肝經血加條芩心經血加黃連麥冬脾經血加白芍百合肺經加天冬百部山梔腎經加玄參黃柏知母三焦湧血加連翹地骨皮膽經加柴胡淡竹葉胃經吐血加大黃乾葛心胞血倍牡丹皮加茅根大腸便血加炒山梔槐花小腸尿血加炒梔子木通牛膝茅根積熱加大黃芒硝吐血不止加大黃桃仁皆憑乎脈何謂咳嗽之脈浮為風緊為寒數為熱為細為濕以上為外邪浮緊為虛寒沉數為實熱弦澀為少血洪滑為多痰以上為內郁細澀而數為房勞有關短澀濡傷脾左關弦短澀傷肝右寸浮短澀傷肺雙弦為寒偏弦為飲沉為留飲弦實宜吐脈出魚際為逆氣喘息肺脈微急為咳而唾血脈沉不可發汗浮直而濡者易治脈數有熱氣逆而喘不得臥者難治上氣喘面浮腫肩息脈浮大者死久嗽脈弱者可治實大數者死上氣喘息低昂脈滑手足溫者生脈澀四肢寒者死咳而脫形身熱脈小堅急以疾是逆也不過十五日死咳嗽羸瘦脈形堅大者死浮軟者生小沉伏匿者死咳而嘔吐腹脹且泄弦急欲絶者不治歌曰咳嗽所因浮風緊寒數熱細濕房勞澀難右關濡者飲食傷脾左關弦短疲極肝衰浮短肺傷法當咳嗽五臟之嗽各視其部沉緊虛寒沉數實熱洪滑多痰弦澀少血形盛脈細不足以息沉小伏匿皆是死脈惟有浮大而嗽者生咳嗽之病有自外而入者有自內而出者風寒暑濕外也七情飢飽內也風寒暑濕先自皮毛而入皮毛者肺之合故雖外邪欲傳藏府亦必先以合而為嗽此自外而入者也七情飢飽內有所傷則邪氣上逆肺為氣出入之道故五臟之邪上蒸於肺而嗽此自內而發者也然風寒暑濕有不為嗽者蓋所感者重徑傷臟腑不留於皮毛七情亦有不為嗽者蓋病尚淺止在本藏未即上攻所以傷寒以有嗽為輕而七情飢飽之嗽久而後見治法當審脈症三因若外因邪氣止當發散又須原其虛實冷熱若內因七情則隨其部經位與氣口脈相應當以順氣為先下痰次之有停飲而嗽又須消化之方不可用烏梅罌粟酸澀之藥其寒邪未除亦不可便用補藥尤忌憂思過度房室勞傷遂成瘵疾宜養脾生肺也仁齋直指云感風者鼻塞聲重傷冷者悽清怯寒挾熱為焦煩受濕為纏滯瘀血則膈間腥悶停水則心下怔松或實或虛痰之清白唾之稀稠從可知之治嗽大法肺脈浮為風邪所客以發散取之肺脈實為氣壅內熱以清利行之脈濡散為肺虛以補肺安之若久嗽之人曾經解利以致肺胃俱寒飲食不進則用溫中助胃加和平治嗽之藥至於酒色過度虛勞少血津液內耗心火自炎遂使燥熱乘肺咯唾膿血上氣涎潮其嗽連續而不已唯夫血不榮肌故邪在皮毛皆能入肺而自背得之尤速此則人參芎歸所不可無一種傳注病邪惡五臟反克毒害尤深近世率用蛤蚧天靈蓋枕柳枝丹砂雄黃安息香蘇合香丸通神之劑然則咳嗽症治於此可以問津矣抑尤有説焉肺出氣也腎納氣也肺為氣之主腎為氣之本凡咳嗽暴重動引百骸自覺氣從臍下逆本而上者此腎虛不能收氣歸元也當以破故脂安腎丸主之毋徒從事於寧肺也治咳以消痰順氣為先河間曰治咳者當以治痰為先治痰者以順氣為主是以南星半夏勝其痰而咳嗽自愈枳殼陳皮利其氣而痰飲自除痰盛而能食者小承氣湯微下之痰勝而不能食者厚朴湯疏導之無痰而咳嗽者當以辛甘潤其肺如蜜煎生薑湯蜜煎桂皮湯之類是也本草云陳皮味辛理上氣行滯塞青皮味苦理下氣二味俱用散三焦痰氣不可少也治嗽須觀時令春月風寒所傷咳嗽聲重頭疼用金沸草散咳嗽聲重身熱頭痛用局方消風散蓋肺虛則腠理不密風邪易入治法當解表兼實肺氣肺有火則腠理不閉風邪外乘治宜解表兼清火退即止若數行解散則重亡津液邪蘊而為疽肺痿矣故凡肺受邪不而小便短少皮膚漸腫咳日增者宜六君子湯以補脾肺六味丸以滋補腎水夏月喘急而咳面赤潮熱其脈洪大者黃連解毒湯熱燥而咳梔子湯咳唾有麥門冬湯俱吞六味丸壯水之主以制陽光而保肺金秋月咳而身熱自汗口乾便赤脈虛而洪者白虎湯身熱而煩氣高而短心下痹滿四肢困倦精神短少者香薷飲若病邪既去宜用補中益氣湯加山藥五味子以養元氣柴胡升麻各二分以升生氣冬月風寒外感形氣病氣俱實者宜華蓋散加減亦黃湯所謂從表而入自表而出若形氣病氣俱虛者宜補其元氣而佐以解表之藥若專於解表則肺氣益虛邪氣則乘虛易入其病愈難治矣夏月嗽而發熱者謂之熱痰嗽小柴胡湯四兩加石膏一兩知母半兩冬月嗽而發寒熱謂之寒嗽小青龍加杏仁冬花細辛乾薑之屬何謂男女不同之脈天道右旋主乎生化則男子先生右腎右屬陽為八魂降精氣赤以鎮丹田故男子命脈在右手尺部地道左旋主乎成物則女子先生左腎左屬陰為七魂降真氣黑以鎮子宮故女子命脈在左手尺部若男子病右尺部命脈好病雖危不死若女子病左尺部命脈好病雖危亦不死天之陽在南而陰在北故男子寸脈盛而尺脈弱陽在寸陰在尺也地之陽在北而陰在南故女子尺脈盛而寸脈弱陽在尺陰在寸也陽強陰弱天之道也非反也反之者病故男得女脈為不足女得男脈為太過左得之病在左右得之病在右男左女右者地之定位也非反也天以陰為用故人之左耳目明於右耳目地以陽為使故人之右手足強於左手足陰陽互用也非反也凡男子診脈必先伸左手女子診脈必先伸右手男子得陽氣多故左脈盛女子得陰氣多故右脈盛若反者病脈也男子以左尺為精府女子以右尺為血海此天地之神化也何謂邪祟之脈凡鬼祟附著之脈兩手乍大乍小乍長乍短乍密乍疏乍沉乍浮陽邪來見脈則浮洪陰邪來見脈則沉緊鬼疰客忤三部皆滑洪大嫋嫋沉沉澤澤但與病症不相應皆五尸鬼邪遁疰之所為也又如遁尸尸疰脈沉而不至寸或三部皆緊急如診得此等脈症雖與人迎氣口相應亦當分數推尋三因交結四季料簡所謂俾內俾外不內不外亦內亦外亦不內外脈理微妙藝能難精學然後知所因此之謂也又如忽見異象驚惑眩亂脈多失次急虛率中五臟閉絶脈不往來又如忽然墮溺脈不可察與夫金瘡跌折頓走血氣脈亦無準當看症洽之不必拘脈也何謂諸脈相類之脈浮似芤芤則中斷浮不斷浮似洪力薄為浮厚者洪浮似虛輕手為浮無力虛滑似動滑珠朗朗動混混滑似數滑利往來數至多實似革革按不移實大長弦似緊弦言其力緊言象洪似大大按無力洪有力微似澀澀短遲細微如毛沉似伏伏極其沉沉復深緩似遲緩比之遲仍小快遲似澀遲息三至澀短難弱似濡濡力柔薄弱如無結促代結緩促數止無定代歇有常命鮮回散似大散里全無大翕翕何謂奇經之脈奇經八脈其診又別直上直下浮則為督牢則為沖緊則任脈寸左右彈陽蹻可決尺左右彈陰蹻可別關左右彈帶脈當訣尺外斜上至寸陽維尺內斜上至寸陰維督脈為病脊強癲癇任脈為病七疝瘕堅衝脈為病逆氣裡急帶主帶下臍痛精失陽維寒熱目眩僵仆陰維心痛胸脅刺築陽蹻為病陰緩陽急陰蹻為病陽緩陰急癲癇瘛瘲寒熱恍惚八脈脈證各有所屬按奇經八脈在十二經脈之外無臟腑與之配偶故曰奇夫臟腑之脈寸關尺有定位浮中沉有定體弦鉤毛石有定形此則另為一脈形狀固異而隧道亦殊病證不同而診治自別蓋督任沖三脈皆起於胞中一源而三派督行於背總督諸陽任行於腹總任諸陰沖則後行於背前行於腹上行於頭下行於足以至溪谷肌肉無處不到誠十二經內外上下之要衝也故靈樞順逆肥瘦篇曰衝脈者五臟六腑之海也五臟六腑皆稟焉三脈直行上下發源最中故見於脈亦皆直上直下也直上直下者即三部俱長透之義若直上下而浮則氣張揚陽象也故屬督若直上下而緊則勢斂束陰象也故屬任若直上下而牢則體堅實有餘之象也故屬沖陽蹻陰蹻者皆起於足跟人身之起於蹻捷者亦莫過於足跟故曰蹻一則為足太陽之別循外踝上行入風池故名陽蹻一則為足少陰之別循內踝上行至咽喉交貫衝脈故名陰蹻寸以候陽寸左右彈者言在寸左右皆有彈石搏手之勢是陽蹻脈也尺以候陰尺左右彈者言在尺左右皆有彈石搏手之勢是陰蹻脈也二經之起以踝之內外分陰陽者外踝屬太陽而內踝屬少陰也二經之脈以尺寸分陰陽者以陽蹻入風池合太陽至頭故以寸候之陰蹻合少陰而不至頭故以尺候之也帶脈者圍身一周不上不下如束帶然故彈搏之脈唯見於左右中關耳陽維陰維者維持一身陽維維陽起於諸陽之會陰維維陰起於諸陰之交夫人身經脈緊密二脈能於陰交陽會處加一紫縛舉綱齊目而陰陽斯得維持之力矣其見於脈自尺至寸皆刺斜而上陰則自外入內陽則自內出外蓋其經亦皆自下而起陽自外踝出肩至腦陰自內踝入腹至喉故也此八經之脈狀病則見不病則不見而脈狀則俱似有邪而實者也督脈為病脊強癲癇者蓋督脈與太陽合行邪客則脊強以其貫脊也督與太陽皆主表而督為諸陽之總太陽為諸陽之長風邪從類傷陽表必先受故留則為癲癇也任脈為病七疝瘕堅者蓋任脈總諸陰之會七疝之發必在前陰少腹之間任脈所經之地雖屬他經未有不以任為原者多屬血凝經滯女子之病也衝脈者自臍至胸與陽明則並於前與少陰則並於後故與陽明皆得稱為臟腑之海其氣不順血不和則胸腹之氣循經壅逆而裡急矣帶脈為病帶下臍痛精失者以帶脈起於季脅圍身如帶臟腑十二經絡皆過於此若飲食不節勞欲縱傷致令濕熱下流邪火內郁外或風入胞宮邪凝臍腹帶脈不任與邪俱陷或赤或白加涕如膿或青黃雜色淋漓不淨其兼證則腰腹痠痛足膝痿軟頭目暈眩經脈參差甚或寒熱往來容顏枯瘁然而發源於衝脈脾胃者多以沖為血海任總諸陰脾胃司水穀故耳是以骨空論曰任脈為病女子帶下瘕聚又痿論曰衝脈與陽明合於宗筋之會而陽明為之長皆屬於帶脈帶脈起於季脅章門前則當臍上故又或為臍痛靈樞經曰腎足少陰當十四椎出屬帶脈蓋腎主藏精帶固腰膂虛則一不能藏一不能固而精有失者矣陽維為病寒熱目眩僵仆者以陽維維絡一身之陽於頭目手足頸項肩背諸陽無一不到其脈不榮則不能維在頭目無維則眩在頸項肩背無維則僵在手足無維則僕矣陰維為病心痛胸腹刺築者以陰維維絡一身之陰於胸腹諸陰亦無一不到其脈不榮則不能維在胸脅失所維則動築而刺痛矣陽蹻為病陰緩陽急陰蹻為病陽緩陰急及癲癇瘛瘲寒熱恍惚者蓋二蹻之脈同發一源故其為病亦不似前六脈逐經分屬本文以癲癇瘛瘲寒熱恍惚總系二經之下以二經均可病此二脈一為經一為絡病在經則經急絡緩病在絡則經緩絡急總之皆可言經皆可言絡但以男女分陰陽之所屬緩急證病邪之所在而正文以諸證為二經所共義良深矣何謂合氣運之脈附圖五運者十干之合也甲己二年合為土運乙庚二年合為金運丙辛二年合為水運丁壬二年合為木運戊癸二年合為火運丹天之氣經於牛女奎壁四宿之上下臨戊癸之位立為火運黅天之氣經於心尾角軫四宿之上下臨甲己之位立為土運素天之氣經於亢氐昴畢四宿之上下臨乙庚之位立為金運玄天之氣經於張翼婁胃四宿之上下臨丙辛之位立為水位蒼天之氣經於危室柳鬼四宿之上下臨丁壬之位立為木運自房至畢十四宿為陽主晝自昴至心十四宿為陰主夜戊為天門乾之位也己為地戶巽之位也丙者火之陽建於甲己歲之首正月建丙寅丙火生土故甲己為土運戊者土之陽建於乙庚歲之首正月建戊寅戊土生金故乙庚為金運庚者金之陽建於丙辛歲之首正月建庚寅庚金生水故丙辛為水運甲者木之陽建於戊癸歲之首正月建甲寅甲木生水故戊癸為火運壬者水之陽建於丁壬歲之首正月建壬寅壬水生木故丁壬為木運是五運皆生於正月建干也六氣者十二支之對也子與午對二年俱為蒼火之氣醜與未對二年俱為濕土之氣寅與申對二年俱為相火之氣卯與酉對二年俱為燥金之氣辰與戌對二年俱為寒水之氣巳與亥對二年俱為風水之氣君火居尊故不立運而運只有五戊癸火運乃相火之位故曰君火以名相火以位是也故六氣不加於君火是以運則五年一周氣則六期環會大運者乃當年年干通主一年之運也主運者每年皆以木運從大寒日始以次相生至水而終每運各主七十二日有奇年年常如是者客運者如甲己年即以土運起亦從大寒日始以次相生而終亦每運各主七十二日有奇逐年更替者六氣有司天有在泉有正化有對化假如當年年支是子子午皆少陰君火司天子為對化午為正化對司化令之虛正司化令之實余仿此司天在泉子午卯酉為一律寅申巳亥為一律辰戌丑未為一律五運六氣須五日候之記其風雨晦明有應時作病者有伏氣後時而病者有故病沖而動者體認純熟久久自然造極大而天地小而人之一身五行之氣皆在焉天地之氣有常無變則人亦和平而無災天地之氣變而失常則疾疫之所從出也是故木氣盛則肝以實病脾以虛病火氣盛則心以實病肺以虛病此醫者所以致察也譬如今己酉年己為土運不及則木氣乘旺反見風化風氣乃行治當益脾以平木此客運之治法酉陽明燥金司天少陰君火在泉運生司天曰小逆六十年有此十二年小逆燥金司天治宜苦溫此客氣治法也天氣客氣也客氣乃行歲中天命主氣只奉客氣之天而已主氣臨於客氣之下客氣加於主氣之上天氣所以不齊民病所由而生客勝主則從主勝客則逆主勝瀉主補客客勝瀉客補主聲在天之運氣有在人之運氣天時勝舍人病而從天時人病勝舍天時而從民病張子曰病如不是當年氣看與何年運氣同只向某年求活法方知都在至真中儒之道博約而已矣醫之道運氣而已矣人居氣交之中非內有所傷即外有所感故不通運氣之太過不及而時氣之病難治矣紺珠經云不通五運六氣檢遍方書何濟六氣司天圖假令子午年六氣如此余者以類推之凡在天之氣三年一降五年遷正司泉降極復升在天之氣三年一降五年遷正司泉降極復升在地之氣三年一升五年遷正司天升極復降何謂運氣天和不應之脈大寒至二月春分為初之氣厥陰風木主令經云厥陰之至其客脈弦一云沉短主而敦春分至四月小滿為二之氣少陰君火主令經云少陰之至其客脈鉤一云緊細主而微小滿至六月大暑為三之氣少陽相火主令經云少陽客紺珠同之至其脈大而浮一云乍疏乍數論主乍短乍長大暑至八月秋分為四之氣太陰濕土主令經云太陰之至其脈緩一云緩大而主長紺珠經曰太陰所至其脈緩秋分至十月小雪為五之氣陽明燥金主令經云陽明之至短而澀一云浮大而主短小雪至十二月大寒為六之氣太陽寒水主令經云太陽之至其脈大主而長紺珠經云太陽所至其脈沉南政土運己丑己未二歲太陰司天少陰在左少陽在右故左寸脈不應不應為沉細也當沉而浮當浮而沉俱為不應也南政土運辰戌二歲太陰在泉少陰在右少陽在左故右尺脈不應南政以前為左以後為右君也南政土運巳亥二歲厥陰司天太陽在左少陰在右故右寸脈不應南政土運寅申二歲厥陰在泉太陽在右少陰在左故左尺脈不應南政土運子午二歲少陰司天厥陰在左太陰在右故兩手寸脈俱不應南政土運卯酉二歲少陰在泉太陰在左厥陰在右故兩手尺脈俱不應南政甲己所臨之歲司天在泉但見君火所在則不應北政水運丑未二歲太陰司天少陰在左少陽在右故右尺脈不應北政以前為右以後為左臣也北政金運辰戌二歲太陰在泉少陽在左少陰在右故左寸脈不應北政火運巳亥二歲厥陰司天太陽在左少陰在右故左尺脈不應北政木運寅申二歲厥陰在泉少陰在左太陽在右故右寸脈不應北政但見君火在上則下不應在下則上不應在左右亦然南政己酉己卯二歲當陽明司天少陰在泉法當兩尺沉細不應而反浮大兩寸當浮大而反沉細是陽明與少陰相反經曰尺寸反者死南政甲子甲午歲當陽明在泉法當兩寸沉細不應而反浮大兩尺脈當浮大而反沉細是陽明與少陰尺寸相反經云尺寸反者死北政乙辛丁癸卯酉陽明司天少陰在泉法當兩寸沉細不應而反浮大兩尺脈當浮大而反沉細是陽明與少陰尺寸相反經云尺寸反者死北政丙戊庚壬子午少陰司天陽明在泉法當兩尺沉細不應而反浮大兩寸脈當浮大而反沉細是陽明與少陰尺寸相反經云尺寸反者死南政己丑己未少陽在右少陰在左右寸脈當沉細不應而反浮大右寸脈當浮大而反沉細不應是謂左右交經云左右交者死南政甲辰甲戌少陽在左少陰在右右寸脈當沉細不應而反浮大左尺脈當浮大而反沉細是謂左右交經云左右交者死南政己亥己巳太陰在左少陰在右右寸脈當沉細不應而反浮大左寸脈當浮大而反沉細是謂左右交少陰在右而交於左南政甲寅甲申太陽在右少陰在左左尺脈當沉細不應而反浮大右尺脈當浮大而反沉細是謂左右交少陰在左而交於右北政乙辛丁癸巳亥太陽在左少陰在右右寸脈當沉細不應而反浮大左寸脈當浮大而反沉細是謂左右交少陰在右而交於左南北之政先立其年干分五運支立司天土運甲己金運乙庚水運丙辛木運丁壬火運戊癸土君余臣司天分例六化圖推少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之子午之上少陰治之丑未之上太陰治之寅申之上少陽治之卯酉之上陽明治之辰戌之上太陽治之巳亥之上厥陰治之當年歲支司天移當中位為基南政司天在寸北政司天在尺南政甲己土運喻君位坎面離少陰司天兩寸不應少陰在泉兩尺不應三陰在左則左不應三陰在右則右不應左右尺寸少陰為定北政乙庚丙辛丁壬戊癸喻之臣輔位南面北居卑少陰司天兩尺不應少陰在泉兩寸不應左右同前之應脈無沉細俱宜諸脈不應反診較之尺寸反死陰陽交危何謂內經之脈以內經九候考之人身分三才之部上部天兩額之動脈上部地兩頰之動脈上部入耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也上部天以候頭角之氣地以候口齒之氣人以候耳目之氣中部天以候肺地以候胸中之氣人以候心下部天以候肝地以候腎人以候脾胃之氣江州王九達云上部天以候頭角脈在額兩旁瞳子髎聽會等處足少陽膽經會陽陵泉脈氣所行也地以候口齒脈在鼻孔下兩旁近於巨髎之分足陽明胃脈氣所行也人以候耳目脈在耳前陷中竹絲空和髎等處手少陽三焦經脈氣所行也中部天手太陰肺經脈在掌後寸口中是名經渠即手太陰肺經脈氣所行也地手陽明大腸經脈在手大指次指岐骨間合谷之分即手陽明大腸經脈氣所行也人手少陰心經脈在掌後鋭骨之端神門之分刺之治心瘧即手少陰心經脈氣所行也下部天足厥陰肝經脈在氣衝下三寸五里之分女子取太衝在足大指本節後二寸陷中即足厥陰肝經脈氣所行也地足少陰腎經脈在足內踝後跟骨上陷中太溪之分即足少陰腎經脈氣所行也人足太陰脾經脈統於公孫一穴一切脾病皆治在魚腹上越兩筋之間箕門血海上六寸之分即足太陰脾經會陰陵泉脈氣所行也三而三之謂之九候上古診法精詳故兼取十二經動脈後世診法簡約故獨取寸口內經云氣口成寸以決死生氣口即可以決死生則余經之動脈可以弗診矣況女子取太衝如何可行此今古之異也何謂王叔和二十六脈浮而大散者心浮而短澀者肺浮緩為不仁浮緊為傷寒浮大而虛主內傷浮脈按之不足輕舉有餘為風虛運動之候為病在表為風應人迎為氣應氣口為熱為痛為暑為嘔為脹為痞為喘為滿不食浮大左甚為傷風頭重鼻塞浮滑左關疾為宿食風痿浮大長為風眩癲疾浮細而滑右關為傷飲浮數之脈應發熱反惡寒者瘡疽也芤脈浮大而軟按之中空旁實如按蔥葉為失血之候寸芤主吐血衄血血絲關芤主嘔血脈痛噎雜尺芤主下血崩漏滑脈往來流利圓滑如珠為血實陰有餘氣壅之候為嘔吐寸關滑為痰逆為宿食為經閉滑而不斷者經不閉滑而斷絶者經閉也上為吐逆下為氣結滑數為熱結婦人太陰脈滑主有胎孕吐嘔平人脈滑以弱主有胃氣無病實脈浮中沉三處皆有力曰實為三焦氣滿之候為熱為嘔為痛為氣塞為氣聚為食積為利為伏陽在內平人脈太實主有痢疾來宜先下之瘡疽人脈實者亦急下之久病脈實者凶弦脈端直以長狀如弓弦為氣血不舒之候為陽中伏陰或經絡寒滯為痛為飲為瘧為疝為拘急為寒熱為血虛盜汗為冷痹為勞倦弦數為勞瘧弦緊為惡寒雙弦脅痛長主積隨左右上下緊脈舉按急數如轉索之無常為邪風激搏伏於榮衛之間為寒為痛浮緊為傷寒身痛沉緊為腹中有寒為風癇緊數為寒熱洪脈來大去長為榮衛大熱之候為表裡皆熱為煩滿為咽乾為二便不通洪實為癲洪緊為癰疽喘急又為脹滿不食乎人脈洪大為病至宜先清利之微脈極細而軟無浮沉之別曰微為氣血俱虛之候為虛弱為嘔為瀉為虛汗為拘急為崩漏敗血不止微弱為少氣浮而微者為陽不足主肌寒下利久病者脈微易治平人脈微為虛沉脈輕手不見重按乃得為陰逆陽郁之候為氣為水為寒為喘為停飲為瘕症為脅脹為厥逆為洞泄沉細為少氣臂不能舉沉遲為痼冷沉滑為宿食沉伏為霍亂沉數為內熱沉遲為內寒沉弦主心腹冷痛肝腎俱沉牢長者肝也按之濡舉指來實者腎也主水鬱以兼脈取之如兼滑痰鬱之類緩脈支來微遲浮大而軟浮緩為風邪皮膚不仁中緩為胃氣平和在上為項強在下為腳弱浮緩為風沉緩血氣弱凡病見緩脈為不治自愈若脾脈大數時微緩一代者飲食不節寒溫失所也澀脈按之則散而復來舉之則細而不足為氣多血少之候為傷精為敗血耗氣亡汗寸澀為陽虛頭痛關澀為腹痛尺澀為下部疼痛女人有孕為胎漏無孕為敗血病主心痛主血痹澀而堅主內留惡血表熱脈澀主中霧露遲脈呼吸三至為陰盛陽虛之候為寒為痛浮遲主表寒沉遲主裡寒居寸為氣虛居尺為血虛氣寒則縮血寒則凝伏脈輕手不見重手亦無按至於骨乃見為關格閉塞之候為積聚為疝瘕為霍亂為溏泄為停食為水氣為榮衛氣閉而厥逆關前得之為陽伏關後得之為陰伏濡脈極軟而浮細為血氣不足之候為虛為痹為自汗為下冷寸濡驚悸關濡少食尺濡泄下弱脈故而沉細按之欲絶為無氣虛損之候為痿弱為痼冷為哄熱為泄精為虛汗猶愈於微脈長脈洪大出於本位氣血俱有餘也為陽毒內蘊三焦煩郁為壯熱若傷寒得長脈欲汗而自解也長而緩者百病皆愈短脈兩頭無中間有不及本位是氣不足以導其血也為陰中伏陽為三焦氣壅為宿食不消諸病脈短皆難治虛脈遲大而軟豁然而空為氣血兩虛之候為暑坷煩滿為多汗為恍惚多驚為小兒驚風促脈按之來去甚數時一止而復來乃陽獨盛而陰不能相和也或怒逆上亦令脈促為氣粗為狂悶為瘀血發狂又為氣血飲食痰五者或一有留滯乎其間因而為促結脈按之往來遲緩時一止而復來乃陰獨盛而陽不能相入也為癥結為七情所郁浮結為寒邪滯經沉結為積氣在內又為氣血飲食痰五者或一有留滯乎其間因而為結此二脈漸退則生漸加則死經云胃之大絡名曰虛里結而橫有積矣徐春甫云結脈惟妊婦無妨若平人痰火之人得之近則一年半年遠則三年無不死者代脈每至本臟一歇不能自還因而復動由是復止尋之良久乃復強起曰代主形容羸瘦口不能言若不因病而人羸瘦其脈代止是一臟元氣真危亡之兆也若因病而氣血驟損以致元氣不續或風家痛家脈見代止只為病脈故傷寒家亦有心悸而脈代者心腹痛亦有結澀止代不勻者蓋幾病之脈不可準也又妊娠亦有代脈此必二月之胎牢脈沉而有力動而不移為氣喘息促為皮膚者腫牢而疾為發熱牢而遲為發寒遲疾不常寒熱往來見牢脈者危動脈狀如豆大不往不來不離其處多於關部見之為痛為驚為虛勞體痛為崩為泄利陽動則汗出陰動則發熱細脈按之如蛛絲蓋血冷氣虛不足以充故也為元氣不足乏力無精內外俱冷痿弱洞泄憂勞過度為傷濕為積為病在內及在下前細後大氣短前大後細脫血六脈勻細男平而女懷胎數脈一息六至為煩滿上為頭疼上熱中為脾熱口臭胃翻嘔逆左關為肝熱目赤右尺為小便赤黃大便閉澀浮數表熱沉數里熱雜病初逢多宜補藥身有痛處皆主癰作數候多凶勻健猶可惟宜小兒傷寒孕瘧浮數易飢易飽數虛下部生瘡散脈舉之似浮而散大無力按之則滿指散而不聚來去不明漫無根抵為氣血耗散臟腑氣絶在病脈主陽虛不斂又主心氣不足何謂從症而不從脈凡病有從症而不從脈者如久病無脈是氣將絶也主必死若不繫久病或暴病無脈或傷寒痛風或痰積經閉或憂驚折傷或氣運不應一時無脈不可便以死斷當聽其五音察其五色問其所欲所苦或寒或熱看病參詳治之又如傷寒六七日不大便目中不了了無表症脈雖浮亦有可下者如大便不難不可輕下少陰病得之二三日無里症脈雖沉亦有可汗者謂身熱而表猶未解也故用麻黃細辛湯之類微取其汗如身不發熱不可輕汗東垣云形質肌肉顏色似不病者此心病也不形於脈又大去血後勿以脈診脈雖數為假熱獨參湯救之血脫則補氣也五臟之輪至也肺在一與六心在二與七脾在三與八肝在四與九腎在五與十肺心在上屬陽主呼肝腎在下屬陰主吸脾居中間陰中有陽主呼吸之間代止之脈在何臟何腑以此斷生死之期何謂瘡瘍之脈沉實發熱煩躁外無焮赤痛其邪深在裡宜先疏通以絶其源浮大數焮腫在外當先托裡恐邪入內不沉不浮內外症無知其在經當和榮衛脈數身無熱內有癰膿脈數應當發熱而反惡寒若有痛處當發癰若數脈不時見當生惡瘡浮腫瘍為虛為風潰瘍為虛宜補洪腫瘍為虛為熱盛宜宣熱拔毒年壯形實宜下潰瘍為邪氣盛服藥久不退者難治滑腫瘍為熱潰瘍為熱為虛為邪未退數腫瘍為病進為熱數而洪者欲膿潰瘍為難愈散腫瘍為氣不收斂潰瘍為痛未退洪滑大數難治芤腫瘍為血虛潰瘍為虛為脈病相應長腫瘍宜消退之法潰瘍為易愈牢腫瘍為邪盛欲膿潰瘍為邪不退實腫瘍為邪氣太盛潰瘍為邪不退為實緩豁大者為虛弦腫瘍為痛欲膿弦洪相搏外緊內熱為疽發也潰瘍為血虛為痛緊腫瘍浮而緊發熱惡寒或有痛處是為癰疽澀腫瘍為氣實為氣滯潰瘍為血虛為脈病相應短腫瘍為元氣不足潰瘍為虛宜補微腫瘍為虛潰瘍勻者為脈病相應遲腫瘍為寒為虛尺遲為血少潰瘍為氣血不能滋榮於瘡為有外寒緩腫瘍為可治大而緩為虛潰瘍緩而澀者愈以其病相應及胃氣充也沉腫瘍為邪氣深潰瘍為遺毒在內寸沉為胸有痰伏腫瘍為陰中伏陽邪潰瘍為陽伏陰中為內蝕為流注浸淫難治虛腫瘍宜內托潰瘍宜大補弱腫瘍為元氣不足宜內托潰瘍為病脈相應宜補結腫瘍為邪結潰瘍漸勻則愈不調則危促腫瘍為熱為病進潰瘍為熱不減漸進則死漸退則生代腫瘍為氣血敗壞元氣損傷潰瘍為元氣竭絶何謂小兒之脈小兒乳抱之時未能飲食不可診脈但以食指三節為三關辨驗之上節為命關中節為風關下節為氣關黃赤為熱青黑為痛白為寒見於氣關者主在內之疾見於風關者主在外之疾也於命關者不治何謂將死之脈歌曰雀啄或云肝絶連來三五啄屋漏或云胃絶半日一點落脾胃心肺絶腎絶也彈石硬或云腎絶來尋即散肺絶也搭指散亂或云脾絶真解索五臟絶也魚翔似有又似無或云心絶腎絶也蝦遊靜中跳一躍人或云大腸絶脾胃絶也更有釜沸湧如羹旦占夕死不須藥余謂此七脈亦不必強分總之陰陽之氣將散不能自有之象一動一止兩日死兩動一止四日逝三動一止六日亡四動一止八日事五動一止只十日十動一止一年去春草生時即死期二十一動二年住清明節後始傾亡三十動止三年次立秋節後病則危四十動止四年斃小麥方熟是死期五十一止五年絶草枯木脫時死矣五臟之輪至也肺在一與六心在二與七脾在三與八肝在四與九腎在五與十肺心在上屬陽主呼肝腎在下屬陰主吸脾居中間陰中有陽主呼吸之間代止之脈在何臟何腑以此斷生死之期何謂心腹疼痛之脈陳無擇云十二經絡外感六淫則其氣閉塞鬱於中焦氣與邪爭發為疼痛足厥陰心痛兩脅急引小腹連陰股相引痛手心主心痛徹背心煩掌中熱嘔干目黃亦脅滿足太陰心痛腹脹滿澀澀然大便不利隔閉咽塞手太陰心痛短氣不足以息季脅空痛遺矢無度胸滿煩心足少陰心痛煩劇面黑心懸若飢胸滿腰脊痛背俞諸經心痛心與背相引心痛徹背背痛徹心諸府心痛難以俯仰少腹上衝卒不知人嘔吐泄瀉此皆諸經諸府涉邪所致痛屬外所因若五臟內動汩以七情則其氣痞膈聚於中脘氣與血搏發為疼痛肝心痛者色蒼蒼然如死狀終日不得太息真心痛者寒邪傷其君也手足青至節旦發夕死夕發旦死脾心痛者如針錐刺其心腹蘊蘊然氣滿肺心痛者若從心間起動作益甚色不辨腎心痛者與背相引善瘛如物從後觸其心身偃僂胃心痛者腹脹滿不下食食則不消皆臟氣不平喜怒憂鬱所致屬內因若飲食勞逸觸忤非類使臟氣不平痞隔於中或飲啖生冷果實中寒不能消散結而為積遇時還發名積心痛及其臟寒生蛔致心痛者所謂九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰疰曰去來痛者除風熱冷屬外因余皆不內外因婦人惡血人心脾經發作疼痛尤甚於諸痛卒中客忤鬼擊尸疰使人心痛亦屬不內外因經曰陰弦為心痛心脈微急為痛微大為心痹引背短而數心痛澀則心痛沉細者生浮大弦長者死凡諸心痛者皆少陰厥氣上衝也有熱厥心痛者身熱足寒甚則煩躁而吐額自汗出如為熱也其脈浮大而洪當灸太溪及崑崙謂表裡俱瀉之是調熱病汗不出飲熱下利表汗通身而出者愈也灸畢服金鈴子散則愈痛止服枳朮丸去其餘邪也又有大實心中痛者間氣而食卒然發痛大便或祕久而注悶心胸高起按之愈痛不能飲食急以煮黃丸利之後以藳本湯去其邪也有寒厥心痛者手足逆而通身冷汗出便溺清利或大便利而不渴氣微力弱急以朮附湯溫之寒厥暴痛非久病也朝發暮死急當救之是知久病無寒暴病非熱也內經曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故痛止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至則痛止重感於寒則痛久寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故肋與少腹相引痛厥氣客於陰股寒氣上及少腹皿泣在下相引故腹痛引陰股寒氣結於小腸募原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔寒氣客於小腸小腸不得成聚故後泄腹痛熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通脈經曰陰弦則腹痛弦急小腹痛尺脈緊臍下痛尺脈伏小腹痛瘕疝尺脈實小腹痛當利之心腹痛不得息脈細小遲者生堅大疾者死邪氣聚於下焦則津液不得通血氣不得行或溺或血留滯於下是生脹滿而硬痛也若從心下至少腹皆硬滿而痛者是邪實也須陷胸湯下之若但小腹硬滿而痛小便利者則是畜血之症小便不利者則是溺澀之症凡腹痛四物苦楝湯酒煮當歸丸之類夏月腹痛肌熱惡熱脈洪疾手太陰足陽明主之苓芍湯主之秋兒腹痛肌寒惡寒脈洪疾足太陰足少陰主之桂枝芍藥湯四時腹痛芍藥甘草湯卒暴疼痛若非中惡客忤即飲食過度腸胃不勝氣不及化傷於太陰脾經而然則東垣三物備急丸不可缺也然腹痛為病有冷有熱有虛有實至於血氣蟲積皆能作痛當詳審其證診其脈而施治焉大抵痛則不通通則不痛凡痛甚先通利此要法也何謂郁病之脈按氣血痰三症多有兼郁者或郁久而生病或病久而成郁雖氣用四君血用四物痰用二陳必以開鬱藥佐之諸郁之脈皆沉沉則為郁但芤澀數緊滑緩之不同耳病之屬郁者八九視所挾兼症以開導之氣鬱其症胸滿脅肋脹痛脈沉而澀用二陳加香附撫芎蒼朮氣實者加枳實厚朴砂仁山梔青皮木香之類濕鬱其症周身走痛或關節痛遇陰寒則發脈沉而細緩身體重頭痛白芷蒼朮川芎茯苓香附或升陽除濕湯血鬱其症四肢乏力能食便血脈澀而芤四物加桃仁紅花青黛撫芎香附痰鬱其症動則喘寸口脈滑而沉二陳加海石南星香附瓜簍仁半夏苦瓜簍搗汁用煅過蛤粉拌勻作餅曬乾名海石入最能破痰蓋蛤生海中得咸能軟堅而瓜簍又去痰之品若以海中浮石為海石非是火鬱其症瞀悶大便赤澀脈沉而數骨髓中熱肌痹熱捫之烙手逍遙散加山梔香附青黛撫芎貝母蒼朮或火鬱湯食鬱其症暖酸胸滿腹脹不能食或吐酸水惡聞食氣人迎脈平和氣口脈緊盛或沉緩而大保和丸加枳實麥芽砂仁香附之類
