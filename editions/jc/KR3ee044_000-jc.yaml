body:
  text: 身經答問五長春子曰頭面體面之所關咽喉飲食出入之道路一有病症所關非小如不識經絡亂投湯劑其為危殆也必矣詳哉吾子之言之也請再言四肢筋骨皮肉兩腋髭鬚之所屬奉卒聞之曰四肢者諸陽之本也陽實則肢腫經云結陽腫四肢是也陽虛則肢滿經云冬氣滿在四肢是也脾主四肢經云四肢皆稟氣於胃而不得至經必因於脾乃得稟者是也脾實則四肢不舉經云脾脈太過為病在外則令人四肢不舉是也脾虛則四肢不用經云脾藏肉形不足則四肢不用又云四肢懈惰此脾經之不行是也運氣四肢不舉皆屬濕經云土太過曰敦阜其病腹滿四肢不舉是也五臟有邪流在肢節經云肺心有邪其氣留於兩時肝有邪其氣留於兩股脾有邪其氣留於兩髀腎有邪其氣留於兩膝是也在藏為肺在體為皮毛肺之合皮也其榮毛也皮者肺之部也邪客於腠理則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟毛折爪枯為手太陰絕在藏為心在體為血脈夏脈太過則病身熱膚痛為浸淫少陰在泉熱淫所勝病寒熱皮膚痛少陰司天火淫所勝熱上皮膚痛少陰之復咳皮膚痛治以諸寒陽明在泉燥淫所勝病體無膏澤治以苦寒在藏為脾在體為肉邪在脾胃則病肌肉痛肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿積寒留舍榮衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也在藏為肝在體為筋酸生肝肝生筋筋生心諸筋病皆屬於節筋病忌風忌食酸辛忌久行足太陽之下血氣皆少善轉筋踵下痛轉筋多屬血熱在藏為腎在體為骨少陰者冬脈也伏行而濡骨髓者也骨病忌食甘忌久立多食甘則骨痛而發落手屈而不伸病在筋伸而不屈病在骨腋謂臂下脅上際也屬厥陰心包經又屬足厥陰肝經腋前屆手太陰肺經腋後屬手少陰心經腋下屬足厥陰肝經下六寸屬足太陰脾之大絡針灸腋腫有二法其一取膽經云足少陽之脈所生病缺盆中腫痛腋下腫其二取心經云心主手厥陰脈病手心熱腋腫腋氣曰狐臭有竅諸藥鮮能除根止堪塞竅耳用銅青好者不拘多少米醋調膏先用皂角煎湯洗淨腋下以輕粉摻過使上藥塗之立效足少陽膽之經其榮在須足少陰腎之經其華在發沖任之脈為十二經之海謂之血海其別絡上唇口若血勝則榮於頭髮故鬚髮美若血氣衰弱經脈虛竭不能榮潤故鬚髮脫落若稟沖任不盛宗筋不成有氣無血唇口不榮故須不生黃赤者多熱多氣白者少血少氣黑者多血少氣美眉者太陽多血通髯極須者少陰多血美須者陽明多血長春子曰善哉予前此未嘗聞也予退而志之坐則習焉行則佩之矣身經答問六長春子曰均是人也男女之不同何也尊生子對曰男子以氣為主坎水用事故蒸氣為精而色白女子以血為主離火用事故血盈為經而色紅男子背屬陽而腹屬陰女子腹屬陽而背屬陰男子督脈用事自背尾閭行至齦交穴止故血盛者感陽氣而髭鬚生女子任脈用事自小腹上行至咽喉而止故不能上與陽合而無須男子屬陽陽極則必自上而垂下故陽莖垂而乳頭縮女子屬陰陰極則必自下而衝上故乳房凸而陰戶凹血氣之多少有異同否乎曰有手足少陽手足太陰手足少陰凡六經皆多氣少血手足太陽手足厥陰凡四經皆多血少氣手是陽明凡二經皆多氣多血少者補之多者損之不多不少者和之氣血之所走何如曰手之三陽從手走頭足之三陽從頭走足是高能接下也是之三陰從足走腹手之三陰從腹走手是下能趨上也督脈從頭入骶任脈從胞上注目故上下升降而為和五運六氣其為病何如曰諸風掉眩皆屬肝木諸痛癢瘡皆屬心火諸濕腫滿皆屬脾土諸氣膹郁皆屬肺金諸寒收引皆屬腎水此病之屬於五運者然也諸暴強直皆屬於風諸嘔吐酸皆屬於熱諸燥擾狂越皆屬於火諸痙強直皆屬於濕諸澀枯涸皆屬於燥諸病水液澄徹清冷皆屬於寒此病之屬於六氣者然也治病必求其本其道何如曰厥陰為標風木為本其風邪傷於人也掉搖而眩轉瞤動而瘛瘲卒暴強直之病生矣少陰為標君火為本其熱邪傷於人也瘡瘍而痛癢暴注而下迫水液渾濁之病生矣少陽為標相火為本其熱邪傷於人也為熱而督瘛躁擾而狂越如喪神守之病生矣善為治者風淫所勝平以辛涼熱淫所勝平以鹹寒火淫所勝平以鹹冷以其病本於陽也求其陽而療之病之不愈者未之有也太陰為標濕土為本其濕邪傷於人也腹滿而身腫按之而沒指諸痙強直之病生矣陽明為標燥金為本其燥邪傷於人也氣滯而膹郁皮膚以皴揭諸澀枯涸之病生矣太陽為標寒水為本其寒邪傷於人也吐利而腥穢水液以清冷諸寒收引之病生矣善為治者濕淫所勝平以苦熱燥淫所勝平以苦溫寒淫所勝平以辛熱以其病本於陰也求其陰而治之病之不愈者未之有也又非特如此而已其在皮者汗而發之其人里者下而奪之其在高者因而越之謂上湧也其在下者引而竭之謂下利也慓悍者按而摩之攣痹者針而刺之藏寒虛弱者治以灸焫血實腫熱者治以砭石氣滯痿厥寒熱者治以導引經絡不通病生於不仁者治以醪醴血氣凝澀病生於筋脈者治以熨藥始焉求其受病之本終焉蠲其為病之邪其道無出於此矣古人治病其不專主於藥者何也曰各從其道也其人之形樂志苦者病生於脈治之以灸刺形苦志樂者病生於筋治之以熨引形樂志樂者病生於肉治之以針石形苦志苦者病生於咽嗌治之以百藥經絡不通病生於不仁治之以按摩醪藥運氣有標本而治病者或從本或從標或不從標本而從中其義可得聞與曰少陽際也相火本也標本皆同從本言病皆相火為之也太陰標也濕土本也標本亦同從本言病皆濕土為之也厥陰標也風木本也標本不同故不從標本而從中以其中見少陽也少陽相火言病亦相火為之也陽明標也燥金本也標本亦不同故不從標本而從中以其中見太陰也太陰濕土言病亦濕土為之也太陽寒水標陽而本寒少陰君火標陰而本熱標本各異故從本而又從標病在標則治其標病在本則治其本各從其見症也陰陽交相錯水火互為根與前四氣之例不同矣其治法當何如曰膽與三焦肝與包絡從火治也脾與肺胃與大腸從濕治也腎與膀胱心與小腸或寒或熱酌於臨時也表實里和邪在經也法當汗之裡熱表寒邪入腑也法當下之攻裡則勿解表解表則勿攻裡表裡如或兩有可攻則後先內外之間猶宜分其多少焉蓋天地之數五而火熱居三可見天地之氣熱多於寒火倍於水而人之症治從可知矣經絡有相通者有不相通者可得聞其略乎曰手陽明大腸與足陽明胃相通手太陽小腸與足大陽膀胱相通手少陽三焦與足少陽膽相通所以胃有病而大腸亦病膽有病而三焦亦病小腸有病而膀胱亦病是同經同氣之相感者也其餘手足諸經者皆有別經間隔不能相通故鮮貽累焉身經答問七長春子曰以寒治熱以熱治寒理之常也乃有服寒藥而反熱服熱藥而反寒則治者無所措手矣若是者何也曰治其旺氣是以反也如夏月感寒鬱而為熱此宜用辛散之藥也而庸人不知見其身既熱而時令又熱遂誤以寒藥治之則表邪不能發散而熱乃愈甚如冬月傷寒失於汗下邪氣傳變亢陽內鬱而身寒者此宜用苦寒之藥攻之也而庸人不知見其身既寒而時令又寒遂誤以熱藥治之則內邪未得疏通而寒乃愈甚經曰發表不遠熱攻裡不遠寒此之謂也其不治旺而然者何義也曰譬如肺氣虛而身寒其寒也由於肺氣之不足也宜補其氣則生陽矣乃誤投以辛熱之藥則陽虛陰必湊而身寒反甚蓋徒知寒者熱之而不思夫味之辛者旺於秋而屬於肺辛先入肺以散肺氣如之何其弗寒也如心血虛而身熱其熱也由於心血之不足也宜補其血則生陰矣乃誤投以苦寒之藥則陰虛陽必乘而身熱更熾蓋徒知熱者寒之而不思夫味之苦者旺於夏而屬於心苦先入心以瀉心血如之何其弗熱也故曰不味旺味而有所犯也敢問臟腑之互用者何謂也曰天六府氣表其體在上其用在下膽胃膀胱大小腸也地五臟血里其體在下其用在上耳目口鼻也天氣左旋而下降地氣右旋而上升互相為用也心肺為太陰少陰而通行陽氣大小腸為陽明太陽而傳送陰氣互相為用也敢問臟腑經絡之名有疑義否乎曰有之請為子詳辨焉以四時合於身者言之春曰肝夏曰心長夏曰脾秋曰肺冬曰腎以人之臟腑言之上為肺與心中為脾下為肝與腎經云呼出肺與心吸入腎與肝呼吸之間有一至是為脾脈其不符於四時何也蓋以腎者肺之所生肺為金而屬乾乾天也故肺通天氣而居上天一生水而為腎腎之上為肝肝之上為心心屬火而生土火土同原而生金故肺居上也天上有水山上有泉水出高原頭在九天之上尾徹九地之下故先儒曰天地四旁皆水也此天漢之源流也以陰陽之常論之腎為坎水陽少陰多宜曰太陰心為離火陰少陽多宜曰太陽肝為震木陰多陽少宜曰少陽肺為兌金陽多陰少宜曰少陰脾居戊己土之沖氣宜曰陰陽之中則人可無疑矣乃以運氣經絡論之腎居北方謂之寒水可也何以配太陽乎心居南方謂之君火可也何以配少陰乎肝在東方陽位謂之少陽可也何以曰厥陰乎肺在西方陰位謂之少陰可也何以曰太陰而又配陽明乎脾在中州明為陰陽之中乃以胃屬陽明脾屬太陰與肺之臟腑相同又何說也種種疑端豈古聖人有遺義乎曰勿疑也按內經云陰陽之道推之可千可萬未可以常理執也今特為辯之腎配太陽心宜配太陰而配以少陰者陽常饒而陰常乏猶易之陽用九陰用六也肝居陽位而曰厥陰者水生於秋冬之後論其本為陰之盡故曰厥陰也肺居陰位而燥金曰陽明者金生於春夏之後論其本陽明於前故曰陽明也若腎為寒水心為君火肝為風木此無疑也至肺與脾其為太陰乃土主濕金主燥則又不能無疑矣蓋老陽必變為陰火當至盛之時已變為土土濕故曰太陰試觀季夏之時大雨時行土生金而為水之母則其氣之相通而同為太陰可知矣若膀胱之配腎膽之配肝小腸之配心大腸之配肺胃之配脾三焦之配乎心主以其小絡之相通也然小腸為太陽而膀胱亦為太陽膀胱之為太陽也與小腸俱至目內眥同居頭面午位故皆曰太陽也肝為厥陰而心包亦為厥陰相火為風木所生子母同氣故皆曰厥陰也心為少陰而腎亦為少陰子午相通水火互根故皆曰少陰也脾曰太陰而肺亦曰太陰肺金為脾土所生子母同氣故亦曰太陰也胃曰陽明而大腸亦曰陽明子母相親故皆曰陽明也膽為少陽而三焦亦曰少陽者三焦起於亥膽起於子俱在耳門銳眥之間故皆曰少陽也心為君火脾為濕土此無疑也肝木之為風也將克乎土故風為之揚也肺金之為燥也方離於火已脫乎濕故燥氣未去也風極生火故曰風從火斷汗之宜燥極生寒故曰燥與濕兼下之可曰太陰之為濕土也少陽之為相火也陽明之為燥金也厥陰之為風木也其義相類其理易測也至於太陽而為寒水少陰而為心火其義不類其理難測矣何以明之曰君火同午火本熱而其氣當陰生之初故標寒而屬乎少陰水居子位水本寒而其氣當陽生之初故標熱而屬乎太陽身經答問八長春子曰吾聞臟腑有移熱移寒其症為何如尊生子曰經言之矣脾肉移寒於肝筋癰腫筋攣肉冷筋急結聚為癰肝移寒於心神狂鬲中寒薄心則神亂故狂寒與熱薄故中鬲不通心移寒於肺肺消肺消者飲一溲二死不治寒隨心火內爍金精肺金精移寒子腎為漏水水氣客於大腸疾行則鳴如囊裹漿腎有餘上奔於肺脾移熱於肝血為驚衄肝移熱於心則死火木相燔心移熱於肺傳為鬲消鬲熱多飲肺移熱於腎傳為柔痓柔謂筋無力痓謂骨不隨腎移寒於脾癰腫少氣寒入於陽血凝氣聚而為癰腫腎移熱於脾傳為虛腸澼死腎主下焦今乃移熱下焦無主胞移熱於膀胱則癃溺血膀胱移熱於小腸脈絡於心循咽下鬲胃鬲腸不便上為口糜小腸移熱於大腸為慮瘕為沉兩熱相薄則血滯月不行大腸移熱於胃善食而瘦又謂之食㑊胃移熱於膽亦日食㑊膽移熱於腦則辛頞鼻淵鼻淵者濁涕不下止也傳為衄蠛汗血瞑目故得之氣厥也曰於何而知其移也曰觀其色聽其聲診其脈問其所欲飲食而驗其見症也足陽明脈交頞中旁約太陽之脈熱盛則陽絡溢衄出血出聲故瞑敢問三陰三陽之發病何如也曰陽氣起於足五指之表陰氣起於足五指之裡各其症也一陽發病善咳善泄其傳為鬲上咳下泄中鬲三焦俱病二陽之病發心脾男子不得隱曲女子不月其傳為風消風邪勝兩氣愈消為息賁死不治脾為生化之源心統諸經之血三陽為病發寒熱下為腫痿傳為㿗疝上爭則寒多下爭則筋弛一陰為病主驚咳背痛噫欠名曰風厥二陰一陽發病脹滿善氣二陽三陰發病為偏枯四肢不舉三陰不足三陽有餘陰結者便血一升再結二升三結三升多陰少陽曰石水少腹腫二陽結謂之消胃大腸熱善消水穀三陽結謂之鬲小腸膀胱血燥則鬲塞不便三陰結謂之水脾肺俱寒氣化為水一陰心一陽三焦結謂之喉痹二脈井絡於喉陰摶陽別謂之有子摶觸手也陰虛陽摶謂之筋陽加於陰謂之汗陰陽虛腸澼死敢問六氣之中人而致病者孰為甚乎曰莫甚於風矣風者數行而善變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈俞散於分肉之間與胃氣相干其道不利故使肌肉膹䐜而有瘍衛氣有所凝而不行故其肉有不仁若榮衛熱附其氣不清故使鼻柱壞而色敗則皮膚瘍潰風寒客於脈而不去名曰厲風風中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經中陰者嘗從臂䯒始夫臂與胻其陰皮薄其肉淖澤故俱受於寒獨傷其陰中陽則溜於經中陰則溜於腑故傷於風者上先受之傷於濕者下先受之陽病者上行極而下陰病者下行極而上身經答問九長春子曰予問臟腑陰陽其所屬之類不同者多矣可得而問其詳乎曰於經有之我為子類舉焉可乎肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之市鬲肓之上中有父母七節之旁中有小心從之有福違之有咎心主神其華在面其充在血脈其畜羊其谷黍肺主魄其華在毛其充在皮其畜馬其谷稻腎主精其華在發其充在骨其畜彘其谷豆肝主魂其華在爪其充在筋其畜雞其穀麥脾胃大小腸三焦膀胱主轉味而出入其華在唇四白其充在肌其畜牛其谷稷心惡熱肺惡寒肝惡風脾惡濕腎惡燥心出汗肺出涕肝出淚脾出涎腎出唾心藏神肺藏魄肝藏魂脾藏意腎藏志心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒諸脈皆屬於目諸髓皆屬於腦諸筋皆屬於節諸血皆屬於心諸氣皆屬於肺人臥則血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋春氣病在頭夏氣病在臟秋氣病在肩背冬氣病在四肢故春善病鼽衄仲夏善病胸脅長夏善病洞泄中寒秋善病風瘧冬善病痹厥若冬不按蹻則皆不病氣盛身寒得之傷寒氣虛身熱得之傷暑犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘籲入五臟則腹滿閉塞下為飧泄久為腸澼口甘為脾癉肥美之所發也口苦為膽癉此人數謀慮不決治之以膽募俞胸腹曰募背脊曰俞膽募在期門下五分俞在脊第十椎下兩旁各開一寸半頸脈動喘咳曰水目腫如臥蠶狀曰水尿黃赤安臥者曰黃疸食已如飢者曰胃疸面腫曰風足脛腫曰水目黃曰黃疸腹中鳴者病本於胃也食不能下者胃脘鬲也身重難以行者胃脈在足也月事不來者胞脈閉也胞脈屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也神有餘則笑不休神不足則悲治神有餘則瀉其小絡之血少腹盛上下左右皆有根病名伏梁裹大膿血居腸胃之外久病為難治居臍上為逆居臍下為從病脅下滿氣逆二三歲不已名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣天有六氣人以三陽三陰上奉之地有五行人以五臟六腑下應之從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內中外不相及則治其主病熱因寒用寒因熱用塞因塞用通因通用陽盛陰虛死陰盛陽虛汗之則愈下之則死天時勝則舍人之病而從天之時人病勝則舍天之時而從人之病此蓋有權衡焉所當以形症察之而不可專恃乎脈者也身經答問十長春子曰吾聞臟腑有相生者有相剋者有相乘者虛則補母實則瀉子敢問何義也尊生曰子凡肺之得病先觀其心之虛實若心火盛而爍金即當先抑心氣後服肺藥若心氣和更診脾脈虛實若脾氣虛冷不能相生則肺不足而易感風邪故患肺惡寒者多由脾虛得之若脾氣盛實則又痞滿中焦而大腸與肺表裡不能相通夫中焦膈熱肺與大腸不通其熱氣必上蒸於肺故患肺熱者多由脾實得之心氣盛者瀉之脾氣虛者益之脾氣實者通之須隨其氣之寒熱以治之故有抑心氣脾氣之藥當診其脈若心脾俱和肺自生疾則察肺之虛實而治之肺虛五味子補之如無他症阿膠散補之補母脾土以甘草肺實桑白皮瀉之如無他症以瀉白散瀉之若曰實則瀉其子腎水無實不可瀉肺主燥自病則喘嗽必須潤之實則喘而氣盛虛則喘而少氣心乘肺賊邪熱而喘嗽先地黃丸中導赤散後阿膠散肝乘肺微邪惡風眩冒昏憒而嗽羌活膏脾乘肺虛邪體重吐痰泄瀉嗽人參白朮散腎乘肺實邪憎寒嗽泄利百部丸凡脾之得病必先察其肝心兩臟之虛實原其所始而療之蓋肝為脾鬼心是脾母肝氣盛則鬼勝心氣虧則脾之生氣不足盛者抑之使退虧者益之使平故有抑肝益心二藥診其脈肝心二臟俱和是脾自生疾矣須察本經虛實而治之入求責法脾虛以甘草大棗之類補之如無他症益黃散補之心乃脾之母以炒鹽補之脾實以枳實瀉之如無他症以黃連瀉之肺乃脾之子以桑白皮瀉之脾主濕自病則泄瀉多睡體重倦怠急以苦燥之實則瀉赤黃睡不露睛瀉黃散虛則瀉白色睡則露睛白朮散肝乘脾賊邪風勝泄而嘔茯苓半夏湯心乘脾虛邪壯熱體重而瀉羌活黃芩蒼朮甘草湯肺乘脾實邪能食不大便而嘔嗽煎檳榔大黃湯下葶藶丸腎乘脾微邪惡寒而泄理中丸凡心臟得病必先調其肝腎二臟腎者心之鬼肝氣通則心氣和肝氣滯則心氣乏故心病先求於肝是澄其源也五臟有病必先傳其所勝水能制火則腎邪必傳於心故先制其腎逐其邪不使腎邪於心用萆薢牛膝茯苓石斛續斷各五錢羌活獨活木香川芎各一錢天靈蓋酥炙三錢為末以小便少許化麝香三銖入蜜煉為丸空心鹽湯下三十丸心虛以炒鹽補之虛則補其母木能生火肝乃心之母以生薑補肝如無他症用安神丸主之心實以甘草瀉之如無他症用瀉心湯輕則導赤散心實則煩熱黃連瀉心湯虛則驚悸生犀散肺乘心微邪喘熱瀉白散肝乘心虛邪風濕煎大羌活湯下大青丸脾乘心實邪泄瀉身熱瀉黃散腎乘心賊邪恐怖惡寒安神丸五行之理惟腎之一臟母盛而子反受邪是物之性有不可一概論者肺腎是也何則肺屬金應乎皮毛所主者氣腎屬水主乎骨髓所藏者精氣之輕浮能上而不能下精之沉重能下而不能上此物理之自然今肺盛乃熱作也氣得熱而上蒸則肺不能下生於腎而腎受邪矣急以涼藥解之使藏氣溫和自能下生於腎矣此腎病必先求之於肺若肺和而腎忽受病不過脾濕相形所以有解肺熱去脾邪二藥若脾肺自和而腎受病亦當察本藏虛實而治之腎虛以熟地黃柏補之腎無實不可瀉故無瀉腎之藥虛則補其母以五味子補肺腎主寒自病則足脛寒而逆人之五臟惟腎無實小兒痘變黑陷是腎水克退心火多不治也心乘腎微邪內熱不惡寒桂枝丸肺乘腎虛邪喘嗽皮澀而寒百部丸肝乘腎實邪拘急氣搐身寒理中丸脾乘腎賊邪體重泄瀉身寒理中丸凡肝經得病必先察其肺腎兩藏原其起病然後復審肝經之虛賣然腎者肝之母肺者木之賊今肝得病若非腎水不能相生必是肺金鬼賊相剋故須審其來在肺先治肺攻其鬼也其來在腎先補腎滋其源也方審本藏之虛實而治之肝虛以生薑陳皮補之水能生木腎乃肝母若以補腎熟地黃柏補之如無他症地黃丸主之肝實以白芍藥瀉之如無他症瀉青丸主之心乃肝之子以甘草瀉心肝主風自病則風搐拘急急食甘以緩之佐以酸苦以辛散之實搐力大瀉青丸虛搐力小地黃丸心乘肝實邪壯熱而搐利驚丸肺乘肝賊邪氣盛則前伸呵欠微搐法當瀉肺先補本藏肝地黃丸後瀉肺瀉白散脾乘肝微邪多睡體重搐先當定搐瀉青丸搐止再見後症則以別法治之腎乘肝虛邪憎寒呵欠而搐羌活膏心包絡三焦相火也味甘補苦瀉氣熱補寒瀉三焦者稟腎間動氣以資始藉胃中谷氣以資生水穀自上焦而入自下焦而出膻中為氣海又氣海在臍下一寸半故曰水穀之道路氣之所終始也身經答問十一長春子聞而喜曰子言子母補瀉之義可謂備矣吾聞諸病各有主藥焉何謂也尊生子曰於湯液本草載之矣請為子言其要中風卒倒不語用牙皂細辛開關為主痰氣壅盛用南星木香為主語言蹇澀用菖蒲竹瀝為主口眼喎斜用防風羌活竹瀝為主手足搐搦用防風羌活為主左癱屬血虛用芎歸為主右瘓屬氣虛用參術為主諸風用防風羌活為主傷寒頭痛用羌活川芎為主遍身疼痛用蒼朮羌活為主發汗用麻黃桂枝為主久汗不出用紫蘇青皮為主止汗用桂枝芍藥為主表熱用柴胡為主裡熱用黃連黃芩為主大熱用連芩柏梔為主發狂便實用大黃芒硝為主發渴用石膏知母為主膨悶用桔梗枳殼為主心下痞悶用枳實黃連為主懊憹用梔子豆豉為主虛煩用竹葉石膏為主不眠用竹茹枳實為主鼻乾不眠用葛根芍藥為主發斑用玄參升麻為主發黃用茵陳梔子為主陰症用附子乾薑為主中暑用香茹扁豆為主中濕用蒼朮白朮為主瀉心火用黃連為主瀉肺火用黃芩為主瀉脾火用芍藥為主瀉胃火用石膏為主瀉肝火用柴胡為主瀉腎火用知母為主瀉膀胱火用黃柏為主瀉小腸火用木通為主瀉屈曲之火用梔子為主瀉無根之火用玄參為主內傷元氣用參耆甘草為主脾胃虛弱用白朮山藥為主消食積用麥芽神麯為主消肉積用山楂草果為主消酒積用黃連乾葛烏梅為主消涼積用巴豆為主消熱積用大黃為主六郁用蒼朮香附為主結痰用瓜蔞貝母枳實為主濕痰用半夏茯苓為主風痰用白附子南星為主痰在四肢經絡用竹瀝薑汁為主痰在兩脅用白芥子為主老痰須用海石為主寒嗽用麻黃杏仁為主熱嗽用黃芩桑白皮為主嗽久用款冬五味子為主氣喘用蘇子桑白為主瘧疾新者宜截用常山為主瘧疾久者宜補用白豆蔻為主痢疾初起宜下用大黃為主痢疾後重宜疏用木香檳榔為主痢疾熱積氣滯用黃連枳殼為主久痢白者屬氣虛用白朮茯苓為主久痢赤者屬血虛用當歸川芎為主泄瀉用白朮茯苓為主水瀉用滑石為主久瀉用訶子肉寇為主或加升柴升提霍亂用霍香半夏為主嘔吐用薑汁半夏為主咳逆用柿蒂為主吞酸用蒼朮神麯為主嘈雜用姜炒黃連黑梔為主順氣用烏藥香附為主痞滿用枳實黃連為主脹滿用大腹皮厚朴為主水腫用豬苓澤瀉為主寬中用砂仁枳殼為主積聚用三稜莪朮為主積左是死血用桃仁紅花為主積右是食積用香附枳實為主積中是痰飲用半夏為主黃疸用茵陳為主補陽用黃耆附子為主補陰用當歸熟地為主補氣用參耆為主補血用歸地為主破瘀血用歸尾桃仁為主提氣用升麻桔梗為主癆熱痰嗽聲嘶用竹瀝童便為主暴吐血用大黃桃仁為主久吐血用當歸川芎為主衄血用枯芩芍藥為主止血用京墨韭汁為主尿血用梔子木通為主虛汗用黃耆白朮為主眩運用川芎天麻為主麻屬氣虛用黃耆人參為主木屬濕痰死血用蒼朮半夏桃仁為主癲屬心用當歸為主狂屬肝用黃連為主癇症用南星半夏為主健忘用遠志菖蒲為主怔忡驚悸用茯神遠志為主虛煩不寐用竹茹棗仁為主頭左痛用芎歸為主頭右痛用參耆為主頭風痛用藳本白芷為主諸頭痛用蔓荊子為主烏鬚髮用何首烏為主耳鳴用當歸龍薈為主鼻中瘡用黃芩為主鼻塞用防風荊芥鼻淵用辛夷仁為主口瘡用連柏為主牙痛用石膏升麻為主眼腫用大黃荊芥為主雲翳用白蔻為主眼昏用熟地為主咽喉腫痛用桔梗甘草為主結核用夏枯草為主肺癰肺痿用薏苡仁為主心胃痛用炒梔子為主腹痛用芍藥甘草為主腹冷痛用早茱萸良薑為主止諸痛用乳香沒藥為主腰痛用杜仲故紙為主脅痛用白芥子青皮為主手臂痛用薄桂羌活為主疝氣用小茴香川楝子為主腳氣濕熱用蒼朮黃柏為主下元虛弱用牛膝木瓜為主痿躄用參耆為主肢節痛用羌活為主痛在上屬風羌活桔梗桂枝葳靈為主痛在下屬濕用牛膝木通防己黃柏為主消渴用天花粉繅絲湯為主生津液用人參五味子麥門冬為主赤白濁用茯苓為主遺精用龍骨牡蠣為主小便閉用木通車前子為主大便閉用大黃芒硝為主便血用槐花地榆為主痔漏用黃連為主脫肛用升麻柴胡為主諸蟲用史君子檳榔為主婦人諸病用香附為主婦人腹痛用吳茱萸香附為主婦人經閉用桃仁紅花為主婦人血崩用炒蒲黃為主婦人帶下用炒乾姜為主婦人安胎用條芩白朮為主婦人難產用芎歸為主產後惡露不行用益母草為主產後虛熱用炒黑乾薑為主婦人吹乳用白芷貝母為主乳汁不通用川山甲為主小兒驚風用硃砂為主癰疽用金銀花為主發背用槐花為主瘰癧用夏枯草為主敗膿不去用白芷為主惡瘡用貝母為主疔瘡用白礬為主便毒用川山甲木別子為主魚口瘡用牛膠川山甲為主疳瘡用五倍子為主楊梅瘡用土茯苓為主臁瘡用輕粉黃柏為主疥瘡用白礬硫黃為主癜風用蜜陀僧為主杖瘡跌傷用童便好酒為主諸瘡腫毒用連翹牛蒡子為主破傷風用南星防風為主湯燙火燒用白礬為主犬咬傷用杏仁甘草為主癲狗吠傷用斑貓為主蛇咬傷用白芷為主中諸毒用香油灌之為主中砒毒用豆鼓蚯蚓為主諸骨哽喉用狗涎頻服為主敢問諸藥引經之例何如也曰以傷寒傳經之序言之太陽一陽明二少陽三太陰一少陰二厥陰三太陽經上羌活下黃柏陽明經上白芷升麻下石膏少陽經上柴胡下青皮太陰經上桔梗下白芍少陰經上獨活下知母厥陰經上柴胡下青皮是謂六經引藥之總司身經答問十二敢問奇經八脈之見症何如也曰沖之為病氣逆而裡急也督之為病脊強而厥冷也任之為病其內苦結甲為七疝女為瘕聚也陽維之病苦寒熱陰維之病苦心痛陽矯為病陰緩而陽急陰嬌為病陽緩而陰急帶之為病赤白帶下臍痛而精失也敢問諸脈之相忌者何如也曰中風宜浮遲忌急實傷寒宜洪大忌沉細咳嗽宜浮儒忌沉伏腹脹宜浮大忌虛小下利宜微小忌浮洪狂疾宜實大忌沉細霍亂宜浮洪忌微遲消渴宜數大忌虛小水氣宜浮大忌沉細鼻衄宜沉細忌浮大心腹痛宜沉細忌浮大上氣浮腫宜浮滑忌微細頭痛宜浮滑忌短澀喘急宜浮滑忌澀唾血宜沉弱忌實大金瘡宜微細忌緊數中惡宜緊細忌浮大中毒宜數大忌微細吐血宜沉小忌實大腸澼宜沉遲忌數疾內傷宜弦緊忌小弱風痹宜虛濡忌緊急溫病發熱忌微小腹中有積忌虛弱病熱忌脈靜病泄忌脈大翻胃宜浮緩忌沉澀咳逆宜浮緩忌弦急諸氣宜浮緊忌虛弱痞滿宜滑脈忌澀脈婦人帶下宜遲滑忌虛浮也婦人妊娠宜洪大忌沉細也婦人已產宜小實忌虛浮也病若團目不欲見人者宜強急而長忌浮短而澀也病若開目而渴心下牢者宜緊實而數忌浮澀而微也身經答問十三長春子曰凡脈之見鬼祟者宜針也其穴可得知乎曰孫真人有歌訣也百邪顛狂所謂病針有十三穴須認凡針之體先鬼宮次針鬼信無不應一一從頭逐一求男從左起女從右一針人中鬼宮停左邊下針右出針第二手大指甲下商陽穴名鬼信刺三分深三針足大指甲下大敦穴名曰鬼壘人二分四針掌後太陵穴入寸五分為鬼心五針申脈名鬼路火針三下七鋥鋥第六卻尋大杼上入發一寸為鬼枕七刺耳垂下五分名曰鬼床針要溫八針承漿名鬼市從左出右君須記九針間使心包鬼市上十針上星名鬼堂十一陰下縫三壯女玉門頭為鬼藏十二曲池右肘外名鬼臣火針仍要七鋥鋥十三舌頭當舌中此穴之名是鬼封手足兩邊相對刺若逢孤穴只單通此是先師真口訣猖狂惡鬼走無蹤敢問古人針法之效可得聞乎曰徐文伯瀉孕於苑內範九思療咽於江夏高年抱疾未搓李氏刺巨闕而復甦太子暴疾為厥越人針維會而復醒肩井曲池甄權針臂痛而復射懸鐘環跳華陀刺躄足而立行秋大針腰俞而鬼免沉疴王纂針交俞而妖精立出取肝俞與命門使瞽士視秋毫之末刺少陽與交別俾聾夫聽夏蚋之聲長春子曰刺之法妙矣然有恐其痛者則嘗廢刺而不行不如灸之為便也敢問其要者為何如尊生子曰其繁者不可悉舉也吾取其救急者可乎大凡氣血久虛之人其卒然而中風也必口眼喎斜中腑則四肢不收中臟則九竅不利昏危不語雖有續命愈風之湯而求其速效或鮮矣故凡覺心中昏亂神思不定手足麻木此即中風之兆也不必問是風是氣有七穴可灸焉謂之鑿竅疏風可保無虞也穴列於後百會風池大椎肩井曲池足三里間使如口眼喎斜則灸聽會頰車百會地倉若喎左則灸右喎右則灸左以麥大之艾炷頻頻灸之口服即正而如手足不遂灸百會髮際肩髃曲池風市足三里絕骨患左則灸右患右則灸左如半身不遂灸肩髃曲池合谷列缺陽陵泉環跳足三里絕骨風市丘墟委中如癱瘓灸曲池陽谷合谷中渚三里陽輔崑崙如厲風乃受天地肅殺之氣酷烈暴悍而可畏則承漿為任脈之穴宜灸三次委中為膀胱脈之穴刺其腫處血出如墨其血色變紅方愈一云刺到二十餘日間日一刺之如中寒脈絕欲死則速灸氣海神閥丹田關元俱任脈也宜灸百壯陽氣自回如熱入血室刺期門如頭痛灸腕骨風池如腰痛灸腎俞崑崙命門凡犯寒心痛灸大溪然谷尺澤行間建里大都大白中脘神門陰都通谷如脅痛是木氣實有死血敗痰也灸丘墟刺中瀆如瘧疾灸大陵內關大椎第一節第三節小指尖男左女右如癥瘕灸氣海女人天樞二穴積聚灸胃脘如霍亂臍中納鹽灸之並灸氣海如翻胃灸乳根中脘下脘建里三里如瘰癧灸肩井曲池大迎肘骨尖如諸疝灸大敦三陰交小腹上橫紋斜尖如噎膈灸石關三里胃俞胃脘胃倉膈俞水分如夢遺灸中極曲骨膏盲腎俞心俞然谷身經答問十四長春子曰身之理既聞其詳矣敢問醫之道為何如尊生子曰醫乃仁術也亦行須真至之心而已世之齷齪欺人者不足效也昔者金穰縣王叟之善醫也病家召之則立至不輕以僮僕隨也夏日酷暑再三往視而不倦病可而不責報焉其治藥也泡洗曬晾非甚精審不敢以授人自壯至老而不變夫婦壽至期頤子四人孫二十餘人曾孫亦娶婦自叟至於曾孫凡三十六房此其可法者也昔者何澄之為醫也治同郡孫氏久病其妻俞氏引澄於密室曰良人久病典賣盡矣願以身附之澄正色曰何謂出此言以此相汗是使澄為小人且喪娘子之大節甚不可也勿憂當為調治一夕夢神引至一公署主者曰汝用藥有功不以艱危亂節奉上帝敕賜汝官錢五萬未幾東宮得疾詔訪澄一劑遂安賜錢如其數由此觀之天亦何負於醫乎彼世之搖虎撐而設法騙人者曾何足以掛齒哉
