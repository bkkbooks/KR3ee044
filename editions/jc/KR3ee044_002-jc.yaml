body:
  text: 身經通考卷二圖說圖說小敘孝經云天地之性人為貴孟子云守孰為大守身為大守身守之本也然不通貫乎天地之理烏知人之所以為貴且不曉然於一身之義亦烏知守之所以為本乎竊謂人之生也天地予之貌父母予之形形生神發而理在其中矣容固不異於父母理乃大同於天地語其原則一致而殊途究其委實百慮而同歸宇宙間觸處有畫前之易不越乎人之一心而統於身乎載之是故身得心而靈心得身而固古之聖賢莫不以修身為先務蓋以身也者內之可以致知誠意正心外之可以齊家治國平天下則身固萬事之樞機不可不究其詳者也然今之好學者博極群書而於一身之內或不知臟腑之所安懵然於周身經絡之名欲修而修何所據則亦為不善學者矣余因取身體經絡內外名目既於答問詳言之而復繪為圖考仍系之以說使覽者知一身之內有如是不同之經一經之內有如是不同之病一病之內有如是不同之藥庶幾有身者盡知所以為身必盡知所以為修而於守身之學不無小補云若夫修理道之身以為格致誠正工夫者則仍有程朱諸先生之書在余又何敢贅焉五臟六腑位次肺最居上為諸臟之華蓋六葉兩耳主藏魄心在肺下其體半垂如未開蓮花上有七孔三毛主藏神心下為膈膈下有胃主藏水穀胃左有肝左三葉右四葉主藏魂膽在肝之短葉間有精汁三合胃右有脾主藏意胃下為腹大腸當臍右回十六曲小腸左回疊積十六曲主傳溲便二腸之下為臍臍下為膀胱主藏溺背脊骨節第七之下有二腎左者為腎主藏志右為命門主藏精故曰臟者藏也腑者聚也今將圖說列於左五臟六腑所生病症並宜用藥性修養法肺臟圖說肺俞在背第三椎募在胸旁中府上連會厭俞者輸也經氣由此而輸彼也募者結也經氣聚於此也平脈浮賊脈洪其聲咳其臭腥其液涕其味辛其色白秋宜咽手宜雙擎肺虛鼻息利少氣實則喘喝仰息下晡慧日中甚夜半靜病先發於肺喘咳三日之肝脅病支滿一日之脾閉塞不通身痛體重五日之胃腹脹肺脈搏堅而長當病吐血濡而散當病漏汗肺脈沉而數浮而喘苦寒熱腹滿腸中熱小便赤肩背痛從腰以上汗出應用藥品氣實瀉之用澤瀉葶藶桑白皮地骨皮瀉子粳米石膏寒水石知母河子瀉火氣虛補之補母用甘草人參升麻黃耆山藥除濕用半夏白礬白茯大腸腑圖說大腸俞在脊十六椎旁募在臍旁天樞下連肛門屬金主變化為傳送之官腸中切痛而鳴冬感寒則泄當臍而痛與胃同候大腸有宿食寒慄發熱有時如瘧狀水氣客於大腸疾行則鳴如囊裹漿小腸移熱於大腸為虙瘕是動病齒痛䪼腫是主津液目黃口乾鼻鼽喉痹肩前臑痛大指次指痛不用氣盛則當脈所過者熱腫虛則寒慄大腸實腹滿善咳面赤身熱喉咽中如核狀大腸虛腸鳴虛渴唇口乾目急善驚泄白應用藥品清熱用秦艽槐角地黃黃芩溫里用乾薑附子肉蔻解肌用石膏白芷升麻葛根腸實瀉之熱用大黃芒硝桃花牽牛巴豆郁李仁石膏氣用枳殼木香陳皮檳榔腸虛補之用皂莢燥用桃仁麻仁杏仁地黃乳香松子當歸肉蓯蓉濕用白朮蒼心藏圖說心俞在脊第五椎旁募在腹上巨厥諸邪在於心者皆在心之包絡包絡者心之脈也故手少陰無俞焉平脈洪賊脈沉其聲噫其臭焦其液汗其味苦其色赤夏宜呵腦後高叉手心氣虛則悲不已實則笑不休心病日中慧夜半甚平旦靜病先發於心者心痛一日之肺喘咳三日之肝脅痛支滿五日之脾閉塞不通身痛體重心脈搏堅而長當病舌卷不能言其耍而散當病消渴自己心脈沉之小而堅浮之不喘若心不聚氣而痛食不下喜嚥唾時手足熱煩滿時忘不樂喜太息得之憂思喘而堅有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之心脈急名心疝少腹當有形心中風者發熱不能起心中飢而欲食食則嘔心中寒者其人病心如啖蒜狀劇者心痛徹背背痛徹心如盅注其脈浮者自吐乃愈愁憂思慮則傷心心傷則苦驚喜忘善怒心傷者其人勞倦即頭面赤而下重自發煩熱當臍挑手其脈弦心脹者煩心短氣臥不安心水者其人體重少氣不得臥煩躁其陰大腫腎乘心必癃真心痛手足青至節旦發夕死夕發旦死心腹痛懊憹發作腫聚往來上下行痛有休作心腹中熱苦渴涎出者是蛔咬也以手聚而堅持之勿令得移以大針刺之久持之蟲不動乃出針腸中有蟲咬皆不可取以小針心之積名曰伏梁起於臍上上至心大如臂久不愈病煩心心痛以秋庚辛日得之心病者胸內痛脅支滿痛膺背肩胛痛兩臂內痛虛則胸腹大脅下腰背相引而痛諸邪在於心者皆在心之包絡久視傷血勞傷心也損其心者調其榮衛心熱病額先赤心熱病先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗心瘧者令人煩心甚欲得清水反寒多不甚熱肝移寒於心狂膈中肝移熱於心則死心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹心咳不已小腸受之其狀咳而失氣心風之狀多汗惡風焦絕善怒嚇赤色病甚則不可言快心痹者脈不通上氣而喘嗌乾善噫假令得心脈其外症面赤口乾喜笑其內症臍上有動氣按之牢苦痛其病煩心心痛掌中熱而啘有是者心也無是者非也心實大便不利四肢重身熱腹滿胃脹心虛病苦悸恐不樂心腹痛難以言心如寒狀恍惚手心熱肘臂攣急腋腫心中大動應用藥品火實瀉之瀉子用黃連大黃氣用甘草人參赤茯苓木通黃柏血用丹參牡丹生地黃玄參鎮驚用小腸腑圖說小腸主泌別水穀為受盛之官化物出焉食下則腸實而胃虛又云小腸為赤腸小腸病少腹痛腰脊控睪而痛時窘復耳前熱若寒甚獨肩上熱及手小指次指之間熱小腸有寒其人下重便膿血有熱必痔小腸有宿食常暮發熱明日復止小腸脹者少腹䐜脹引腹而痛小腸虛病若顱際偏頭痛耳頰痛實苦身熱汗出而煩心中滿身重口中生瘡膀胱移熱於小腸鬲腸不便上為口糜是動病則嗌痛頜腫不可回顧肩似拔臑似折是主液耳聾目黃應用藥品實熱瀉之氣用木通豬苓滑石瞿麥澤瀉燈草血用地黃蒲黃赤茯苓梔子牡丹皮虛寒補之氣用白朮楝實茴香砂仁神麯扁豆血用桂心延胡索降火用黃柏黃芩黃連連翹梔子解肌用藳本羌活防風蔓荊脾臟圖說脾為三陰之首心肺之下腎肝之上脾掩太倉脂膜相連附著於脊之第十一椎脾胃大小腸三焦膀胱者倉廩之本營之居也募在腹旁章門脾之大絡名曰大包其系自膈下正中微著左脅於胃之上與胃包絡相附其胃之包在脾之上與胃相併結絡周迴漫脂遍布上下有二系上者貫膈入肺中與肺系相併而在肺系之後其上即咽門也嚥下胃脘胃脘下即胃上口賁門是也其門處膈模相貼之間亦漫脂相包若胃中腐熟水穀則自幽門而傳入小腸故曰太倉之下口為幽門平脈緩賊脈弦其聲吞噦又歌云其臭香其液涎其味甘其色黃四季宜呼須撮口脾氣虛則四肢不用五臟不安實則腹脹涇溲不利病在脾日映慧平旦甚日中持下晡靜病先發於脾身痛體重一日之胃而腹脹二日之腎少腹腰脊痛脛酸三日之膀胱背膂筋痛小便閉脾脈搏堅而長其色黃當病少氣其耍而散色不澤者當病足骭腫若水狀脈大而虛有積氣在腹中名曰厥疝女子同法得之疾使四肢汗出當風脈浮則胃氣微澀即脾氣衰呼吸不得寒在於膈而反下之寒積不消胃微脾傷穀氣不行食已自噫寒在胸膈上虛下實穀氣不通為秘塞之病能食而腹不滿此為胃氣有餘腹滿而不能食心下如飢此為胃氣不行心氣虛也脾中風者發熱形如醉人腹中煩重皮肉瞤瞤而短氣凡有所擊僕若醉飽入房汗出當風則傷脾病人鼻下平者胃病也微赤者發癰微黑者有熱青者有寒白者不泊臍反出者此為脾先絕脾脹者善噦四肢急體重不能衣脾水者其人腹大四肢苦重津液不生但若少氣小便難脈浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約小便利而反不渴凡人病脈已解而反暮微煩者人見病者差安而強與谷脾胃尚弱不能消穀故令微煩損谷則愈脾之積名曰痞氣在胃管覆大如盤久久不愈病四肢不收黃癉飲食不為肌膚以冬壬癸日得之脾病色黃飲食不消腹苦脹滿體重節痛大便不利其脈微緩而長此為可治是動則病舌本強食則嘔胃管痛腹脹善噫得後與氣則快然如衰寒瘧溏瘕泄水閉黃疸好臥不能食肉唇青強立股膝內痛厥足大指不用厥氣上逆則霍亂實則腹中切痛虛則鼓脹脾實足寒脛熱脹滿煩擾不得臥虛則泄注腸鳴嘔吐心煩不眠久坐傷肉勞於脾也飲食勞倦則傷脾損其脾者調其飲食適其寒溫假令得脾脈其外症面黃善噫其內症當臍有動氣按之牢若痛其病腹脹滿體重食不化節痛嗜臥四肢不收有是者脾也無是者非也脾熱病鼻先赤先頭重頰痛煩心欲嘔身熱熱爭則腰痛不可俯仰兩頜痛甲乙甚戊己大汗腎移熱於脾傳為虛腸澼死不可治脾咳之狀右胠下痛引肩背甚則不可以動動則咳劇脾氣熱則胃干而渴肌肉不仁發為肉痿足不收善瘛腳下痛精氣並於脾則畏口唇者肌肉之本也肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死脾病色黃體青失溲直視唇反爪青吐逆危應用藥品土實瀉之瀉子用訶子防風桑白皮葶藶吐用豆豉梔子蘿蔔子常山瓜蒂鬱金韭汁藜蘆赤小豆苦參鹽湯苦茶下用大黃芒硝青礞石大戟甘遂續隨子芫花土虛補之補母用桂心茯苓氣用人參黃耆升麻葛根甘草陳皮藿香葳蕤砂仁木香扁豆血用白朮蒼朮白芍膠飴大棗乾薑木瓜烏梅蜜除濕用蒼白朮半夏陳皮吳茱萸南星草豆蔻白芥子木通赤茯苓豬苓藿香葛根蒼朮麻黃獨活胃腑圖說胃俞在十二椎旁募在太倉百病先觀胃氣何如主容受為水穀之海胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也腹脹胃管當心而痛上支兩脅膈咽不通飲食不下取三里胃脈搏堅而長其色赤當病折髀其耍而散者當病食癉髀痛胃中有癖食冷物者痛不能食食熱即能食胃脹者腹滿胃管痛鼻聞焦臭妨於食大便難病先發於胃脹滿五日之腎少腹腰脊痛脛疫三日之膀胱背膂筋痛小便閉五日上之心閉塞不通身痛體重脈數者胃熱消穀脈澀者胃寒水穀不化虛則遺尿實則失氣動作頭痛重熱氣朝者屬胃胃瘧令人疸病善飢不能食食而支滿腹大胃風之狀頸多汗惡風食飲不下鬲塞不通腹滿失衣則䐜脹食寒則泄新食竟取風為胃風大腸移熱於胃善食而瘦又謂之食㑊飲食自倍腸胃乃傷人迎者胃脈也逆則盛而熱聚於胃口而不行故胃脘為癰也胃脈急甚為瘛瘲微急為膈滿不食緩甚為痿厥微緩為風痿四支不用大甚為擊僕微大為痞氣裹大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為頹癃微滑為蟲毒腸鳴熱澀甚為腸潰微澀為內潰多下膿血胃實腹中堅痛而熱汗不出如溫瘧唇口乾善噦乳癰缺盆腋下腫痛胃虛脛寒不得臥目急腹痛虛鳴時寒時熱唇口乾面目浮腫是動病則灑然振寒善伸數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶牖而處甚則欲上高而歌棄衣而走賁響腹脹所生病者狂瘧濕淫汗出鼻衄口喎唇疹頸腫喉痹大腹水腫膝髕腫痛循膺乳氣衝股伏兔䯒外廉足跗上皆腫痛中指不用氣盛則身以前皆熱消穀善飢溺色黃氣不足則身以前皆寒慄寒則脹滿應用藥品胃實瀉之用大黃芒硝飲食傷用巴豆神麯山楂阿魏硇砂三稜輕粉鬱金胃虛補之濕熱用蒼白朮半夏陳皮茯苓寒濕用乾薑附子草果官桂丁香肉蔻人參黃耆降火用石膏地黃犀角黃連解肌用升麻葛根豆豉犀角能解飲食之毒以升麻佐之肝臟圖說肝俞在脊九椎旁募在乳下期門其位居右腸之前其治在左平脈弦賊脈浮其聲語又云呼其臭臊其液泣其味酸其色青春宜噓目宜睜睛四季亦宜噓以瀉相火以膽火寄中也肝氣虛則恐實則怒病在肝平旦慧下晡甚夜半靜病先發於肝頭目眩胸脅支滿一日之脾閉塞不通身痛體重二日之胃而腹脹三日之腎少腹腰脊痛脛痠肝脈搏堅而長色不青當病墜墮若搏因血在脅下令人喘逆若軟而散其色澤者當病溢飲溢飲者渴暴多飲而溢入肌皮腸胃之外也肝脈沉之而急浮之亦然若脅下痛有氣支滿引少腹而痛時小便難苦腰背痛足為逆寒善暴僵仆時癃女人月信不來時亡時有得之少時有所墜墮肝脈長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛肝中風者頭目瞤兩脅痛行常傴令人嗜甘如阻婦狀肝中寒者其人惡寒發熱面赤有汗胸中煩熱兩臂不舉舌本燥善太息胸中痛不得轉側時盜汗咳食已吐其汁有熱鼻窒凡有墜墮惡血留內若有所大怒氣上而不能下積於左脅下則傷肝為嘔血脫肉又臥口欲得張時時手足青目瞑瞳人痛此為肝臟傷所致也肝脹者脅下滿而痛引少腹肝水者其人腹大不能自轉側兩脅下腹中痛時時津液微生小便續通肺乘肝即為癰腫心乘肝必吐利肝著者其病人常欲蹈其胸上先未苦時但欲飲熱肝之積名曰肥氣在左脅下如覆杯有頭足龜鱉狀久久不愈發咳逆痎瘧連歲月不已以季夏戊巳日得之肝病者必兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之氣逆則頭目痛耳聾頰腫肝位居右其治在左木位東方故也久行傷筋勞傷肝也恚怒氣逆則傷肝損其肝者緩其中假令得肝脈其外症善潔面青善怒其內症臍左有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也無是者非也肝熱病左頰先赤小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗肝瘧者令人色蒼蒼然太息脾移寒於肝癰腫筋攣脾移熱於肝則為驚衄肝咳之狀兩脅下痛不可以轉轉則兩胠下滿肝風之狀多汗惡風善悲色蒼嗌乾肝痹者夜臥則驚多飲數小便上引小腹如懷妊狀肝虛病苦脅下堅寒熱腹滿不欲飲食腹脹悒悒不樂婦人月經不利腰腹痛苦心下堅滿常兩脅痛目忿忿如怒狀是動病則腰痛不可以俯仰丈夫㿗疝婦人小腹腫甚則嗌乾面塵脫色所生病者胸滿嘔逆洞泄狐疝遺溺癃閉應用藥品肝實瀉之瀉子用甘草行氣用香附川芎瞿麥牽牛青皮行血用紅花鱉甲桃仁莪朮三稜穿山甲大黃水蛭虻蟲蘇木牡丹皮鎮驚用雄黃金箔鐵洛珍珠代赫石夜明砂胡粉銀箔鉛丹龍骨石決明搜風用羌活荊芥薄荷蔓荊子白花蛇槐子獨活防風皂莢烏頭白附子肝虛補之用枸杞杜仲狗脊熟地苦參萆薢阿膠兔絲子補血用當歸牛膝續斷白芍血竭沒藥川芎補氣用天麻柏仁白朮菊花細辛蜜蒙花決明穀精草生薑瀉水芍藥烏梅澤瀉瀉火用黃連龍膽草黃芩苦茶豬膽攻裡大黃和解柴胡半夏解肌桂枝麻黃膽腑圖說膽俞在十椎旁募在乳下傍日月在肝之短葉間主榮百脈流氣三部為十一臟之主膽病善太息口苦嘔宿汁心恐如人將捕之嗌中介介然數唾是動則病口苦善太息心脅痛不能轉側甚則面微塵體無膏澤足外反熱是為陽厥所生病者頭痛角頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸中脅肋髀膝外至䯒絕骨外踝前及諸節皆痛小指次指不用耳痛鳴聾目昏不眠寒熱往來應用藥品瀉用龍膽牛膽豬膽生蕤仁生棗仁黃連苦參溫用人參細辛半夏炒蕤仁棗仁當歸地黃降火黃芩黃連甘草芍藥連翹鎮驚用黑鉛水銀和解用柴胡芍藥黃芩半夏甘草腎臟圖說腎俞在十四椎旁募在京門腰間季脅主聽主骨主二陰平脈沉賊脈緩其聲吹嚏呻吟其臭腐其液唾其味鹹其色黑腎冬吹抱膝平腎氣虛則厥逆實則脹滿四支正黑腎病夜半慧日乘四季下晡靜病先發於腎少腹腰脊痛脛酸三日之膀胱腎脈搏堅而長其色黃而赤當病折腰其軟而散者當病少血腎脈沉之大而堅浮之大而緊苦於足骨腫厥而陰不興腰脊痛少腹腫心下有水氣時脹閉時泄得之浴水中身未乾而合房內及勞倦發之脈堅而大有積氣在少腹與陰名曰腎痹得之沐浴清水而臥凡有所用力舉重若入房過度汗出如浴水則傷腎腎脹者腹滿引背腰髀痛腎水者其人腹大臍腫腰痛不得溺陰下濕如牛鼻頭汗其足逆寒大便反堅腎著之病從腰以下冷如冰腫重如帶五千錢反不渴小便自利食飲如故病屬下焦從身勞汗出衣里冷濕久久得之腎之積名曰奔豚發於少腹上至心下如豚奔走之狀上下無時久久不愈病喘逆骨痿少氣以夏丙丁日得之水流夜疾何也土休故流疾而有聲人亦應之入夜臥則脾不動搖脈為之數疾也腎病其色黑其氣虛弱兩耳苦聾腰痛時時失精飲食減少膝以下清其脈沉滑而遲腎病者必腹大脛腫痛喘咳身重寢汗出憎風虛即胸中痛大腹小腹痛清厥意不樂邪在腎則骨痛陰痹按之不得脹痛大便難肩背項頸強痛時眩取之湧泉崑崙視有血者盡取之腎實舌燥咽腫心煩嗌乾胸脅痛骨熱小便赤黃好怒好忘足下熱疼腎虛病苦心中悶下重足腫不可按地少腹脹滿上搶胸脅痛引肋下久立傷骨勞於腎也久坐濕應用藥品水強瀉之用大戟牽牛澤瀉豬苓車前子防己茯苓水弱補之補母人參山藥氣用知母玄參補骨脂砂仁苦參血用黃柏枸杞熟地鎖陽肉從蓉山茱萸阿膠五味子本熱攻之傷寒少陰症口燥咽乾用大承氣湯下之溫里用附子乾薑官桂蜀椒白朮解表用麻黃細辛獨活桂枝清熱用玄參連翹甘草豬膚膀胱腑圖說居腎下之前大腸之側當臍上一寸水分穴之處小腸之下乃膀胱際也水液由此滲人焉主津液為胞之膀胱病少腹偏腫痛以手按之欲小便而不得肩上熱足小指外側及脛踝後皆熱脹則少腹滿而氣癃病先發於膀胱者背膂筋痛小便閉五日之腎少腹腰脊痛脛酸一日之小腸脹一日之脾閉塞不通身痛體重膀胱者州都之官氣化則能出有熱則淋閉不約為遺溺實苦轉胞不得小便頭眩痛煩瀉脊強虛苦肌肉振動腳中筋急耳聾惡風颼颼作聲是動則病沖頭痛目似脫頸似拔腰似折髀不可曲膕如結腨如裂所生病者痔瘧狂癲疾頂痛目黃淚出鼻衄小指不用應用藥品泄火滑石豬苓澤瀉茯苓下虛熱用黃柏知母補之寒用桔梗升麻益智烏藥山茱萸降火用地黃梔子茵陳黃柏牡丹皮地骨皮發表用麻黃桂枝羌活蒼朮防己黃耆木賊三焦圖說相火之用分布命門元氣主升降出入總領五臟六腑營衛經絡上主納中主化下主出三焦病腹脹氣滿小腹尤堅不得小便溢則為水留則為脹熱在上焦因咳為肺痿中焦因堅下焦因尿血嗌腫喉痹汗出目銳眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用凡吐衄便尿諸血皆三焦所生應用藥品實火瀉之麻黃柴胡葛根荊芥升麻薄荷羌活石膏以汗之瓜蒂滄鹽齏汁白礬皂莢梔子以吐之大黃芒硝元明粉以下之虛火補之上用人參天雄桂心中用人參黃耆丁香木香草果下用附子桂心硫黃人參沉香烏藥補骨脂本熱寒之用涼藥標熱散之用解表藥心包絡經說手厥陰心包絡之脈起於胸中出屬心包下鬲歷絡三焦經云膻中者臣使之官喜樂出焉謂心包也其經在心下橫膜之上豎膜之下與橫膜相黏而黃脂裹者心也其脂膜之外有細筋如絲與心肺相連者即包絡也心包絡病笑不休手心熱心中大熱面黃目赤心中動其餘見症與心臟同應用藥品補用地黃濕用桂瀉用枳殼烏藥涼用梔子引經用柴胡川芎以行上青皮以行下以上十二經陰穴共一百八十陽穴共四百三十四穴陰穴少陽穴多乃知陽易熾陰易虧人可不惜其陰乎奇經八脈圖說督脈起於下極之俞並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海其見症脊強而腰厥任脈起於中極之下以上毛際循腹裡上關元至喉嚨屬陰脈之海其見症男子為七疝女子為瘕聚衝脈起於氣衝難經云並陽明之經挾臍上行至胸中而散醫統辯井足少陰之經至針經所載衝任與督脈同起於會陰在兩陰間又云浮於外者循腹上行會於咽喉別而絡唇口帶脈起於季脅回身一周其見症也苦腹滿腰溶溶如坐水中陽維起於諸陽之會維者維持之義也為諸脈之綱維陰維起於諸陰之交二經之見症也悵然失志容容不能自持驚即失志喜忘恍惚陽蹻脈者起於跟中循外踝上行入風池其見症陰蹻脈者起於跟中循內踝上行至咽喉交貫衝脈其見症也陽緩而陰急督任二脈導引說夫人身之有督任猶天地之有子午也人身之任督以腹背言天地之子午以南北言可以分可以合分之以見陰陽不離合之以見渾淪無間此修真者之周行也惜夫舉世昏昏盡趨岐徑或默朝上帝或內視腑臟或存神閉息或服氣吞霞或運氣機行火候或煉日月採精華或日運臍輪夜運泥丸或朝乎三魂暮攝七魄或按周大而行搬運或指斗柄而轉化機或守中黃絳宮而待神凝氣聚或運三華五氣而用洗骨伐毛種種玄言豈離督任獨惜其舍正路而不由耳知之者四門外閉兩目內觀心如止水身似空壺締觀黍米之珠權作黃庭之主不施搬運自妙轉旋含光嘿嘿調息綿綿握固內守注意玄關頃刻而真元內還未幾而一陽來復兩腎如湯煎膀胱似火熱任督猶車輪四肢若山石鼓巽運坤天機自動微以意定則水火自然升降如桔槔之呼水稻花之凝露謂之乾坤交媾罷一點落黃庭到此地位意不可散散則不成丹矣故紫陽翁曰真汞生於離其用卻在坎奼女過南園手持玉橄欖身心渾飩與虛空等不知身之為我我之為身神之為氣氣之為神不規中而自規中不胎息而自胎息虛室生白黑地引針亦不知任之為督督之為任也此是最上一乘慎勿身中摸索真志修者其知所務哉又十二經每經各得五穴以應五行所出為井所流為榮所注為俞所行為經所入為合肝邪治並心邪治榮脾邪治俞肺邪治經腎邪治合惟督任則總而貫之經脈圖說附經絡配四時格人身合乾坤二卦乾為天自乾而變者三十二卦由上而下也坤為地自坤而變者三十二卦由下而上也以內經考之手之三陽從手走頭足之三陽從頭走足是高能接下也足之三陰從足走腹手之三陰從腹走手是下能趨上也故上下升降為和天上地下謂之否地上天下謂之泰故曰天地交而萬物生夫婦和而家道成易曰天道下濟而光明地道卑而上行又曰天依形地附氣皆交和之說也人之一身心生血血欲下降而交乎腎腎生氣氣欲上升而交乎心心腎既交水火既濟矣病安從生活法機要云凡虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛故損則自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰陰虛則陽盛故損則自下而上治之宜以苦酸鹹過於脾則不可治也自上損者一損損於肺故皮聚而毛落二損損於心一脈輒變為二病邪在氣為是動邪在血則為所生病氣主煦之血主濡之氣留而不行氣先病也血滯而不濡血後病也浮者氣病沉澀者血病氣留則寒血滯則熱此又經脈之大概也經絡配四時格天非純陽亦有三陰天以陽生陰長而為春夏地非純陰亦有三陽地以陽殺陰藏而為秋冬天時十二月人身十二經地支十二位圖說二十二經有水火分治之法紺珠經曰肝膽由來從火治三焦包絡都無異脾胃常將濕處求肺與大腸同濕類腎與膀胱心小腸寒熱臨時旋商議惡寒表熱小膀溫惡熱表寒心腎熾十二經最端的四經屬火四經濕四經有熱有寒時攻裡解表細消息裡熱裡寒宜越竭表熱表寒宜汗釋濕同寒火同熱寒熱到頭無兩說六分熱來一分寒寒熱中停真浪舌熱寒格拒病機深亢則害承乃制別緊寒數熱脈正邪標本求之真妙訣休治風休治燥治得火時風燥了當解表時莫攻裡當攻裡時莫解表表裡如或兩可攻後先內外分多少治濕無過似決用此個筌蹄最分曉感謝軒岐萬世恩爭奈醯雞笑天小一分寒宜作半分寒又標本歌曰少陽從本為相火太陰從中濕土坐厥陰從中火是家陽明從中濕是我太陽少陰標本從陰陽二氣相包裹風從火斷汗之宜燥與濕兼下之可萬病能將火濕分掣開軒岐無縫鎖太陰從中之宜作本細味二章則十二經之大略從可睹矣內形圖說附五臟配五行人之生身不易一月之孕有白露之稱二月之胚有桃花之譬及其三月先生右腎則為男陰包陽也先生左腎則為女陽包陰也其次腎生脾脾生肝肝生肺肺生心以生其勝己者腎屬水故五臟由是為陰其次心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀膀生三焦以生其己勝者小腸屬火六腑由是為陽其次三焦生八脈八脈生十二經十二經生十二絡十二絡生一百八十系絡系絡生一百八十纏絡纏絡生三萬四千孫絡孫絡生三百六十五骨節骨節生三百六十五大穴大穴生八萬四千毛竅則耳目口鼻四肢百骸之身皆備矣所謂四月形象其五月筋骨成六月發生正謂此也至七月則遊其魂而能動左手八月遊其魄而能動右手九月三轉身十月滿足母子分解其中有延月生者必主貴子不足日月生者必主貨薄之人誕生之後有變蒸之熱長其精神壯其骨髓生其意智三十二日一變蒸生腎氣焉六十四日二變蒸生膀胱之氣焉腎與膀胱屬水其數一也九十六日三變蒸生心氣焉一百二十八日四變蒸生小腸之氣焉心與小腸屬火其數二也一百六十五日五變蒸生肝氣焉一百九十二日六變蒸生膽氣焉肝與膽屬木其數三也二百四十四日七變蒸生肺氣焉二百五十六日八變蒸生大腸之氣焉肺與大腸屬金其數四也二百八十八日九變蒸生脾氣焉三百二十日十變蒸生胃氣焉脾與胃屬土其數五也變蒸已畢一期歲焉齒生髮長神智有異於前也故曰齒者骨之餘也發者血之餘也爪者筋之餘也神者氣之餘也籲人身之難得也如此哉按聖濟經云元氣孕育皆始於子自子推之男左旋自子位起積三十而至巳女右旋自子位起積二十而至巳巳為正陽陰實從之自巳懷妊男左旋十月而生於寅女右旋十月而生於申故男麗乎寅陽生於子至寅為三陽女麗乎申陰生於午至申為三陰難經云男子生於寅寅為木陽也女子生於申申為金陰也夫木者陰中之陽男得乎卦其數八故男子八歲髮長齒更八八則卦氣足金者陽中之陰女得乎卦其數七故女子七歲齒更髮長七七則天癸竭七少陽也八少陰也相感而流通陰陽之始而定男女之數孫真人千金云妊娠一月名始胚是月足厥陰脈養二月名始膏足少陽脈養三月名始胎手心主脈養四月始受水精以成血脈手少陽脈養五月始受火精以成氣足太陰脈養六月始受金精以成筋足陽明脈養七月始受水精以成骨手太陰脈養八月始受土精以成膚革手陽明脈養九月始受石精以成皮毛足少陰脈養十月五臟俱備六腑齊通納天地氣于丹田故使關節人神皆備但侯時而生籲人身之難得也如此哉彼戕賊身心者負天地父母之生成矣臟腑配五行格五臟屬陰陽干為兄甲一膽一乙一肝一東方木丙一小腸一丁一心一南方火戊一胃一己一脾一中央上相合而為表裡庚一大腸一辛一肺一西方金壬膀胱癸腎北方水六腑屬陽陰乾為弟四海腦為髓海頭熱如火足寒如水可灸此穴衝脈為諸經之血海肝亦為血海膻中為宗氣之海胃為水穀之海八會府會太倉即中脘穴在臍上四寸藏會季脅即章門穴在臍上二寸兩旁各開九寸筋會陽陵泉在膝下外廉髓會枕骨血會膈俞在七椎旁各一寸半上則心俞下則肝俞故為血會骨會大抒骨者髓所養自腦下注大抒滲入髓心下貫尾骶諸骨脈會大淵在右寸口扁鵲指為藏府氣血始終之處氣會三焦即膻中穴在玉堂下一寸六分兩乳間是八溪肉之小會曰溪謂二肘二膝四腕一谷肉之大會曰谷臀是也十二原陰中之少陰肺也其原出於太淵太淵二陰中之太陽心也其原出於大陵大陵二陰中之少陽肝也其原出於太衝太衝二陰中之至陰脾也其原出於太白太白二陰中之太陰腎也其原出於太谿太谿二膏之原出於鳩尾鳩尾一盲之原出於脖胦脖胦一凡此十二原者主治五臟六腑之有疾者也今夫五臟之有疾也譬猶刺也猶汙也猶結也猶閉也刺雖久猶可拔也汙雖久猶可雪也結雖久猶可解也閉雖久猶可決也夫善治者取其疾也猶拔刺也猶雪汙也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也臟腑本輸肺出於少商少商者手大指端內側也為井木溜於魚際魚際者手魚也為榮注於太淵太淵魚後一寸陷者中也為腧行於經渠經渠寸口中也動而不居為經入於尺澤尺澤肘中之動脈也為合手太陰經也心出於中衝中衝手中指之端也為井木溜於勞水勞宮掌中指本節之內間也為榮注於大陵大陵掌後兩骨之間方下者也為腧行於間使間使之道兩筋之間三寸之中也有過則至無過則止為經入於曲澤曲澤肘內廉下陷者之中也屈而得之為合手少陰也肝出於大敦大敦足大指之端及三毛之中也為井水溜於行間行間足大指間也為榮注於太衝太衝行間上二寸陷者之中也為腧行於中封中封內踝之前一寸半陷者之中使逆則宛使和則通搖足而得之為經入於曲泉曲泉輔骨之下大筋之上也屈膝而得之為合足厥陰也脾出於隱白隱白者足大指之端內側也為井木溜於大都大都本節之後下陷者之中也為榮注於太白太白腕骨之下也為腧行於商丘商丘內踝之下陷者之中也為經入於陰之陵泉陰之陵泉輔骨之下陷者之中也伸而得之為合足太陰也腎出於湧泉湧泉者足心也為井木溜於然谷然谷然骨之下者也為榮注於太谿太谿內踝之後跟骨之上陷中者也為腧行於復留復留上內踝二寸動而不休為經入於陰谷陰谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少陰經也膀胱出於至陰至陰者足小指之端也為井金溜於通谷通谷本節之前外側也為榮注於束骨束骨本節之後陷者中也為腧過於京骨京骨足外側大骨之下為原行於崑崙崑崙在外踝之後跟骨之上為經入於委中委中膕中央為合委而取之足太陽也膽出於竅陰竅陰者足小指次指之端也為井金溜於俠谿俠谿足小指次指之間也為榮注於臨泣臨泣上行一寸半陷者中也為腧過於丘墟丘墟外踝之前下陷者中也為原行於陽輔陽輔外踝之上輔骨之前及絕骨之端也為經入於陽之陵泉陽之陵泉在膝外陷者中也為合伸而得之足少陽也胃出於厲兌厲兌者足大指內次指之端也為井金溜於內庭內庭次指外間也為榮注於陷谷陷谷者上中指內間上行二寸陷者中也為腧過於衝陽衝陽足跗上五寸陷者中也為原搖足而得之行於解谿解谿上衝陽一寸半陷者中也為經入干下陵下陵膝下三寸䯒骨外三里也為合復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也三焦者上合手少陽出於關衝關衝者手小指次指之端也為井金溜於液門液門者小指次指之間也為榮注於中渚中渚者本節之後陷中者也為腧過於陽池陽池在腕上陷者之中也為原行於支溝支溝上腕三寸兩骨之間陷者中也為經入於天井天井在肘外大骨之上陷者中也為合曲肘乃得之三焦下腧在於足大指之前少陽之後出於膕中外廉名曰委陽是太陽絡也手少陽經也三焦者足少陽太陰一本作陽之所將太陽之別也上踝五寸別入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之手太陽小腸者上合於太陽出於少澤少澤小指之端也為井金溜於前谷前谷在手外廉本節前陷者中也為滎注於後溪後谿者在手外側本節之後也為腧過於腕谷腕谷在手外側腕骨之前為原行於陽谷陽谷在銳骨之下陷者中也為經入於小海小海在肘內大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也大腸上合手陽明出於商陽商陽大指次指之端也為井金溜於本節之前二間為滎注於本節之後三間為腧過於合谷合谷在大指歧骨之間為原行於陽谿陽谿在兩筋間陷者中也為經入於曲池曲池在肘外輔骨陷者中屈臂而得之為合手陽明也是為五臟六腑之腧望色附經曰望而知之謂之神故望色者治人第一義也靈樞經曰以五色命臟青為肝赤為心白為肺黃為脾黑為腎內經云五臟之氣色見青如草茲者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生自如豕膏者生黑如鳥羽者生此五色之見生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也內經以一色之中而分平病死三等至靈樞又分明臟腑部分及浮沉淺深夭澤散搏等法蓋以其道之不容忽也予略陳其要夫五色有光明亮是也五色有體潤澤是也光者無形為陽陽主氣體者有象為陰陰主血氣血俱亡其色沉晦枯槁經所謂草茲枳實炲衄血枯骨五者是也氣血尚有其色光明潤澤經所謂翠羽雞冠蟹腹豕膏鳥羽五者是也此五色雖為可生終為一臟之色獨亢亢則害病也非平也蓋平人五臟既和其一臟之色必待其旺而始榮於外其榮於外也稟胃氣而出於皮毛之間胃氣色黃皮毛色白故云如縞裹如縞裹者朦朧光澤雖有形影猶未燦然內因氣血無乖陰陽不爭五臟無偏勝故也苟或不然五臟衰敗其見色也昔之朦朧者一變而為獨亢昔之光明者一變而為沉濁昔之潤澤者一變而為枯槁甚至沉濁枯稿合而為夭是光體俱無陰陽氣血俱絕不死又何待哉聞聲附經云聞而知之謂之聖如辨音者聽其聲即可以知其物雖非玄遠誠非淺易予姑以經書中要者言之經曰肝在音為角在聲為呼心在音為徵在聲為笑脾在音為宮在聲為歌肺在音為商在聲為哭腎在音為羽在聲為呻口出無倫譫語也有虛有實無稽怒叫狂言也實症出言壯厲先輕後重者外感也語言懶怯先重後輕者內傷也語不接續鄭聲也無病始言獨語也三症屬虛鼻塞聲重傷風也聲啞唇瘡狐惑也卒口噤背反張痓症也鼻鼾語塞風溫也錯語呢喃出言不正熱症也下淚淚有聲先渴後嘔停水也喉中漉漉有聲痰也腸若雷鳴氣不和濕也小兒驚風口不能言心熱也無還聲為鴉聲死症也雜病發喘癆瘵聲啞危病也以上種種若能細察實能活人至於聞其五音以知其所苦是神聖之道存乎司命者之方寸耳問症附示吉曰望聞問切察病之四法也望色聞聲切脈古人反復言之至於問而知之之謂工先哲尚未發明不無有疑焉何以故如至病家問其瀉痢以知其瀉痢問其寒熱以知其寒熱則淺矣必非古人之意也即至人家問其病起於何日日少為新病實症居多日多為久病虛症居多曾食何物食冰而病藥用冰煎如傷肉食用草果山楂之類曾有怒勞房欲等事怒則傷肝勞則內傷元氣房勞則傷腎及問初起何症如初起頭疼發熱惡寒屬外感如初起心腹疼痛及瀉痢等症俱屬內傷後變何病如痢變瀉變瘧為輕瘧瀉變痢為重先喘後脹病在肺先脹後喘病在脾先渴後嘔為停水類今口渴思飲否口不渴內無熱也口渴欲飲為熱老人口渴不思飲主津液少若嗽水不欲咽主蓄血主陰極發燥喜熱喜冷否喜熱內寒喜冷內熱口中淡苦否苦熱鹹寒虛淡甘脾熱成疳傷食口酸思食否傷食不思食雜症思食為有胃氣則生否則無胃氣則死胸中寬否不寬傷食痰積氣滯之症腹中有無痛處否無痛病不在內主虛有痛處主食積痰血之類有痛處手按則減者為虛大小便如常否小便秘結黃赤為熱清白為寒濁如米泔為濕熱下陷大便秘為實為熱自利為虛暴瀉暴痢為實久瀉久痢為虛下黃赤為熱下清白為寒足冷暖否足暖陽症足冷陰症乍冷乍溫便結屬陽大便如常屬虛及平日勞逸喜怒憂思並喜食何物勞則氣散逸則氣滯喜傷心怒傷肝憂傷肺思傷脾恐傷腎喜食厚味則生痰醇酒則發熱種種問法實為活人之捷徑然以此而盡古人問而知之之義尤未也予於靜定之中若有所悟蓋令人之病如咳嗽發熱瀉痢諸痛俱病之總名也一症之中各有火有寒有痰有氣有虛有實致症之原不同如治咳嗽問得有火症即作火治有痰有氣症即作痰氣治因此一問舍病名而治病原庶合古人之心也昔丹溪翁名擅千古亦不過每症分出寒熱虛實痰火血氣等件隨症調治此豈有異人之目洞見臟腑者乎亦惟問其症以知之耳汗吐下三法附人身不過表裡氣血不過虛實良工先治其實後治其虛粗工或治實或治虛謬工實實虛虛惟庸工能補其虛不敢治其實舉世不省其誤此余所以著三法也夫病非人身素有之物或自外入或自內生皆邪氣也邪氣中人去之可也攬而留之可乎留之輕則久而自盡甚則久而不已更甚則暴死矣若不去邪而先以補劑是盜未出門而先修室字真氣未勝而邪已橫驚矣惟脈脫下虛無邪無積之人始可議補爾他病惟先用三法攻去邪氣而元氣自復也素問一書言辛甘發散淡滲泄為陽酸苦鹹湧泄為陰發散歸於汗泄歸於下滲為解表同於汗泄為利小便同於下殊不言補所謂補者辛補肝咸補心甘補腎酸補脾苦補肺更相君臣佐使皆以發腠理致津液通氣血而已非今人所謂溫燥邪僻之補也蓋草木皆以治病病去則五穀菜果肉皆補物也猶當辨其五臟所宜毋使偏傾可也若以藥為補雖甘草人參久服必有偏勝增氣而夭之慮況大毒有毒乎是故三法猶刑罰也粱肉猶德教也治亂用刑治治用德理也余用三法常兼眾法有按有蹻有揃有導有減增有續止醫者不得余法而反誣之哀哉如引涎漉涎取嚏追淚凡上行者皆吐法也薰蒸澡洗熨烙針刺砭射導引按摩凡解表者皆汗法也催生下乳磨積逐水破經泄氣凡下行者皆下法也天之大氣風寒暑濕燥火發病多在乎上地之六氣霧露雨雪水泥發病多在乎下人之六味酸苦甘辛鹹淡發病多在乎中發病者三出病者亦三風寒之邪結搏於皮膚之間滯於經絡之內留而不去或發痛注麻痹腫癢拘攣皆可汗而出之痰飲宿食在胸膈為諸病皆可吐而出之寒濕固冷火熱客下焦發為諸病皆可泄而出之吐中有泄下中有補經云知其要者一言而終是之謂也吐法凡病在胸膈中脘已上者皆宜吐之考之本草吐藥之苦寒者瓜蒂梔子茶末豆豉黃連苦參大黃黃芩辛苦而寒者常山藜蘆鬱金甘而寒者桐油甘而溫者牛肉甘苦而寒者地黃人參蘆苦而溫者青木香桔梗蘆遠志厚朴辛苦而溫者薄荷芫花松蘿辛而溫者蘿蔔子穀精草蔥根鬚杜衡皂莢辛而寒者膽礬石綠石青辛而溫者蠍稍烏梅烏頭附子尖輕粉酸而寒者晉礬綠礬齏汁酸而平者銅綠甘酸而平者赤小豆酸而溫者飯漿咸而寒者青鹽滄鹽白米飯甘而寒者牙硝辛而熱者砒石諸藥惟常山膽礬瓜蒂有小毒藜蘆芫花烏附砒石有大毒他皆吐藥之無毒者凡用法先宜少服不湧漸加之仍以雞羽撩之不出以齏投之不吐再投且投且探無不吐者吐至瞑眩慎勿驚疑但飲冷水新水立解強者可一吐而安弱者作三次吐之吐之次日有頓快者有轉甚者引之未盡也俟數日再吐之吐後不禁物惟忌飽食鹹酸硬物乾物油肥之物吐後心火既降陰道必強大禁房室悲憂病人既不自責必歸罪於吐法也不可吐者有八性剛暴好怒喜淫者病勢已危老弱氣衰者自吐不止者陽敗血虛者吐血咯血衄血嗽血崩血溺血者病人粗知醫書不辨邪正者病人無正性反覆不定者左右多嘈雜之言者皆不可吐吐則轉生他病反起謗端雖懇切求之不可強從也汗法風寒暑濕之邪入於皮膚之間而未深欲速去之莫如發汗所以開玄府而逐邪氣也然有數法有溫熱發汗寒涼發汗發汗導引發汗皆所謂開玄府而逐邪氣也以本草校之荊芥薄荷白芷陳皮半星細辛天麻生薑蔥白皆辛而溫者也蜀椒胡椒茱萸大蒜皆辛而熱者也青皮防己秦艽其辛而平者乎麻黃人參大棗其甘而溫者乎葛根赤茯苓其甘而平者乎桑白皮其甘而溫者乎防風當歸其甘辛而溫者乎官桂桂枝其甘辛而大熱者乎厚朴桔梗其苦而溫者乎黃芩知母枳實苦參地骨皮柴胡前胡其苦而寒者乎羌活獨活其苦辛而微溫者乎升麻其苦甘且平者乎芍藥其酸而微寒者乎浮萍其辛酸而寒者乎凡此皆發散之屬也善擇者當熱而熱當寒而寒不善擇者反此則病有變也發汗中病則止不必盡劑凡破傷風小兒驚風飧泄不止酒家火病皆宜汗之所謂火鬱則發之也下法積聚陳莝於中留結寒熱於內必用下之陳莝去而腸胃潔癥瘕盡而營衛通下之者所以補之也庸工妄投當寒反熱當熱反寒故謂下為害也考之本草下之寒者戎鹽之咸犀角之酸鹹滄鹽澤瀉之甘鹹枳實之苦酸膩粉之辛澤漆之苦辛杏仁之苦甘下之微寒者豬膽之苦下之大寒者則牙硝之甘大黃牽牛瓜蒂苦瓜牛膽藍汁羊蹄根苗之苦大戟甘遂之苦甘朴硝芒硝之苦鹹下之溫者檳榔之辛芫花之苦辛石蜜之甘皂角之辛鹹下之熱者巴豆之辛下之涼者豬羊血之咸下之平者郁李仁之酸桃花之苦皆下藥也惟巴豆性熱非寒積不再輕用妄下則使人津液涸竭留毒不去胸熱目燥轉生他病其不可下者凡四洞泄寒中者表裡俱虛者厥而唇青手足冷者小兒病後慢驚者誤下必致殺人其餘大積大聚大痞大秘大燥大堅非下不可但須寒熱積氣用之中病則止不必盡劑也服藥吉日丁卯庚午甲戌丙子丁丑壬午甲申丙戌丁亥辛卯壬辰丙申戊戌己亥庚子辛丑甲辰乙巳丙午戊申壬子癸丑乙卯丙辰己未壬戌及成開執日忌辛未扁鵲死日又春甲乙夏丙丁四季戊己秋庚辛冬壬癸男喜破日忌除女喜除日忌破男女俱宜開日俱忌滿日男忌戊女忌己又遊禍日不宜服藥正五九月巳日二六十月卯日三七十一月午日四八十二月申日
